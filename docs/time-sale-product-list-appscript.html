    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    .friendBenefit { margin-top:24px; font-family:'TheJamsil5Bold','Cafe24Ssukssuk',sans-serif; font-size:74px; line-height:1; font-weight:900; color:#050505; }
    .friendBenefit .blue { color:#087bf1; }
    .friendSub { display:inline-block; position:relative; margin-top:28px; font-family:'Cafe24Ssukssuk','TheJamsil4Medium',sans-serif; font-size:27px; line-height:1.25; font-weight:900; color:#050505; z-index:1; }
    .friendSub:after { content:''; position:absolute; left:-8px; right:-8px; bottom:0; height:12px; background:rgba(0,108,218,.25); border-radius:999px; z-index:-1; }

    .friendDarkBox { position:relative; z-index:3; margin:420px auto 0; width:76%; max-width:620px; background:rgba(0,0,0,.66); color:#fff; border-radius:8px; text-align:center; padding:28px 14px 24px; box-shadow:0 10px 30px rgba(0,0,0,.16); }

    .friendDarkMain { margin-top:8px; font-family:'TheJamsil5Bold',sans-serif; font-size:47px; line-height:1.08; font-weight:900; letter-spacing:-.055em; }
    .friendDarkMain .blue { color:#1188ff; }

    .brandTicker { position:absolute; left:0; right:0; bottom:252px; height:74px; overflow:hidden; z-index:4; }
    .brandTrack { display:flex; width:max-content; animation:brandMove 34s linear infinite; }
    .brandTrack img { width:720px; height:100px; object-fit:contain; flex:0 0 auto; margin-right:40px; }
    @keyframes brandMove { from { transform:translate3d(0,0,0); } to { transform:translate3d(-760px,0,0); } }
    .friendInviteFixed { position:fixed; left:50%; bottom:140px; transform:translateX(-50%); width:min(820px, 100vw); height:92px; z-index:70; padding:12px 22px; background:#ffd900; display:flex; justify-content:center; align-items:center; }
    .friendInviteBtn { width:100%; height:68px; border:0; border-radius:8px; background:#ffd900; color:#3b1d1d; display:flex; align-items:center; justify-content:center; gap:14px; font-size:28px; font-weight:900; }
    .friendInviteBtn img { width:35px; height:33px; object-fit:contain; }

    /* 주문조회 */
    .orderScreen { background:#f3f5f8; min-height:calc(100vh - 140px); padding:0; }
    .orderFrame { width:100%; height:calc(100vh - 140px); border:0; display:block; background:#f3f3f3; }
    .orderHero { text-align:center; padding:34px 8px 24px; }
    .orderLogo { font-family:'TheJamsil5Bold'; color:#0051A0; font-size:50px; letter-spacing:-.06em; }

    .orderSearchBtn { position:absolute; right:8px; top:8px; width:100px; height:56px; border:0; border-radius:999px; background:#0051A0; color:#fff; font-size:19px; font-weight:900; }
    .orderMessage { text-align:center; margin:18px 0; color:#777; font-size:16px; font-weight:700; }
    .candidateGrid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin:18px 0; }
    .candidateBtn { border:0; background:#fff; border-radius:16px; padding:18px 12px; box-shadow:0 4px 14px rgba(0,0,0,.06); font-size:17px; font-weight:900; text-align:left; }
    .orderCards { display:flex; flex-direction:column; gap:12px; max-width:720px; margin:0 auto; }
    .orderCard { background:#fff; border-radius:18px; overflow:hidden; display:grid; grid-template-columns:94px 1fr; gap:14px; padding:12px; box-shadow:0 4px 16px rgba(0,0,0,.055); }
    .orderThumb { width:94px; height:94px; object-fit:cover; background:#eee; border-radius:12px; }
    .orderName { font-size:17px; font-weight:900; line-height:1.25; letter-spacing:-.04em; }
    .orderMeta { margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; }

    /* 하단 앱 네비게이션 */
    .bottomNav {
      position:fixed;
      left:0;
      right:0;
      bottom:0;
      width:100vw;
      max-width:none;
      height:140px;
      z-index:100;
      background:rgba(255,255,255,.985);
      border-top:1px solid rgba(0,0,0,.10);
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      padding:14px max(10px, env(safe-area-inset-left)) max(12px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-right));
      box-shadow:0 -14px 34px rgba(0,0,0,.105);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
    }
    .navBtn {
      position:relative;
      min-width:0;
      height:112px;
      margin:0 6px;
      border:0;
      border-radius:28px;
      background:transparent;
      color:#8b8b8b;
      font-size:18px;
      line-height:1.08;
      font-weight:900;
      letter-spacing:-.04em;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      opacity:.74;
      transition:transform .28s cubic-bezier(.2,.85,.25,1.25), background .24s ease, color .24s ease, box-shadow .24s ease, opacity .24s ease;
    }
    .navIcon {
      width:48px;
      height:48px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:36px;
      line-height:1;
      background:rgba(0,0,0,.045);
      transform:translateY(0) scale(1);
      transition:transform .28s cubic-bezier(.2,.85,.25,1.25), background .24s ease;
    }
    .navBtn.active {
      color:#0051A0;
      opacity:1;
      background:linear-gradient(180deg, rgba(0,81,160,.12) 0%, rgba(0,81,160,.055) 100%);
      box-shadow:0 10px 24px rgba(0,81,160,.15);
      transform:translateY(-8px);
    }
    .navBtn.active .navIcon {
      background:#0051A0;
      color:#fff;
      transform:translateY(-2px) scale(1.1);
      animation:navPop .38s cubic-bezier(.2,.85,.25,1.35);
    }
    .navBtn.active::after {
      content:'';
      position:absolute;
      left:50%;
      bottom:9px;
      width:42px;
      height:5px;
      border-radius:999px;
      background:#0051A0;
      transform:translateX(-50%);
      box-shadow:0 2px 8px rgba(0,81,160,.28);
    }
    .navBtn:active { transform:scale(.96); }
    .navBtn.active:active { transform:translateY(-8px) scale(.98); }
    @keyframes navPop {
      0% { transform:translateY(4px) scale(.82); }
      55% { transform:translateY(-4px) scale(1.18); }
      100% { transform:translateY(-2px) scale(1.1); }
    }

    @media (max-width:520px) {
      .topHeader { height:88px; padding:0 14px; gap:12px; }

      .logoMain { font-size:26px; }
      .tabsWrap { top:88px; }
      .tabs { gap:20px; padding:18px 14px 14px; }
      .grid { padding:20px 14px 230px; gap:56px 14px; }
      .cardTitle { font-size:20px; }
      .price { font-size:26px; }
      .tickerItem { font-size:14px; }
      .detailTitle { font-size:34px; }
      .detailPrice { font-size:44px; }
      .infoRow { padding:0 24px; font-size:22px; }
      .friendCopy { padding-top:56px; }
      .friendPre { font-size:27px; }
      .friendTitle { font-size:64px; }
      .friendBenefit { font-size:58px; }
      .friendSub { font-size:20px; }
      .friendDarkBox { margin-top:360px; width:78%; padding:22px 12px 20px; }
      .friendDarkTop { font-size:26px; }
      .friendDarkMain { font-size:36px; }
      .friendDarkDesc { font-size:15px; }
      .brandTicker { bottom:250px; height:64px; }
      .brandTrack img { width:620px; height:86px; margin-right:36px; }
      @keyframes brandMove { from { transform:translate3d(0,0,0); } to { transform:translate3d(-656px,0,0); } }
      .friendInviteBtn { font-size:25px; }
      .bottomNav { height:140px; padding:14px 8px 12px; }
      .navBtn { height:112px; margin:0 3px; font-size:16px; gap:8px; border-radius:24px; }
      .navIcon { width:44px; height:44px; font-size:32px; border-radius:16px; }
      .orderLogo { font-size:42px; }
      .candidateGrid { grid-template-columns:1fr; }
    }

    var TIME_SALE_CATEGORIES = [
      "모두보기",
      "냉동식품",
      "음료/간식",
      "생활용품",
      "상온식품",
      "생활가전",
      "주방용품",
      "건강식품",
      "뷰티케어"
];
    var timeSaleCountdownTimer = null;

    function buildTimeSaleShopData(data) {
      var serverProducts = (data && data.products) || [];
      var serverByTitle = {};
      serverProducts.forEach(function(item) {
        var title = normalizeTitleKey(item.title || item.productName || '');
        if (title && !serverByTitle[title]) serverByTitle[title] = item;
      });

      return {
        titleDate: '타임특가',
        updatedShort: '오늘 자정 마감',
        categories: TIME_SALE_CATEGORIES,
        products: TIME_SALE_PRODUCTS.map(function(base) {
          var live = serverByTitle[normalizeTitleKey(base.title)] || {};
          return Object.assign({}, live, base, {
            src: live.src || live.imageUrl || base.src,
            title: base.title,
            price: base.price,
            category: base.category,
            stockQuantity: base.stockQuantity,
            discountRate: base.discountRate,
            comparePriceText: base.comparePriceText,
            ticker: base.ticker
          });
        })
      };
    }

    function normalizeTitleKey(value) {
      return String(value || '').replace(/\s+/g, '').toLowerCase();
    }

    function startTimeSaleCountdown() {
      updateTimeSaleCountdown();
      if (timeSaleCountdownTimer) clearInterval(timeSaleCountdownTimer);
      timeSaleCountdownTimer = setInterval(updateTimeSaleCountdown, 1000);
    }

    function updateTimeSaleCountdown() {
      var now = new Date();
      var end = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0, 0);
      var remaining = Math.max(0, end.getTime() - now.getTime());
      var totalSeconds = Math.floor(remaining / 1000);
      var hours = Math.floor(totalSeconds / 3600);
      var minutes = Math.floor((totalSeconds % 3600) / 60);
      var seconds = totalSeconds % 60;
      setCountdownText('saleHours', pad2(hours));
      setCountdownText('saleMinutes', pad2(minutes));
      setCountdownText('saleSeconds', pad2(seconds));
    }

    function setCountdownText(id, value) {
      var el = document.getElementById(id);
      if (!el || el.textContent === value) return;
      el.textContent = value;
      el.classList.remove('tick');
      void el.offsetWidth;
      el.classList.add('tick');
    }

    function pad2(value) { return String(value).padStart(2, '0'); }


    function init() {
      if (typeof applyManmanShopAssets === 'function') applyManmanShopAssets();
      var tab = new URLSearchParams(location.search).get('tab') || INITIAL_TAB || 'deal';
      google.script.run
        .withSuccessHandler(function(data) {
          shopData = buildTimeSaleShopData(data);
          renderListPage();
          startTimeSaleCountdown();
          if (tab === 'friend') { goInvite(); return; }
          if (tab === 'order') switchMainTab(tab);
        })
        .withFailureHandler(function(err) {
          shopData = buildTimeSaleShopData(null);
          renderListPage();
          startTimeSaleCountdown();
        })
        .getShopData();
    }

    function switchMainTab(tab) {
      if (tab === 'friend') {
        goInvite();
        return;
      }
      currentMainTab = tab;
      hideDetailOnly();
      document.getElementById('dealScreen').classList.toggle('active', tab === 'deal');
      document.getElementById('orderScreen').classList.toggle('active', tab === 'order');
      setBottomNavActive_(tab);
      if (tab === 'order') loadOrderLookupFrame();
      if (tab === 'deal') { document.getElementById('listPage').style.display = 'block'; setTimeout(updateTabBar, 80); }
      window.scrollTo(0,0);
    }

    function goInvite() {
      location.href = APP_URL + '?p=invite';
    }

    function loadOrderLookupFrame() {
      var frame = document.getElementById('orderFrame');
      if (!frame) return;
      if (!frame.getAttribute('data-loaded')) {
        frame.src = APP_URL + '?p=order';
        frame.setAttribute('data-loaded', '1');
      }
    }

    function setBottomNavActive_(tab) {
      var map = { deal:'navDeal', friend:'navFriend', order:'navOrder' };
      Object.keys(map).forEach(function(key) {
        var el = document.getElementById(map[key]);
        if (!el) return;
        var active = key === tab;
        el.classList.toggle('active', active);
        el.setAttribute('aria-current', active ? 'page' : 'false');
      });
    }

    function renderListPage() {
      document.getElementById('titleDate').textContent = shopData.titleDate || '공동구매';
      document.getElementById('updatedShort').textContent = shopData.updatedShort || '';
      renderTabs();
      renderGrid();
    }

    function renderTabs() {
      var tabs = document.getElementById('tabs');
      tabs.innerHTML = '<div id="tabBar" class="tabBar"></div>';
      (shopData.categories || ['모두보기']).forEach(function(cat) {
        var btn = document.createElement('button');
        btn.className = 'tab' + (cat === currentCategory ? ' active' : '');
        btn.textContent = cat;
        btn.onclick = function() { selectCategory(cat, btn); };
        tabs.appendChild(btn);
      });
      setTimeout(updateTabBar, 50);
    }

    function selectCategory(cat, btn) {
      currentCategory = cat;
      Array.prototype.forEach.call(document.querySelectorAll('.tab'), function(el) { el.classList.remove('active'); });
      btn.classList.add('active');
      updateTabBar();
      renderGrid();
    }

    function updateTabBar() {
      var active = document.querySelector('.tab.active');
      var tabs = document.getElementById('tabs');
      var bar = document.getElementById('tabBar');
      if (!active || !bar || !tabs) return;
      bar.style.width = active.offsetWidth + 'px';
      bar.style.transform = 'translateX(' + (active.offsetLeft - 22 + tabs.scrollLeft) + 'px)';
    }

    function renderGrid() {
      var grid = document.getElementById('grid');
      var products = (shopData.products || []).filter(function(p) {
        return currentCategory === '모두보기' || p.category === currentCategory;
      });

      if (!products.length) {
        grid.innerHTML = '<div class="empty">표시할 상품이 없습니다.</div>';
        return;
      }

      grid.innerHTML = products.map(renderCard).join('');
      attachCardHandlers();
      refreshTickerSpeed();
    }

    function renderCard(p) {
      var stock = Number(p.stockQuantity);
      var isLowStock = Number.isFinite(stock) && stock < 10;
      var discountRate = Number(p.discountRate || 0);
      var compareText = p.comparePriceText || (p.comparePrice ? formatWon(p.comparePrice) : '');
      return '' +
        '<article class="card" data-product-id="' + escAttr(p.id) + '" aria-label="' + escAttr(p.title) + '">' +
          '<div class="thumbBox">' +
            '<img class="thumb" src="' + escAttr(p.src) + '" alt="">' +
            '<div class="rankBadge"><span>' + p.rank + '</span> ' + rankArrow(p) + '</div>' +
            '<div class="dealOverlay">' +
              (discountRate ? '<div class="discountPill">' + discountRate + '%</div>' : '') +
              (isLowStock ? '<div class="stockBadge">품절임박 · ' + stock + '개 남음</div>' : '') +
            '</div>' +
            '<div class="ticker"><div class="tickerInner">' + tickerHtml(p) + tickerHtml(p) + '</div></div>' +
          '</div>' +
          '<div class="cardTitle">' + esc(p.title) + '</div>' +
          '<div class="cardBadgeRow">' +
            '<span class="categoryBadge">' + esc(p.category || '타임특가') + '</span>' +
            (isLowStock ? '<span class="stockTextBadge">' + stock + '개 남음</span>' : '') +
          '</div>' +
          '<div class="cardMetaRow">' +
            '<div class="priceStack">' +
              (compareText ? '<div class="compareText">온라인최저가 ' + esc(compareText) + '</div>' : '') +
              '<div class="price">' + esc(p.price || '') + '</div>' +
            '</div>' +
            '<div class="pickupChip">' + esc(p.pickupDateDisplay || '타임특가') + '</div>' +
          '</div>' +
          '<div class="viewText">' + esc(p.viewText || '') + '</div>' +
        '</article>';
    }

    function formatWon(value) { return new Intl.NumberFormat('ko-KR').format(Number(value || 0)) + '원'; }


    function attachCardHandlers() {
      Array.prototype.forEach.call(document.querySelectorAll('.card[data-product-id]'), function(card) {
        card.onclick = null;
        card.setAttribute('role', 'article');
      });
    }

    function attachCandidateHandlers() {
      Array.prototype.forEach.call(document.querySelectorAll('.candidateBtn[data-label]'), function(btn) {
        btn.onclick = function() { submitOrderSearch(btn.getAttribute('data-label')); };
      });
    }

    function rankArrow(p) {
      if (p.rankDirection === 'up') return '<span class="rankArrow up">▲</span>';
      if (p.rankDirection === 'down') return '<span class="rankArrow down">▼</span>';
      return '<span class="rankArrow same">-</span>';
    }

    function tickerHtml(p) {
      var items = getRandomTickerItems(p);
      return items.map(function(t) { return '<span class="tickerItem">' + esc(t) + '</span>'; }).join('');
    }

    function getRandomTickerItems(p) {
      var base = p && p.ticker && p.ticker.length ? p.ticker.slice() : ['첫 주문을 기다리는 중'];
      if (base.length <= 1) return base;
      if (!p._tickerRandomItems) { p._tickerRandomItems = shuffleArray(base); }
      return p._tickerRandomItems;
    }

    function shuffleArray(arr) {
      var a = arr.slice();
      for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var t = a[i]; a[i] = a[j]; a[j] = t;
      }
      return a;
    }

    function openDetail(productId) {
      return false;
      google.script.run.trackProductView(productId);
      document.getElementById('dealScreen').classList.remove('active');
      document.getElementById('orderScreen').classList.remove('active');
      document.getElementById('detailBottom').style.display = 'flex';
      document.getElementById('detailPage').style.display = 'block';
      document.getElementById('detailPage').innerHTML = '<div class="detailLoading">상품 상세를 불러오는 중입니다.</div>';
      window.scrollTo(0, 0);

      google.script.run
        .withSuccessHandler(renderDetail)
        .withFailureHandler(function(err) {
          document.getElementById('detailPage').innerHTML = '<div class="detailLoading">상세를 불러오지 못했습니다.<br>' + esc(err.message) + '</div>';
        })
        .getProductDetail(productId);
    }

    function renderDetail(res) {
      if (!res || !res.ok) {
        document.getElementById('detailPage').innerHTML = '<div class="detailLoading">상품 정보를 찾지 못했습니다.</div>';
        return;
      }
      var p = res.product;
      var options = res.options && res.options.length ? res.options.join(' / ') : '-';
      document.getElementById('detailPage').innerHTML = '' +
        '<section class="detailHero">' +
          '<button id="detailBackBtn" class="backBtn detailBack"><span class="backIcon"></span></button>' +
          '<img src="' + escAttr(p.src) + '" alt="">' +
        '</section>' +
        '<div class="detailTicker"><div class="tickerInner">' + tickerHtml(p) + tickerHtml(p) + '</div></div>' +
        '<section class="detailInfo">' +
          '<h1 class="detailTitle">' + esc(p.title) + '</h1>' +
          '<div class="detailPrice">' + esc(p.price || '') + '</div>' +
          '<div class="detailView">' + esc(p.viewText || '') + '</div>' +
          '<a href="javascript:void(0)" id="detailCategoryLink" data-category="' + escAttr(p.category) + '" class="categoryLink">' + esc(p.category) + '</a>' +
        '</section>' +
        '<section class="infoRows">' +
          '<div class="infoRow"><div class="infoLabel">순위</div><div class="infoValue">' + p.rank + ' ' + rankArrow(p) + '</div></div>' +
          '<div class="infoRow"><div class="infoLabel">픽업일</div><div class="infoValue">' + esc(p.pickupDateDisplayLong || p.pickupDateDisplay || formatPickupLong(p.pickupDate || p.pickupDateText || '')) + '</div></div>' +
          '<div class="infoRow"><div class="infoLabel">옵션</div><div class="infoValue">' + esc(options) + '</div></div>' +
        '</section>' +
        '<section class="detailHtml">' + (res.detailHtml || '') + '</section>';
      var backBtn = document.getElementById('detailBackBtn');
      if (backBtn) backBtn.onclick = function() { showList('모두보기'); };
      var catLink = document.getElementById('detailCategoryLink');
      if (catLink) catLink.onclick = function() { showList(catLink.getAttribute('data-category') || '모두보기'); };
      refreshTickerSpeed();
    }

    function hideDetailOnly() {
      document.getElementById('detailPage').style.display = 'none';
      document.getElementById('detailBottom').style.display = 'none';
    }

    function showList(category) {
      hideDetailOnly();
      document.getElementById('dealScreen').classList.add('active');
      currentMainTab = 'deal';
      currentCategory = category || '모두보기';
      renderListPage();
      window.scrollTo(0, 0);
    }

    function goNativeBack() { if (history.length > 1) history.back(); }

    function refreshTickerSpeed() {
      window.requestAnimationFrame(function() {
        var tracks = document.querySelectorAll('.tickerInner');
        Array.prototype.forEach.call(tracks, function(track) {
          var distance = Math.max(360, Math.round(track.scrollWidth / 2));
          var seconds = Math.max(42, Math.round(distance / 18));
          track.style.setProperty('--ticker-distance', distance + 'px');
          track.style.setProperty('--ticker-duration', seconds + 's');
        });
      });
    }

    function pickupShort(text) {
      var s = String(text || '').trim();
      var m = s.match(/(20\d{2})[\/.-](\d{1,2})[\/.-](\d{1,2})/);
      if (m) return Number(m[2]) + '/' + Number(m[3]) + '(' + weekday(Number(m[1]), Number(m[2]), Number(m[3])) + ') 픽업';
      m = s.match(/(^|[^0-9])(\d{1,2})\s*\/\s*(\d{1,2})(?:\s*\(([월화수목금토일])\))?/);
      if (m) return Number(m[2]) + '/' + Number(m[3]) + (m[4] ? '(' + m[4] + ')' : '') + ' 픽업';
      return s ? s.replace(/픽업/g, '').trim() + ' 픽업' : '';
    }
    function formatPickupLong(text) { return pickupShort(text); }
    function weekday(y, m, d) { return ['일','월','화','수','목','금','토'][new Date(y, m - 1, d).getDay()]; }

    function inviteFriend() {
      var text = '만만마켓 친구 초대 링크를 복사했습니다.';
      var url = location.origin + location.pathname + '?p=invite';
      if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(function() { alert(text); }, function() { alert(text + '\n' + url); });
      } else { alert(text + '\n' + url); }
    }

    function submitOrderSearch(selectedLabel) {
      var keyword = document.getElementById('orderKeyword').value.trim();
      if (!keyword) {
        document.getElementById('orderMessage').textContent = '닉네임 또는 휴대폰 끝 4자리를 입력해주세요.';
        return;
      }
      if (typeof selectedLabel === 'string') orderSelectedCustomerLabel = selectedLabel;
      document.getElementById('orderMessage').textContent = '주문을 조회하고 있습니다...';
      document.getElementById('candidateArea').innerHTML = '';
      document.getElementById('orderResults').innerHTML = '';
      google.script.run
        .withSuccessHandler(renderOrderSearchResult)
        .withFailureHandler(function(err) { document.getElementById('orderMessage').textContent = '조회 실패: ' + err.message; })
        .searchOrders(keyword, orderSelectedCustomerLabel);
    }

    function renderOrderSearchResult(res) {
      var msg = document.getElementById('orderMessage');
      var cand = document.getElementById('candidateArea');
      var list = document.getElementById('orderResults');
      cand.innerHTML = '';
      list.innerHTML = '';
      if (!res || !res.ok) { msg.textContent = (res && res.message) ? res.message : '조회 결과가 없습니다.'; return; }
      if (res.requiresCustomerSelection && res.candidates && res.candidates.length) {
        msg.textContent = '같은 끝번호가 있어요. 고객님을 선택해주세요.';
        cand.innerHTML = res.candidates.map(function(c) {
          return '<button class="candidateBtn" data-label="' + escAttr(c.customerLabel) + '">' + esc(c.customerLabel) + '<br><span style="color:#777;font-size:13px">최근 주문 ' + (c.orderCount || 0) + '건</span></button>';
        }).join('');
        attachCandidateHandlers();
        return;
      }
      var items = res.items || [];
      if (!items.length) { msg.textContent = '최근 픽업 가능한 주문이 없습니다.'; return; }
      msg.textContent = '총 ' + items.length + '개 상품이 조회되었습니다.';
      list.innerHTML = items.map(function(item) {
        return '<article class="orderCard">' +
          '<img class="orderThumb" src="' + escAttr(item.imageUrl || '') + '" alt="">' +
          '<div>' +
            '<div class="orderName">' + esc(item.productName || '') + '</div>' +
            '<div class="orderMeta">' +
              '<span class="orderChip">수량 ' + esc(item.quantity || '') + '개</span>' +
              '<span class="orderChip">픽업 ' + esc(item.pickupDate || '') + '</span>' +
              '<span class="orderChip">' + esc(item.customerLabel || '') + '</span>' +
            '</div>' +
          '</div>' +
        '</article>';
      }).join('');
    }

    function esc(s) { return String(s || '').replace(/[&<>"]/g, function(c) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
    function escAttr(s) { return esc(s).replace(/'/g, '&#39;'); }

    init();
    window.addEventListener('resize', updateTabBar);
  </script>
</body>
</html>
