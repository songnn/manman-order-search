}

function updateResultTabsStickyState() {
  if (!resultTabsWrap || !resultTabsWrap.classList.contains('is-visible')) return;
  updateResultTabsHeightVar();

  if (!ENABLE_RESULT_TABS_STICKY) {
    resultTabsPinned = false;
    resultTabsWrap.classList.remove('is-stuck', 'is-sticky-ready');
    resultTabsWrap.style.setProperty('--sticky-progress', '0');
    return;
  }

  resultTabsWrap.classList.add('is-sticky-ready');
  const rect = resultTabsWrap.getBoundingClientRect();
  const start = 98;
  const end = 0;
  const progress = clamp((start - rect.top) / Math.max(start - end, 1), 0, 1);
  resultTabsWrap.style.setProperty('--sticky-progress', progress.toFixed(3));
  resultTabsWrap.classList.toggle('is-stuck', resultTabsPinned || progress > 0.72);
}

function updateResultTabsHeightVar() {
  if (!resultTabsWrap) return;
  const height = Math.max(0, Math.round(resultTabsWrap.getBoundingClientRect().height));
  document.documentElement.style.setProperty('--result-tabs-current-height', `${height}px`);
}

function resetResultTabScrollPositions() {
  resultTabScrollPositions.orders = null;
  resultTabScrollPositions.schedule = null;
}

function saveResultTabScroll(tabName) {
  if (isRestoringResultTabScroll) return;
  if (tabName !== 'orders' && tabName !== 'schedule') return;
  resultTabScrollPositions[tabName] = window.scrollY || window.pageYOffset || 0;
}

function getDefaultResultTabScrollTop(tabName) {
  const anchor =
    tabName === 'schedule'
      ? (resultTabsWrap || scheduleWeekHostEl || resultPanels)
      : (resultTabsWrap || resultPanels);

  if (!anchor) return 0;

  const rect = anchor.getBoundingClientRect();
  return Math.max(0, Math.round(rect.top + (window.scrollY || window.pageYOffset || 0) - 8));
}

function restoreResultTabScroll(tabName, delay = 0) {
  const saved = resultTabScrollPositions[tabName];
  if (!Number.isFinite(saved)) return false;

  window.setTimeout(() => {
    isRestoringResultTabScroll = true;
    window.scrollTo(0, Math.max(0, saved));
    window.setTimeout(() => {
      isRestoringResultTabScroll = false;
    }, 80);
  }, delay);

  return true;
}

function setActiveTab(tabName, options = {}) {
  if (!ordersTab || !scheduleTab) return;
  const normalizedTab = tabName === 'schedule' ? 'schedule' : 'orders';
  const nextIndex = normalizedTab === 'orders' ? 0 : 1;
  const shouldSlide = options.slide !== false;
  const shouldRestoreScroll = options.restoreScroll === true;
  const previousTab = activeResultTab === 'schedule' ? 'schedule' : 'orders';
  const tabChanged = normalizedTab !== previousTab;

  if (tabChanged) {
    saveResultTabScroll(previousTab);
  }

  activeResultTab = normalizedTab;
  if (resultTabsWrap) {
    resultTabsWrap.style.setProperty('--tab-index', String(nextIndex));
    resultTabsWrap.style.setProperty('--tab-progress', String(nextIndex));
  }

  if (normalizedTab === 'orders') {
    scheduleWeekHostEl?.classList.remove('is-visible', 'is-sticky-ready', 'is-fixed');
    scheduleWeekHostEl?.setAttribute('aria-hidden', 'true');
    resetScheduleWeekStickyState();
    ordersTab.classList.add('is-active');
    ordersTab.setAttribute('aria-selected', 'true');
    scheduleTab.classList.remove('is-active');
    scheduleTab.setAttribute('aria-selected', 'false');
    if (ordersPanel) ordersPanel.classList.remove('tab-hidden');
    if (schedulePanelEl) schedulePanelEl.classList.remove('is-active');
  } else {
    scheduleState.selectedDateKey = getSeoulTodayInfo().dateKey;
    renderScheduleTab();
    scheduleWeekHostEl?.classList.add('is-visible');
    scheduleWeekHostEl?.setAttribute('aria-hidden', 'false');
    scheduleWeekHostEl?.classList.toggle('is-sticky-ready', ENABLE_SCHEDULE_WEEK_STICKY);
    requestScheduleWeekStickyUpdate();
    scheduleTab.classList.add('is-active');
    scheduleTab.setAttribute('aria-selected', 'true');
    ordersTab.classList.remove('is-active');
    ordersTab.setAttribute('aria-selected', 'false');
    if (ordersPanel) ordersPanel.classList.add('tab-hidden');
    if (schedulePanelEl) schedulePanelEl.classList.add('is-active');
  }

  if (resultPanelsSwiper && shouldSlide && resultPanelsSwiper.activeIndex !== nextIndex) {
    resultPanelsSwiper.slideTo(nextIndex);
  }

  if (resultPanelsSwiper) {
    resultPanelsSwiper.update();
    resultPanelsSwiper.updateAutoHeight?.(240);
  }

  requestResultTabsStickyUpdate();

  if (tabChanged && shouldRestoreScroll) {
    restoreResultTabScroll(normalizedTab, shouldSlide ? 360 : 40);
  }
}

function initResultTabsSwiper() {
  if (!resultPanels || resultPanelsSwiper || typeof Swiper !== 'function') return;

  resultPanelsSwiper = new Swiper(resultPanels, {
    slidesPerView: 1,
    speed: 340,
    effect: 'creative',
    autoHeight: true,
    grabCursor: true,
    watchSlidesProgress: true,
    observer: true,
    observeParents: true,
    preventInteractionOnTransition: false,
    noSwiping: true,
    noSwipingSelector: '.orders-swiper, .orders-swiper *, .schedule-week-swiper, .schedule-week-swiper *',
    creativeEffect: {
      limitProgress: 2,
      perspective: false,
      prev: {
        translate: ['-100%', 0, -80],
        scale: 0.96,
        opacity: 0.92
      },
      next: {
        translate: ['100%', 0, -80],
        scale: 0.96,
        opacity: 0.92
      }
    },
    resistanceRatio: 0.72,
    nested: true,
    threshold: 8,
    on: {
      progress(swiper, progress) {
        updateResultTabProgress(progress);
      },
      sliderFirstMove() {
        resultTabsWrap?.classList.add('is-dragging');
      },
      touchEnd() {
        resultTabsWrap?.classList.remove('is-dragging');
      },
      slideChange(swiper) {
        if (!swiper.width || swiper.isLocked) return;
        setActiveTab(swiper.activeIndex === 1 ? 'schedule' : 'orders', { slide: false, restoreScroll: true });
      },
      transitionEnd(swiper) {
        resultTabsWrap?.classList.remove('is-dragging');
        updateResultTabProgress(swiper.activeIndex);
        swiper.updateAutoHeight?.(0);
      }
    }
  });
}

function initResultTabsObserver() {
  if (!resultTabsSentinel || !resultTabsWrap || resultTabsObserver) return;

  resultTabsObserver = new IntersectionObserver(entries => {
    if (!ENABLE_RESULT_TABS_STICKY) {
      resultTabsPinned = false;
      resultTabsWrap.classList.remove('is-stuck', 'is-sticky-ready');
      return;
    }

    const entry = entries[0];
    resultTabsPinned = Boolean(entry && !entry.isIntersecting);
    resultTabsWrap.classList.add('is-sticky-ready');
    resultTabsWrap.classList.toggle('is-stuck', resultTabsPinned);
    requestResultTabsStickyUpdate();
  }, {
    threshold: 0,
    rootMargin: '-1px 0px 0px 0px'
  });

  resultTabsObserver.observe(resultTabsSentinel);
}

function updateResultTabsVisualState() {
  if (!ordersTab || !scheduleTab) return;

  const activeIndex = activeResultTab === 'schedule' ? '1' : '0';
  resultTabsWrap?.style.setProperty('--tab-index', activeIndex);
  resultTabsWrap?.style.setProperty('--tab-progress', activeIndex);
  ordersTab.classList.toggle('is-active', activeResultTab === 'orders');
  ordersTab.setAttribute('aria-selected', activeResultTab === 'orders' ? 'true' : 'false');
  scheduleTab.classList.toggle('is-active', activeResultTab === 'schedule');
  scheduleTab.setAttribute('aria-selected', activeResultTab === 'schedule' ? 'true' : 'false');
}

function updateResultTabProgress(progress) {
  if (!resultTabsWrap) return;
  resultTabsWrap.style.setProperty('--tab-progress', clamp(progress, 0, 1).toFixed(4));
}

function syncResultPanelsHeight() {
  if (!resultPanels || !ordersPanel) return;
  const minHeight = Math.max(ordersPanel.scrollHeight || 0, Math.round(window.innerHeight * 0.7));
  resultPanels.style.setProperty('--result-panel-min-height', `${minHeight}px`);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

// 탑바 서치 실행
function searchFromTopbar() {
  const val = rhKeyword.value.trim();
  keywordInput.value = val;
  search();
}

// 탑바 버튼 이벤트
rhSearchBtn.addEventListener('click', searchFromTopbar);

rhKeyword.addEventListener('keydown', e => {
  if (e.key === 'Enter') searchFromTopbar();
});

// 탑바 인풋: 값 동기화만
rhKeyword.addEventListener('input', () => {
  rhKeyword.value = sanitizeFourDigitInput(rhKeyword.value);
  keywordInput.value = rhKeyword.value;
});

// iOS 숫자패드 "완료" 버튼 → blur → 4자리면 조회
rhKeyword.addEventListener('blur', () => {
  setTimeout(() => {
    rhKeyword.value = sanitizeFourDigitInput(rhKeyword.value);
    keywordInput.value = rhKeyword.value;

    if (shouldRunKeyboardConfirmSearch(rhKeyword.value, rhSearchBtn)) {
      searchFromTopbar();
    }
  }, 150);
});

// 만만 로고 클릭 → 홈으로
rhLogoBtn.addEventListener('click', resetToHome);
rhLogoBtn.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    resetToHome();
  }
});

function handleResultTabPointer(event) {
  const tab = event.target.closest('.rh-tab[data-tab]');
  if (!tab || !resultTabsWrap || !resultTabsWrap.contains(tab)) return;
  event.preventDefault();
  setActiveTab(tab.dataset.tab || 'orders', { restoreScroll: true });
}

function handleResultTabClick(event) {
  const tab = event.target.closest('.rh-tab[data-tab]');
  if (!tab || !resultTabsWrap || !resultTabsWrap.contains(tab)) return;
  setActiveTab(tab.dataset.tab || 'orders', { restoreScroll: true });
}

if (resultTabsWrap) {
  resultTabsWrap.addEventListener('pointerup', handleResultTabPointer);
  resultTabsWrap.addEventListener('click', handleResultTabClick);
}

function renderLoadingState() {
  return `
    <div class="search-loading">
      <div class="search-loading-inner">
        <div class="search-loading-stage">
          <div class="search-loading-glow"></div>

          <div class="search-loading-orbit search-loading-orbit--outer">
            <span class="search-loading-dot search-loading-dot--1"></span>
            <span class="search-loading-dot search-loading-dot--2"></span>
          </div>

          <div class="search-loading-orbit search-loading-orbit--inner">
            <span class="search-loading-dot search-loading-dot--3"></span>
            <span class="search-loading-dot search-loading-dot--4"></span>
          </div>

          <div class="search-loading-grandpa">
            ${getGrandpaLoaderSvgMarkup()}
          </div>

          <div class="search-loading-pedestal"></div>
        </div>

        <div class="search-loading-title">주문을 불러오고 있습니다.</div>
        <div class="search-loading-subtitle">🎈 잠시만 기다려 주세요. 🎈</div>
      </div>
    </div>
  `;
}
