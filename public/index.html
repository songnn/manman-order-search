.search-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 460px;
  padding: 68px 20px;
}

.search-loading-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  text-align: center;
}

.search-loading-stage {
  position: relative;
  width: min(360px, 72vw);
  aspect-ratio: 1 / 1;
  display: grid;
  place-items: center;
  isolation: isolate;
}

.search-loading-stage::before {
  content: '';
  position: absolute;
  inset: 10%;
  border-radius: 50%;
  background:
    radial-gradient(circle at center, rgba(10, 88, 181, 0.16) 0%, rgba(10, 88, 181, 0.08) 35%, rgba(10, 88, 181, 0.02) 58%, transparent 72%);

    <script>
  let currentOrderItems = [];
  let currentSearchKeyword = '';
  let currentSelectedCustomerLabel = '';

  const SECTION_KEYS = {
    MY_ORDERS: 'myOrders',
    TODAY_PICKUP: 'todayPickup',
    TOMORROW_PICKUP: 'tomorrowPickup',
    MISSED_PICKUP: 'missedPickup'
  };

  let sectionViewState = {
    [SECTION_KEYS.MY_ORDERS]: false,
    [SECTION_KEYS.TODAY_PICKUP]: false,
    [SECTION_KEYS.TOMORROW_PICKUP]: false,
    [SECTION_KEYS.MISSED_PICKUP]: false
  };

  let swiperMap = {};

  const keywordInput = document.getElementById('keyword');
  const searchBtn = document.getElementById('searchBtn');
  const searchRow = document.getElementById('searchRow');
  const resultsEl = document.getElementById('results');
  const messageEl = document.getElementById('message');
  const storeNameEl = document.getElementById('storeName');
  const prettyAlertEl = document.getElementById('prettyAlert');
const prettyAlertDescEl = document.getElementById('prettyAlertDesc');
const prettyAlertConfirmEl = document.getElementById('prettyAlertConfirm');
const homeLogoBtn = document.getElementById('homeLogoBtn');
const searchGuideEl = document.getElementById('searchGuide');

  const DUMMY_IMAGES = [
    'https://picsum.photos/seed/manman-order-1/1200/1200',
    'https://picsum.photos/seed/manman-order-2/1200/1200',
    'https://picsum.photos/seed/manman-order-3/1200/1200',
    'https://picsum.photos/seed/manman-order-4/1200/1200',
    'https://picsum.photos/seed/manman-order-5/1200/1200',
    'https://picsum.photos/seed/manman-order-6/1200/1200'
  ];

    function init() {
    fetch('/api/config')
        .then(res => res.json())
        .then(config => {
        if (config && config.storeName) {
            storeNameEl.textContent = config.storeName;
        }
        })
        .catch(error => {
        console.error('config load error:', error);
        });

    updateSearchState();
    syncSearchGuide();
    }

  function updateSearchState() {
    const hasValue = keywordInput.value.trim().length > 0;
    const isFocused = document.activeElement === keywordInput;

    if (hasValue || isFocused) {
      searchRow.classList.add('active');
    } else {
      searchRow.classList.remove('active');
    }
  }

function showSearchGuide() {
  if (!searchGuideEl) return;
  searchGuideEl.classList.remove('is-hidden');
}

function hideSearchGuide() {
  if (!searchGuideEl) return;
  searchGuideEl.classList.add('is-hidden');
}

function syncSearchGuide() {
  const hasKeyword = keywordInput.value.trim().length > 0;
  const hasResults = resultsEl.innerHTML.trim().length > 0;
  const hasMessage = messageEl.textContent.trim().length > 0;

  if (!hasKeyword && !hasResults && !hasMessage) {
    showSearchGuide();
  } else {
    hideSearchGuide();
  }
}

function search(selectedCustomerLabel = '') {
  const keyword = keywordInput.value.trim();

  if (!keyword) {
    messageEl.textContent = '휴대폰 번호 끝 4자리 입력';
    resultsEl.innerHTML = '';
    updateSearchState();
    syncSearchGuide();
    return;
  }

  if (isDigitsOnly(keyword) && keyword.length !== 4) {
    showPrettyAlert('휴대폰 번호 끝 4자리 모두 입력해주시기 바랍니다.');
    return;
  }

  currentSearchKeyword = keyword;
  currentSelectedCustomerLabel = selectedCustomerLabel ? decodeURIComponent(selectedCustomerLabel) : '';

  hideSearchGuide();
  messageEl.textContent = '';
  resultsEl.innerHTML = renderLoadingState();

    fetch('/api/search-orders', {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json'
    },
    body: JSON.stringify({
        keyword,
        selectedCustomerLabel: currentSelectedCustomerLabel
    })
    })
    .then(res => res.json())
    .then(renderResult)
    .catch(renderError);
}

  function renderResult(result) {
    if (!result || !result.ok) {
      messageEl.textContent = (result && result.message) || '조회에 실패했습니다.';
      resultsEl.innerHTML = '';
      syncSearchGuide();
      return;
    }

    if (result.requiresCustomerSelection) {
      currentOrderItems = [];
      currentSelectedCustomerLabel = '';
      messageEl.textContent = `${result.searched} 끝번호와 일치하는 고객을 선택해 주세요.`;
      resultsEl.innerHTML = renderCustomerSelectionCards(result.candidates || [], result.searched || '');
      bindCustomerSelectionCards();
      syncSearchGuide();
      return;
    }

    const items = result.items || [];

    if (items.length === 0) {
      messageEl.textContent = `"${result.searched}" 검색 결과`;
      resultsEl.innerHTML = '<div class="empty">주문 내역이 없습니다.</div>';
      syncSearchGuide();
      return;
    }

    currentOrderItems = items;
    currentSelectedCustomerLabel = result.selectedCustomerLabel || items[0]?.customerLabel || '';
    const displayCustomerName = currentSelectedCustomerLabel || items[0]?.customerLabel || result.searched || '';
    messageEl.textContent = `${displayCustomerName}님의 주문이 ${items.length}건 있습니다.`;
    renderOrdersSection();
    syncSearchGuide();
  }

  function renderCustomerSelectionCards(candidates, searchedKeyword) {
    if (!candidates || !candidates.length) {
      return '<div class="empty">선택 가능한 고객 정보가 없습니다.</div>';
    }

    return `
      <section class="customer-select-wrap">
        <div class="customer-select-head">
          <h2 class="customer-select-title">닉네임 선택</h2>
          <div class="customer-select-desc">
            끝번호 ${escapeHtml(searchedKeyword)} 고객님이 여러 명 있습니다.<br>
            아래에서 본인의 닉네임을 선택해주시기 바랍니다.
          </div>
        </div>

        <div class="customer-select-grid">
          ${candidates.map((candidate, index) => {
            const isWide = candidates.length % 2 === 1 && index === candidates.length - 1 && candidates.length > 1;
            return `
              <button
                type="button"
                class="customer-select-card${isWide ? ' customer-select-card--wide' : ''}"
                data-customer-label="${encodeURIComponent(candidate.customerLabel || '')}"
              >
                <div>
                  <div class="customer-select-chip">선택</div>
                  <div class="customer-select-name">${escapeHtml(candidate.customerLabel || '')}</div>
                  <div class="customer-select-meta">주문 ${escapeHtml(candidate.orderCount ?? 0)}건 확인</div>
                </div>
                <div class="customer-select-action">주문목록 보기 →</div>
              </button>
            `;
          }).join('')}
        </div>
      </section>
    `;
  }

  function bindCustomerSelectionCards() {
    const buttons = resultsEl.querySelectorAll('.customer-select-card[data-customer-label]');
    if (!buttons.length) return;

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        const customerLabel = button.dataset.customerLabel || '';
        if (!customerLabel) return;
        search(customerLabel);
      });
    });
  }

  function renderError(error) {
    messageEl.textContent = '오류가 발생했습니다.';
    resultsEl.innerHTML = `<div class="empty">${escapeHtml(error.message || String(error))}</div>`;
    syncSearchGuide();
  }

function showPrettyAlert(message) {
  prettyAlertDescEl.textContent = message || '입력값을 확인해 주세요.';
  prettyAlertEl.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function hidePrettyAlert() {
  prettyAlertEl.classList.remove('show');
  document.body.style.overflow = '';
  setTimeout(() => {
    keywordInput.focus();
    keywordInput.select();
  }, 20);
}

function isDigitsOnly(value) {
  return /^\d+$/.test(String(value || '').trim());
}

function formatPriceHtml(value) {
  const n = Number(value || 0).toLocaleString('ko-KR');
  return `
    <span class="order-price-num">${n}</span><span class="order-price-won">원</span>
  `;
}

  function escapeHtml(str) {
    return String(str ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

function getFallbackImageUrl(index) {
  return DUMMY_IMAGES[index % DUMMY_IMAGES.length];
}

function getImageUrl(item, index) {
  const imageUrl = String(item.imageUrl || item.image || '').trim();
  return imageUrl || getFallbackImageUrl(index);
}

function getImageErrorHandler(index) {
  return `this.onerror=null;this.src='${getFallbackImageUrl(index)}';`;
}

  function getDateKey(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  function toDateInfo(date) {
    const normalized = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    return {
      year: normalized.getFullYear(),
      month: normalized.getMonth() + 1,
      day: normalized.getDate(),
      dayOfWeek: normalized.getDay(),
      dateObj: normalized,
      dateKey: getDateKey(normalized)
    };
  }

  function getSeoulTodayInfo() {
    const formatter = new Intl.DateTimeFormat('en-US', {
      timeZone: 'Asia/Seoul',
      year: 'numeric',
      month: 'numeric',
      day: 'numeric'
    });

    const parts = formatter.formatToParts(new Date());
    const year = Number(parts.find(p => p.type === 'year')?.value || 0);
    const month = Number(parts.find(p => p.type === 'month')?.value || 0);
    const day = Number(parts.find(p => p.type === 'day')?.value || 0);

    return toDateInfo(new Date(year, month - 1, day));
  }

  function addDaysToInfo(dateInfo, days) {
    const next = new Date(dateInfo.year, dateInfo.month - 1, dateInfo.day);
    next.setDate(next.getDate() + days);
    return toDateInfo(next);
  }

  function getNextWeekdayInfo(dateInfo, targetWeekday) {
    const base = new Date(dateInfo.year, dateInfo.month - 1, dateInfo.day);
    const diff = (targetWeekday - base.getDay() + 7) % 7 || 7;
    base.setDate(base.getDate() + diff);
    return toDateInfo(base);
  }

  function inferYearForMonthDay(month, day) {
    const seoulToday = getSeoulTodayInfo();
    let year = seoulToday.year;

    if (seoulToday.month === 12 && month === 1) year += 1;
    if (seoulToday.month === 1 && month === 12) year -= 1;

    return year;
  }

  function parsePickupDateValue(value) {
    const text = String(value || '').trim();
    if (!text) return null;

    let match = text.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
    if (match) {
      const year = Number(match[1]);
      const month = Number(match[2]);
      const day = Number(match[3]);
      const date = new Date(year, month - 1, day);
      return Number.isNaN(date.getTime()) ? null : new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    match = text.match(/(\d{1,2})\D+(\d{1,2})/);
    if (match) {
      const month = Number(match[1]);
      const day = Number(match[2]);
      const year = inferYearForMonthDay(month, day);
      const date = new Date(year, month - 1, day);
      return Number.isNaN(date.getTime()) ? null : new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    return null;
  }

  function formatPickupDateDisplay(date, fallbackText = '') {
    if (!(date instanceof Date) || Number.isNaN(date.getTime())) {
      return fallbackText || '픽업일 미정';
    }

    const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
    return `${date.getMonth() + 1}/${date.getDate()}(${weekdays[date.getDay()]})`;
  }

  function formatSectionDateDisplay(dateInfo) {
    const weekdays = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
    return `${dateInfo.month}월 ${dateInfo.day}일 ${weekdays[dateInfo.dayOfWeek]}`;
  }

function normalizeOrderItems(items) {
  return (items || []).map(item => {
    const pickupDateObj = parsePickupDateValue(item.pickupDate);
    const orderDateValue = Number(item.orderDateValue || 0);

    return {
      ...item,
      pickupDateObj,
      pickupDateKey: pickupDateObj ? getDateKey(pickupDateObj) : '',
      pickupDateDisplay: formatPickupDateDisplay(pickupDateObj, item.pickupDate || ''),
      orderDateValue
    };
  });
}

function sortItemsByOrderSheetDate(items) {
  return [...items].sort((a, b) => {
    if (a.orderDateValue !== b.orderDateValue) {
      return b.orderDateValue - a.orderDateValue; // 최신 시트 날짜 먼저
    }

    const aPickup = a.pickupDateObj ? a.pickupDateObj.getTime() : Number.MAX_SAFE_INTEGER;
    const bPickup = b.pickupDateObj ? b.pickupDateObj.getTime() : Number.MAX_SAFE_INTEGER;

    if (aPickup !== bPickup) {
      return aPickup - bPickup;
    }

    return String(a.productName || '').localeCompare(String(b.productName || ''), 'ko');
  });
}

function sortMissedItemsByLatestPickup(items) {
  return [...items].sort((a, b) => {
    const aPickup = a.pickupDateObj ? a.pickupDateObj.getTime() : -Infinity;
    const bPickup = b.pickupDateObj ? b.pickupDateObj.getTime() : -Infinity;

    if (aPickup !== bPickup) {
      return bPickup - aPickup; // 픽업일 최신순
    }

    if (a.orderDateValue !== b.orderDateValue) {
      return b.orderDateValue - a.orderDateValue;
    }

    return String(a.productName || '').localeCompare(String(b.productName || ''), 'ko');
  });
}

  function getDisplayTargets() {
    const seoulToday = getSeoulTodayInfo();
    const day = seoulToday.dayOfWeek;

    let firstTarget;
    let secondTarget;

    if (day === 6 || day === 0) {
      firstTarget = {
        key: SECTION_KEYS.TODAY_PICKUP,
        title: '🎈 월요일 픽업하기',
        dateInfo: getNextWeekdayInfo(seoulToday, 1)
      };

      secondTarget = {
        key: SECTION_KEYS.TOMORROW_PICKUP,
        title: '✅ 화요일 픽업 체크하기',
        dateInfo: getNextWeekdayInfo(seoulToday, 2)
      };
    } else if (day === 5) {
      firstTarget = {
        key: SECTION_KEYS.TODAY_PICKUP,
        title: '오늘 픽업하기 🎈',
        dateInfo: seoulToday
      };

      secondTarget = {
        key: SECTION_KEYS.TOMORROW_PICKUP,
        title: '✅ 월요일 픽업 체크하기',
        dateInfo: getNextWeekdayInfo(seoulToday, 1)
      };
    } else {
      firstTarget = {
        key: SECTION_KEYS.TODAY_PICKUP,
        title: '🎈 오늘 픽업하기',
        dateInfo: seoulToday
      };

      secondTarget = {
        key: SECTION_KEYS.TOMORROW_PICKUP,
        title: '✅ 내일픽업 체크하기',
        dateInfo: addDaysToInfo(seoulToday, 1)
      };
    }

    return [firstTarget, secondTarget].map(target => ({
      key: target.key,
      title: target.title,
      subtitle: formatSectionDateDisplay(target.dateInfo),
      dateInfo: target.dateInfo,
      dateKey: target.dateInfo.dateKey
    }));
  }

function buildSectionsData(items) {
  const normalized = normalizeOrderItems(items);
  const seoulToday = getSeoulTodayInfo();
  const targets = getDisplayTargets();

  const myOrders = sortItemsByOrderSheetDate(normalized);

  const sections = [
    {
      key: SECTION_KEYS.MY_ORDERS,
      title: '나의 주문',
      subtitle: '최근 7일'
    }
  ];

  const sectionItemsMap = {
    [SECTION_KEYS.MY_ORDERS]: myOrders
  };

  targets.forEach(target => {
    const targetItems = sortItemsByOrderSheetDate(
      normalized.filter(item => item.pickupDateKey === target.dateKey)
    );

    sectionItemsMap[target.key] = targetItems;

    if (targetItems.length) {
      sections.push({
        key: target.key,
        title: target.title,
        subtitle: target.subtitle
      });
    }
  });

  const targetKeySet = new Set(targets.map(target => target.dateKey));
  const todayStartTime = seoulToday.dateObj.getTime();

  const missedItems = sortMissedItemsByLatestPickup(
    normalized.filter(item => {
      if (!item.pickupDateObj) return false;
      if (targetKeySet.has(item.pickupDateKey)) return false;
      return item.pickupDateObj.getTime() < todayStartTime;
    })
  );

  sectionItemsMap[SECTION_KEYS.MISSED_PICKUP] = missedItems;

  if (missedItems.length) {
    sections.push({
      key: SECTION_KEYS.MISSED_PICKUP,
      title: '🛍️ 픽업 놓치신 물건은 없으신가요?'
    });
  }

  return {
    sections,
    sectionItemsMap
  };
}

  function formatPickupLabel(item) {
    return `${item.pickupDateDisplay || item.pickupDate || '픽업일 미정'} 픽업`;
  }

  function renderSectionHeading(section) {
    return `
      <div class="orders-title-box">
        <h2 class="orders-title">${escapeHtml(section.title || '')}</h2>
        ${section.subtitle ? `<div class="orders-subtitle">${escapeHtml(section.subtitle)}</div>` : ''}
      </div>
    `;
  }

  function renderOrdersSection() {
    if (!currentOrderItems.length) return;

    destroyAllSwipers();

    const { sections, sectionItemsMap } = buildSectionsData(currentOrderItems);

    resultsEl.innerHTML = sections.map(section =>
      renderPickupSection(section, sectionItemsMap[section.key] || [])
    ).join('');

    initAllSwipers(sections, sectionItemsMap);
    bindOrdersToggle();
  }

  function renderPickupSection(section, items) {
    const sectionKey = section.key;
    const isShowAll = sectionViewState[sectionKey];
    const hasItems = items.length > 0;

    if (!hasItems) return '';

    if (isShowAll) {
      return `
        <section class="orders-section show-all" id="section-${sectionKey}">
          <div class="orders-head">
            ${renderSectionHeading(section)}
            <button
              class="orders-more"
              data-section-key="${sectionKey}"
              type="button"
            >닫기</button>
          </div>

          <div class="orders-grid">
            ${items.map((item, index) => `
              <article class="order-card" style="view-transition-name: ${sectionKey}-order-card-${index};">
                <div class="order-thumb-wrap">
                  <img
                    class="order-thumb"
                    src="${escapeHtml(getImageUrl(item, index))}"
                    alt="${escapeHtml(item.productName || '상품 이미지')}"
                    loading="lazy"
                    decoding="async"
                    fetchpriority="low"
                    onerror="${getImageErrorHandler(index)}"
                  >
                  <div class="order-overlay">${escapeHtml(formatPickupLabel(item))}</div>
                </div>

              <div class="order-info">
                <div class="order-name">${escapeHtml(item.productName || '')}</div>

              <div class="order-bottom-row">
                <div class="order-qty-inline">
                  <span class="order-qty-inline-label">주문수 :</span>
                  <span class="order-qty-inline-num">${escapeHtml(item.quantity ?? 0)}</span>
                </div>

                <div class="order-price">${formatPriceHtml(item.price)}</div>
              </div>
              </div>
              </article>
            `).join('')}
          </div>
        </section>
      `;
    }

    return `
      <section class="orders-section" id="section-${sectionKey}">
        <div class="orders-head">
          ${renderSectionHeading(section)}
          <button
            class="orders-more"
            data-section-key="${sectionKey}"
            type="button"
          >모두보기</button>
        </div>

        <div class="swiper orders-swiper" id="ordersSwiper-${sectionKey}">
          <div class="swiper-wrapper">
            ${items.map((item, index) => `
              <div class="swiper-slide">
                <article class="order-card" style="view-transition-name: ${sectionKey}-order-card-${index};">
                  <div class="order-thumb-wrap">
                    <img
                      class="order-thumb"
                      src="${escapeHtml(getImageUrl(item, index))}"
                      alt="${escapeHtml(item.productName || '상품 이미지')}"
                    >
                    <div class="order-overlay">${escapeHtml(formatPickupLabel(item))}</div>
                  </div>

              <div class="order-info">
                <div class="order-name">${escapeHtml(item.productName || '')}</div>

              <div class="order-bottom-row">
                <div class="order-qty-inline">
                  <span class="order-qty-inline-label">주문수 :</span>
                  <span class="order-qty-inline-num">${escapeHtml(item.quantity ?? 0)}</span>
                </div>

                <div class="order-price">${formatPriceHtml(item.price)}</div>
              </div>
              </div>
                </article>
              </div>
            `).join('')}
          </div>
        </div>
      </section>
    `;
  }

  function initAllSwipers(sections = [], sectionItemsMap = {}) {
    sections.forEach(section => {
      if (sectionViewState[section.key]) return;

      const items = sectionItemsMap[section.key] || [];
      if (!items.length) return;

      const el = document.getElementById(`ordersSwiper-${section.key}`);
      if (!el) return;

      swiperMap[section.key] = new Swiper(el, {
        slidesPerView: 2.3,
        spaceBetween: 16,
        grabCursor: true,
        freeMode: {
          enabled: true,
          sticky: false
        },
        mousewheel: {
          enabled: true,
          forceToAxis: true,
          releaseOnEdges: true
        },
        breakpoints: {
          0: {
            spaceBetween: 12
          },
          641: {
            spaceBetween: 16
          }
        }
      });
    });
  }

  function destroyAllSwipers() {
    Object.values(swiperMap).forEach(swiper => {
      if (swiper && typeof swiper.destroy === 'function') {
        swiper.destroy(true, true);
      }
    });
    swiperMap = {};
  }

  function bindOrdersToggle() {
    const buttons = document.querySelectorAll('.orders-more[data-section-key]');
    if (!buttons.length) return;

    buttons.forEach(btn => {
      btn.addEventListener('click', async () => {
        const sectionKey = btn.dataset.sectionKey;
        if (!sectionKey) return;

        const run = () => {
          sectionViewState[sectionKey] = !sectionViewState[sectionKey];
          renderOrdersSection();
        };

        if (!document.startViewTransition) {
          run();
          return;
        }

        const transition = document.startViewTransition(() => {
          run();
        });

        await transition.finished;
      });
    });
  }

  keywordInput.addEventListener('focus', updateSearchState);
  keywordInput.addEventListener('blur', () => {
    setTimeout(updateSearchState, 80);
  });
  keywordInput.addEventListener('input', updateSearchState);
  keywordInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      search();
    }
  });

    searchBtn.addEventListener('click', search);

    prettyAlertConfirmEl.addEventListener('click', hidePrettyAlert);

    prettyAlertEl.addEventListener('click', e => {
      if (e.target === prettyAlertEl) {
        hidePrettyAlert();
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && prettyAlertEl.classList.contains('show')) {
        hidePrettyAlert();
      }
    });


function resetToHome() {
  destroyAllSwipers();

  currentOrderItems = [];
  currentSearchKeyword = '';
  currentSelectedCustomerLabel = '';
  sectionViewState = {
    [SECTION_KEYS.MY_ORDERS]: false,
    [SECTION_KEYS.TODAY_PICKUP]: false,
    [SECTION_KEYS.TOMORROW_PICKUP]: false,
    [SECTION_KEYS.MISSED_PICKUP]: false
  };

  keywordInput.value = '';
  messageEl.textContent = '';
  resultsEl.innerHTML = '';
  updateSearchState();
  hidePrettyAlert();
  showSearchGuide();
  keywordInput.blur();

  window.scrollTo({
    top: 0,
    behavior: 'smooth'
  });
}

homeLogoBtn.addEventListener('click', resetToHome);

homeLogoBtn.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    resetToHome();
  }
});

    init();


function getGrandpaLoaderSvgMarkup() {
  return '<img src="/loader-grandpa.svg" alt="" class="grandpa-loader-image" loading="eager" decoding="async">';
}

function renderLoadingState() {
  return `
    <div class="search-loading">
      <div class="search-loading-inner">
        <div class="search-loading-stage">
          <div class="search-loading-glow"></div>

          <div class="search-loading-orbit search-loading-orbit--outer">
            <span class="search-loading-dot search-loading-dot--1"></span>
            <span class="search-loading-dot search-loading-dot--2"></span>
          </div>

          <div class="search-loading-orbit search-loading-orbit--inner">
            <span class="search-loading-dot search-loading-dot--3"></span>
            <span class="search-loading-dot search-loading-dot--4"></span>
          </div>

          <div class="search-loading-grandpa">
            ${getGrandpaLoaderSvgMarkup()}
          </div>

          <div class="search-loading-pedestal"></div>
        </div>

        <div class="search-loading-title">주문을 불러오고 있습니다.</div>
        <div class="search-loading-subtitle">🎈 잠시만 기다려 주세요. 🎈</div>
      </div>
    </div>
  `;
}
</script>
