.search-loading {
  display: flex;

  justify-content: center;

}

.search-loading-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  text-align: center;
}

.search-loading-stage {
  position: relative;
  width: min(360px, 72vw);
  aspect-ratio: 1 / 1;
  display: grid;
  place-items: center;
  isolation: isolate;
}

.search-loading-stage::before {
  content: '';
  position: absolute;
  inset: 10%;
  border-radius: 50%;
  background:
    radial-gradient(circle at center, rgba(10, 88, 181, 0.16) 0%, rgba(10, 88, 181, 0.08) 35%, rgba(10, 88, 181, 0.02) 58%, transparent 72%);
  filter: blur(4px);
  animation: loaderHaloPulse 2.8s ease-in-out infinite;
  z-index: 0;
}

.search-loading-stage::after {
  content: '';
  position: absolute;
  inset: 6%;
  border-radius: 50%;
  border: 2px dashed rgba(10, 88, 181, 0.18);
  animation: loaderOrbitRotate 9s linear infinite;
  z-index: 1;
}

.search-loading-orbit {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  pointer-events: none;
}

.search-loading-orbit--outer {
  animation: loaderOrbitRotate 12s linear infinite;
}

.search-loading-orbit--inner {
  inset: 12%;
  animation: loaderOrbitRotateReverse 7s linear infinite;
}

.search-loading-dot {
  position: absolute;
  border-radius: 50%;
  background: #0051A0;
  box-shadow: 0 0 0 8px rgba(0, 81, 160, 0.08);
  opacity: 0.95;
}

.search-loading-dot--1 {
  width: 12px;
  height: 12px;
  top: 14%;
  left: 50%;
  transform: translateX(-50%);
}

.search-loading-dot--2 {
  width: 10px;
  height: 10px;
  right: 16%;
  top: 32%;
}

.search-loading-dot--3 {
  width: 14px;
  height: 14px;
  bottom: 20%;
  right: 24%;
}

.search-loading-dot--4 {
  width: 9px;
  height: 9px;
  bottom: 28%;
  left: 18%;
}

.search-loading-glow {
  position: absolute;
  width: 54%;
  height: 54%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.95) 0%, rgba(230,240,255,0.75) 34%, rgba(10, 88, 181, 0.10) 68%, transparent 100%);
  filter: blur(8px);
  z-index: 1;
  animation: loaderCorePulse 2.2s ease-in-out infinite;
}

.search-loading-grandpa {
  position: relative;
  width: min(235px, 46vw);
  z-index: 3;
  filter: drop-shadow(0 18px 24px rgba(0, 0, 0, 0.12));
  animation: loaderGrandpaFloat 2s ease-in-out infinite, loaderGrandpaTilt 4.2s ease-in-out infinite;
  transform-origin: 50% 82%;
}

.search-loading-grandpa svg {
  display: block;
  width: 100%;
  height: auto;
  overflow: visible;
}

.search-loading-grandpa img {
  display: block;
  width: 100%;
  height: auto;
}

.search-loading-grandpa::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 40%;
  background: linear-gradient(
    110deg,
    transparent 18%,
    rgba(255,255,255,0.00) 30%,
    rgba(255,255,255,0.38) 50%,
    rgba(255,255,255,0.00) 68%,
    transparent 82%
  );
  mix-blend-mode: screen;
  transform: translateX(-140%) skewX(-14deg);
  animation: loaderSheenSweep 2.8s ease-in-out infinite;
  pointer-events: none;
  z-index: 4;
}

.search-loading-grandpa svg path,
.search-loading-grandpa svg circle,
.search-loading-grandpa svg ellipse {
  transform-box: fill-box;
  transform-origin: center;
}

.search-loading-pedestal {
  position: absolute;
  bottom: 12%;
  left: 50%;
  width: 48%;
  height: 12%;
  border-radius: 999px;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.20) 0%, rgba(0,0,0,0.10) 45%, rgba(0,0,0,0.02) 72%, transparent 100%);
  transform: translateX(-50%);
  filter: blur(10px);
  z-index: 2;
  animation: loaderShadowPulse 2s ease-in-out infinite;
}

.search-loading-title {
  font-size: 48px;

  font-weight: 600;
  letter-spacing: -0.04em;

}

}

@keyframes loaderGrandpaFloat {
  0%, 100% { transform: translateY(0px) scale(1); }
  50% { transform: translateY(-14px) scale(1.018); }
}

@keyframes loaderGrandpaTilt {
  0%, 100% { rotate: -1.8deg; }
  50% { rotate: 2.1deg; }
}

@keyframes loaderHaloPulse {
  0%, 100% { transform: scale(0.96); opacity: 0.85; }
  50% { transform: scale(1.03); opacity: 1; }
}

@keyframes loaderCorePulse {
  0%, 100% { transform: scale(0.94); opacity: 0.82; }
  50% { transform: scale(1.05); opacity: 1; }
}

@keyframes loaderOrbitRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes loaderOrbitRotateReverse {
  from { transform: rotate(360deg); }
  to { transform: rotate(0deg); }
}

@keyframes loaderShadowPulse {
  0%, 100% { transform: translateX(-50%) scaleX(0.92); opacity: 0.42; }
  50% { transform: translateX(-50%) scaleX(1.06); opacity: 0.20; }
}

@keyframes loaderSheenSweep {
  0%, 100% { transform: translateX(-145%) skewX(-14deg); opacity: 0; }
  18% { opacity: 0; }
  38% { opacity: 1; }
  62% { opacity: 0.7; }
  100% { transform: translateX(145%) skewX(-14deg); opacity: 0; }
}

    0 2px 4px rgba(0,0,0,0.04),
    0 8px 24px rgba(0,0,0,0.07),
    0 1px 0 rgba(255,255,255,0.9) inset;
  transform:
    rotateX(var(--tilt-x))
    rotateY(var(--tilt-y))
    translate3d(0, 0, 0);
  transform-style: preserve-3d;
  will-change: transform;
  transition: box-shadow 260ms ease;
  animation: supportCardIntro 700ms cubic-bezier(0.16, 1, 0.3, 1) both;
  isolation: isolate;
}

.support-help-card.is-tilting {
  box-shadow:
    0 4px 8px rgba(0,0,0,0.05),
    0 16px 36px rgba(0,0,0,0.09),
    0 1px 0 rgba(255,255,255,0.96) inset;
}

/* Header: 피그마 pad T0 R20 B0 L20, 헤더-카테고리 gap 20 */
.support-help-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 24px 20px 0;
  margin-bottom: 20px;
  transform: translateZ(42px);
  animation: supportHeaderIn 600ms 120ms cubic-bezier(0.16, 1, 0.3, 1) both;
}

.support-help-header-text {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* 피그마: 14px 600 #0a58b5 */
.support-help-label {
  font-size: 14px;
  font-weight: 600;
  color: #0a58b5;
  letter-spacing: 0;
  line-height: 1.2;
  opacity: 0;
  animation: supportTextFadeUp 500ms 200ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* 피그마: 24px 400 잠실체 */
.support-help-title {
  margin: 0;
  font-family: 'Pretendard', Arial, sans-serif;
  font-size: 21px;
  line-height: 1.2;
  font-weight: 600;
  letter-spacing: 0;
  color: #111;
  word-break: keep-all;
  opacity: 0;
  animation: supportTextFadeUp 540ms 280ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

/* 피그마: 50×50 원형 */
.support-help-avatar-wrap {
  position: relative;
  width: 50px;
  height: 50px;
  border-radius: 999px;
  flex-shrink: 0;
  transform: translateZ(56px);
  animation: supportAvatarIntro 600ms 160ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

.support-help-avatar-wrap::before,
.support-help-avatar-wrap::after {
  content: '';
  position: absolute;
  inset: -5px;
  border-radius: inherit;
  border: 1.5px solid rgba(10, 88, 181, 0.16);
  opacity: 0;
  transform: scale(0.86);
  pointer-events: none;
}

.support-help-avatar-wrap::before {
  animation: supportAvatarRing 9s 1.2s ease-out infinite;
}

.support-help-avatar-wrap::after {
  animation: supportAvatarRing 9s 1.8s ease-out infinite;
}

.support-help-avatar {
  position: relative;
  z-index: 1;
  display: block;
  width: 100%;
  height: 100%;
  border-radius: inherit;
  object-fit: cover;
  background: #eaf4ff;
  box-shadow:
    0 6px 14px rgba(10, 88, 181, 0.14),
    0 0 0 1.5px rgba(255,255,255,0.95);
}

/* 피그마: pad R20 L20, row-gap 16, col-gap 4 */
.support-help-categories {
  display: grid;
  grid-template-columns: 1fr 1fr;
  row-gap: 16px;
  column-gap: 4px;
  padding: 0 20px;
  transform: translateZ(36px);
}

/* 카테고리 아이템 스태거 인트로 */
.support-help-category-item {
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0;
  animation: supportCatItemIn 520ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.support-help-category-item:nth-child(1) { animation-delay: 300ms; }
.support-help-category-item:nth-child(2) { animation-delay: 380ms; }
.support-help-category-item:nth-child(3) { animation-delay: 460ms; }
.support-help-category-item:nth-child(4) { animation-delay: 540ms; }

/* 피그마: 48×48 */
.support-help-category-icon {
  width: 48px;
  height: 48px;
  border-radius: 8px;
  object-fit: cover;
  flex-shrink: 0;
  transition: transform 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
}

.support-help-category-text {
  flex: 1;
  min-width: 0;
}

/* 피그마: 17px 400 잠실체 */
.support-help-category-main {
  font-family: 'Pretendard', Arial, sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: #111;
  letter-spacing: 0;
  line-height: 1.2;
}

/* 피그마: 12px 500 */
.support-help-category-sub {
  font-size: 12px;
  font-weight: 500;
  color: #888;
  letter-spacing: 0;
  line-height: 1.3;
  margin-top: 4px;
  word-break: keep-all;
}

/* 피그마: margin = gap(16) + buttonArea paddingTop(10) = 26px
   sides 10, bottom 10 | height 56 | radius 6 | font 19 | NO shadow */
.support-help-button {
  position: relative;
  z-index: 1;
  margin: 26px 10px 10px;
  width: calc(100% - 20px);
  height: 56px;
  border: none;
  border-radius: 6px;
  background: #ffe812;
  color: #38201F;
  font-family: 'Pretendard', Arial, sans-serif;
  font-size: 19px;
  line-height: 1;
  font-weight: 600;
  letter-spacing: -0.02em;
  cursor: pointer;
  overflow: hidden;
  transform: translateZ(56px);
  transition: transform 180ms cubic-bezier(0.34, 1.56, 0.64, 1), filter 150ms ease;
  animation: supportBtnIn 580ms 480ms cubic-bezier(0.16, 1, 0.3, 1) both;
}

/* 버튼 shimmer */
.support-help-button::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    108deg,
    transparent 25%,
    rgba(255,255,255,0.52) 50%,
    transparent 75%
  );
  transform: translateX(-130%);
  animation: btnShimmer 4s 1.4s ease-in-out infinite;
  pointer-events: none;
}

.support-help-button:active {
  transform: translateZ(56px) scale(0.974);
  filter: brightness(0.97);
}

.support-help-kakao-svg {
  position: relative;
  z-index: 1;
  display: inline-block;
  width: 22px;
  height: 22px;
  margin-right: 5px;
  vertical-align: -6px;
}

.support-help-button-text {
  position: relative;
  z-index: 1;
  font-weight: 600;
}

/* === Tablet (641–1024px) === */
@media (min-width: 641px) and (max-width: 1024px) {
  .support-help-wrap {
    padding: 0 20px;
    margin-top: 44px;
    margin-bottom: 24px;
    perspective: 1200px;
  }

  .support-help-card {
    border-radius: 10px;
    box-shadow:
      0 3px 6px rgba(0,0,0,0.04),
      0 12px 32px rgba(0,0,0,0.08),
      0 1px 0 rgba(255,255,255,0.92) inset;
  }

  .support-help-card.is-tilting {
    box-shadow:
      0 6px 12px rgba(0,0,0,0.05),
      0 22px 48px rgba(0,0,0,0.10),
      0 1px 0 rgba(255,255,255,0.96) inset;
  }

  .support-help-header {
    padding: 30px 26px 0;
    margin-bottom: 26px;
  }

  .support-help-header-text { gap: 7px; }

  .support-help-label { font-size: 15px; }

  .support-help-title { font-size: 26px; }

  .support-help-avatar-wrap {
    width: 56px;
    height: 56px;
    transform: translateZ(62px);
  }

  .support-help-categories {
    row-gap: 22px;
    column-gap: 6px;
    padding: 0 26px;
  }

  .support-help-category-item { gap: 12px; }

  .support-help-category-icon {
    width: 54px;
    height: 54px;
    border-radius: 10px;
  }

  .support-help-category-main { font-size: 18px; }

  .support-help-category-sub { font-size: 13px; }

  .support-help-button {
    margin: 34px 12px 12px;
    width: calc(100% - 24px);
    height: 60px;
    border-radius: 9px;
    font-size: 20px;
    transform: translateZ(62px);
  }

  .support-help-button:active {
    transform: translateZ(62px) scale(0.978);
  }

  .support-help-kakao-svg {
    width: 24px;
    height: 24px;
    vertical-align: -6px;
  }
}

/* === Desktop (1025px+) === */
@media (min-width: 1025px) {
  .support-help-wrap {
    padding: 0 24px;
    margin-top: 56px;
    margin-bottom: 32px;
    perspective: 1400px;
  }

  .support-help-card {
    border-radius: 14px;
    box-shadow:
      0 4px 8px rgba(0,0,0,0.04),
      0 16px 40px rgba(0,0,0,0.07),
      0 1px 0 rgba(255,255,255,0.95) inset;
  }

  .support-help-card.is-tilting {
    box-shadow:
      0 8px 16px rgba(0,0,0,0.05),
      0 28px 56px rgba(0,0,0,0.09),
      0 1px 0 rgba(255,255,255,0.97) inset;
  }

  .support-help-header {
    padding: 36px 32px 0;
    margin-bottom: 30px;
  }

  .support-help-header-text { gap: 8px; }

  .support-help-label { font-size: 16px; }

  .support-help-title { font-size: 28px; }

  .support-help-avatar-wrap {
    width: 62px;
    height: 62px;
    transform: translateZ(70px);
  }

  .support-help-avatar {
    box-shadow:
      0 8px 20px rgba(10, 88, 181, 0.15),
      0 0 0 1.5px rgba(255,255,255,0.95);
  }

  .support-help-categories {
    row-gap: 26px;
    column-gap: 8px;
    padding: 0 32px;
  }

  .support-help-category-item { gap: 14px; }

  .support-help-category-icon {
    width: 58px;
    height: 58px;
    border-radius: 12px;
  }

  .support-help-category-main { font-size: 20px; }

  .support-help-category-sub { font-size: 14px; }

  .support-help-button {
    margin: 40px 14px 14px;
    width: calc(100% - 28px);
    height: 64px;
    border-radius: 11px;
    font-size: 21px;
    transform: translateZ(70px);
  }

  .support-help-button:active {
    transform: translateZ(70px) scale(0.980);
  }

  .support-help-kakao-svg {
    width: 26px;
    height: 26px;
    margin-right: 6px;
    vertical-align: -7px;
  }
}

/* Desktop hover — icon lift */
@media (hover: hover) and (min-width: 641px) {
  .support-help-category-item:hover .support-help-category-icon {
    transform: scale(1.07) translateY(-2px);
  }
}

/* === Keyframes === */
@keyframes supportCardIntro {
  from {
    opacity: 0;
    transform: translate3d(0, 28px, 0) rotateX(0deg) rotateY(0deg) scale(0.97);
  }
  to {
    opacity: 1;
    transform: translate3d(0, 0, 0) rotateX(var(--tilt-x)) rotateY(var(--tilt-y)) scale(1);
  }
}

@keyframes supportHeaderIn {
  from { opacity: 0; transform: translateZ(42px) translateY(14px); }
  to   { opacity: 1; transform: translateZ(42px) translateY(0); }
}

@keyframes supportTextFadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes supportAvatarIntro {
  from { opacity: 0; transform: translateZ(56px) scale(0.72); }
  50%  { transform: translateZ(56px) scale(1.06); }
  to   { opacity: 1; transform: translateZ(56px) scale(1); }
}

@keyframes supportAvatarRing {
  0%, 72% { opacity: 0; transform: scale(0.86); }
  78%     { opacity: 0.32; transform: scale(0.96); }
  90%     { opacity: 0; transform: scale(1.38); }
  100%    { opacity: 0; transform: scale(1.38); }
}

@keyframes supportCatItemIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes supportBtnIn {
  from { opacity: 0; transform: translateZ(56px) translateY(16px) scale(0.97); }
  to   { opacity: 1; transform: translateZ(56px) translateY(0) scale(1); }
}

@keyframes btnShimmer {
  0%        { transform: translateX(-130%); opacity: 0; }
  8%        { opacity: 1; }
  42%, 100% { transform: translateX(130%); opacity: 0; }
}

@media (prefers-reduced-motion: reduce) {
  .support-help-card,
  .support-help-header,
  .support-help-label,
  .support-help-title,
  .support-help-avatar-wrap,
  .support-help-avatar-wrap::before,
  .support-help-avatar-wrap::after,
  .support-help-category-item,
  .support-help-button,
  .support-help-button::before {
    animation: none !important;
    opacity: 1 !important;
  }
  .support-help-card { transform: none !important; }
}


/* ============================================================
   Result Topbar — 검색결과 화면의 상단 고정 탑바
   모바일 우선, safe-area 지원, 빠르고 부드러운 애니메이션
============================================================ */

.result-topbar {
  display: none !important;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
  visibility: hidden;
  opacity: 0;
  background: rgba(255, 255, 255, 0);
  box-shadow: none;
  pointer-events: none;
  transition:
    opacity 180ms ease,
    visibility 180ms ease,
    background 240ms ease,
    box-shadow 240ms ease;
}

.result-topbar.is-visible {
  visibility: visible;
  opacity: 1;
  background: rgba(255, 255, 255, 1);
  box-shadow: 0 2px 16px rgba(0, 0, 0, 0.09);
  pointer-events: auto;
}

/* 탑바 상단 행: 만만 로고 + 서치필드 */
.rh-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: calc(12px + env(safe-area-inset-top, 0px)) 14px 10px;
}

/* 만만 로고 — JS FLIP 애니메이션으로 제어 */
.rh-logo {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  cursor: pointer;
  opacity: 0;          /* JS가 FLIP 후 1로 변경 */
  will-change: transform;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.rh-logo svg {
  height: 26px;
  width: auto;
  display: block;
}

/* 서치 랩 — JS FLIP 애니메이션으로 제어 */
.rh-search-wrap {
  flex: 1;
  position: relative;
  min-width: 0;
  opacity: 0;          /* JS가 FLIP 후 1로 변경 */
  will-change: transform;
}

.rh-input {
  width: 100%;
  height: 42px;
  border: 1.5px solid transparent;
  border-radius: 999px;
  background: #f3f3f3;
  padding: 0 78px 0 18px;
  font-size: 17px;
  font-weight: 500;
  color: #222;
  font-family: 'Pretendard', sans-serif;
  letter-spacing: -0.03em;
  outline: none;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color 0.15s ease, background 0.15s ease;
}

.rh-input:focus {
  border-color: #000;
  background: #fff;
}

.rh-input::placeholder {
  color: #aaa;
  font-weight: 400;
  font-size: 15px;
}

.rh-btn {
  position: absolute;
  top: 50%;
  right: 4px;
  transform: translateY(-50%);
  height: 34px;
  padding: 0 16px;
  border: none;
  border-radius: 999px;
  background: #0a58b5;
  color: #fff;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Pretendard', sans-serif;
  letter-spacing: -0.02em;
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.1s ease;
}

.rh-btn:active {
  opacity: 0.82;
}

/* 탭 */
.rh-tabs {
  display: flex;
  border-top: 1px solid #ebebeb;
  opacity: 0;
}

.rh-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 7px 0 9px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: 'Pretendard', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: #bbb;
  transition: color 0.15s ease;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}

.rh-tab.is-active {
  color: #111;
  font-weight: 700;
}

.rh-tab-underline {
  position: absolute;
  bottom: 0;
  left: 18%;
  right: 18%;
  height: 2.5px;
  background: #111;
  border-radius: 2px;
  transform: scaleX(0);
  transform-origin: center;
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.rh-tab.is-active .rh-tab-underline {
  transform: scaleX(1);
}

.rh-tab-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.rh-tab-icon svg {
  width: 20px;
  height: 20px;
}

/* 탑바가 활성화될 때 페이지 레이아웃 조정 */
body.has-results {
  background: #f8f9fa;
}

body.has-results .page {
  padding-bottom: 32px;
  background: #f8f9fa;
}

body.has-results .results-wrap {
  margin-top: 22px;
}

body.schedule-modal-open {
  overflow: hidden;
}

body.schedule-modal-open .result-topbar {
  pointer-events: none !important;
}

body.schedule-modal-open .page > :not(.schedule-modal) {
  pointer-events: none;
}

/* .top-stage는 JS가 inline style로 애니메이션 처리 */
.top-stage {
  transition: max-height 0.22s cubic-bezier(0.4, 0, 1, 1), opacity 0.16s ease;
}

/* 스케쥴 탭 패널 */
.schedule-panel-wrap {
  background: #f8f9fa;
  min-height: max(70vh, var(--result-panel-min-height));
  padding: 0 0 76px;
  color: #111;
}

.schedule-content {
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
}

.schedule-week-host {
  display: none;
  position: relative;
  z-index: 220;
  background: transparent;
  padding: 0;
  box-shadow: none;
}

.schedule-week-placeholder {
  display: none;
  height: 0;
}

.schedule-week-placeholder.is-active {
  display: block;
  height: var(--schedule-week-current-height, 0px);
}

.schedule-week-host.is-visible {
  display: block;
  margin-top: 16px;
}

.schedule-modal .schedule-week-host.is-visible {
  display: block;
  position: sticky;
  top: 0;
  z-index: 4;
  margin-top: 0;
  background: #fff;
  touch-action: pan-x;
}

.schedule-week-host.is-sticky-ready {
  position: relative;
}

.schedule-week-host.is-sticky-ready.is-fixed {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 260;
  margin-top: 0;
}

.schedule-week-card {
  width: 100%;
  max-width: 760px;
  margin: 0 auto;
  background: #fff;
  border-radius: 0;
  overflow: hidden;
  box-shadow: 0 10px 22px rgba(15, 23, 42, 0.10);
}

.schedule-weekdays {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  padding: 10px 14px 0;
}

.schedule-weekday {
  text-align: center;
  font-size: 12px;
  line-height: 1;
  font-weight: 700;
  color: #8a929d;
}

.schedule-weekday.is-sunday {
  color: #e54848;
}

.schedule-weekday.is-saturday {
  color: #0a58b5;
}

.schedule-week-swiper {
  width: 100%;
  overflow: hidden;
  padding: 26px 14px 18px;
}

.schedule-week-swiper .swiper-wrapper {
  align-items: stretch;
}

.schedule-day-slide {
  height: auto;
  display: grid;
  grid-template-rows: 16px 58px;
  justify-items: center;
  align-items: start;
}

.schedule-day-btn {
  appearance: none;
  -webkit-appearance: none;
  border: none;
  background: transparent;
  width: 100%;
  min-width: 0;
  min-height: 58px;
  padding: 4px 0 0;
  display: grid;
  grid-template-rows: 34px 16px;
  justify-items: center;
  align-items: center;
  color: #20242a;
  font-family: 'Pretendard', Arial, sans-serif;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.schedule-day-circle {
  width: 34px;
  height: 34px;
  border-radius: 999px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  line-height: 1;
  font-weight: 700;
  transition:
    background-color 180ms ease,
    color 180ms ease,
    transform 180ms cubic-bezier(0.22, 1, 0.36, 1);
}

.schedule-day-btn.is-sunday,
.schedule-day-btn.is-holiday {
  color: #e54848;
}

.schedule-day-btn.is-saturday {
  color: #0a58b5;
}

.schedule-day-btn.is-selected .schedule-day-circle {
  background: #111;
  color: #fff;
  transform: scale(1.02);
}

.schedule-day-btn.is-selected.is-sunday .schedule-day-circle,
.schedule-day-btn.is-selected.is-holiday .schedule-day-circle {
  background: #e54848;
}

.schedule-day-btn.is-selected.is-saturday .schedule-day-circle {
  background: #0a58b5;
}

.schedule-day-meta {
  min-height: 16px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  font-size: 10px;
  line-height: 1;
  font-weight: 700;
  color: #8a929d;
}

.schedule-day-dot {
  width: 6px;
  height: 6px;
  border-radius: 999px;
  background: #0a58b5;
  display: none;
}

.schedule-day-btn.has-pickups .schedule-day-dot {
  display: block;

    function init() {
    fetch('/api/config')
        .then(res => res.json())
        .then(config => {
        if (config && config.storeName) {
            storeNameEl.textContent = config.storeName;
        }
        })
        .catch(error => {
        console.error('config load error:', error);
        });

    updateSearchState();
    syncSearchGuide();
    }

  function updateSearchState() {
    const hasValue = keywordInput.value.trim().length > 0;
    const isFocused = document.activeElement === keywordInput;
    const topStage = document.querySelector('.top-stage');

    searchRow.classList.toggle('is-focused', isFocused);
    if (topStage) {
      topStage.classList.toggle('search-is-focused', isFocused);
      topStage.classList.toggle('search-has-value', hasValue);
    }

    if (hasValue || isFocused) {
      searchRow.classList.add('active');
    } else {
      searchRow.classList.remove('active');
    }
  }

function showSearchGuide() {
  if (!searchGuideEl) return;
  searchGuideEl.classList.remove('is-hidden');
}

function hideSearchGuide() {
  if (!searchGuideEl) return;
  searchGuideEl.classList.add('is-hidden');
}

function syncSearchGuide() {
  const hasKeyword = keywordInput.value.trim().length > 0;
  const hasResults = resultsEl.innerHTML.trim().length > 0;
  const hasMessage = messageEl.textContent.trim().length > 0;

  if (!hasKeyword && !hasResults && !hasMessage) {
    showSearchGuide();
  } else {

function hasCurrentSearchSurface(keyword) {
  const normalizedKeyword = sanitizeFourDigitInput(keyword).trim();

  return (

    currentSearchKeyword === normalizedKeyword &&
    (
      searchRequestInFlight ||
      currentOrderItems.length > 0 ||
      resultsEl.innerHTML.trim().length > 0 ||
      messageEl.textContent.trim().length > 0
    )
  );
}

function shouldRunKeyboardConfirmSearch(keyword, submitButton) {
  const normalizedKeyword = sanitizeFourDigitInput(keyword).trim();

  if (!/^\d{4}$/.test(normalizedKeyword)) return false;
  if (document.activeElement === submitButton) return false;
  if (hasCurrentSearchSurface(normalizedKeyword)) return false;

}

function search(selectedCustomerLabel = '') {
  keywordInput.value = sanitizeFourDigitInput(keywordInput.value);
  const keyword = keywordInput.value.trim();

  if (!keyword) {
    messageEl.textContent = '휴대폰 번호 끝 4자리 입력';
    resultsEl.innerHTML = '';
    updateSearchState();
    syncSearchGuide();
    return;
  }

  if (!/^\d{4}$/.test(keyword)) {
    showPrettyAlert('휴대폰 번호 끝 4자리 모두 입력해주시기 바랍니다.');
    return;
  }

  const nextSelectedCustomerLabel = selectedCustomerLabel ? decodeURIComponent(selectedCustomerLabel) : '';
  const requestSeq = searchRequestSeq + 1;

  searchRequestSeq = requestSeq;
  searchRequestInFlight = true;
  currentSearchKeyword = keyword;
  currentSelectedCustomerLabel = nextSelectedCustomerLabel;
  scheduleState.selectedDateKey = getSeoulTodayInfo().dateKey;
  resetResultTabScrollPositions();
  resetSectionViewState();
  closeScheduleModal({ clear: true, animate: false });
  resetScheduleOpenControls();

  document.body.classList.add('has-results');
  hideResultTabs();
  setActiveTab('orders', { slide: false, restoreScroll: false });

  hideSearchGuide();
  messageEl.textContent = '';
  resultsEl.innerHTML = renderLoadingState();

    fetch('/api/search-orders', {
    method: 'POST',
    headers: {
        'Content-Type': 'application/json'
    },
    body: JSON.stringify({
        keyword,
        selectedCustomerLabel: nextSelectedCustomerLabel
    })
    })
    .then(res => res.json())
    .then(result => {
      if (requestSeq !== searchRequestSeq) return;
      renderResult(result);
    })
    .catch(error => {
      if (requestSeq !== searchRequestSeq) return;
      renderError(error);
    })
    .finally(() => {
      if (requestSeq === searchRequestSeq) {
        searchRequestInFlight = false;
      }
    });
}

    if (!result || !result.ok) {
      const msg = (result && result.message) || '조회에 실패했습니다.';

    });

    const parts = formatter.formatToParts(new Date());
    const year = Number(parts.find(p => p.type === 'year')?.value || 0);
    const month = Number(parts.find(p => p.type === 'month')?.value || 0);
    const day = Number(parts.find(p => p.type === 'day')?.value || 0);

    return toDateInfo(new Date(year, month - 1, day));
  }

    base.setDate(base.getDate() + diff);
    return toDateInfo(base);

  function inferYearForMonthDay(month, day) {
    const seoulToday = getSeoulTodayInfo();

  function parsePickupDateValue(value) {
    const text = String(value || '').trim();
    if (!text) return null;

    let match = text.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
    if (match) {
      const year = Number(match[1]);
      const month = Number(match[2]);
      const day = Number(match[3]);
      const date = new Date(year, month - 1, day);
      return Number.isNaN(date.getTime()) ? null : new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    match = text.match(/(\d{1,2})\D+(\d{1,2})/);
    if (match) {
      const month = Number(match[1]);
      const day = Number(match[2]);
      const year = inferYearForMonthDay(month, day);
      const date = new Date(year, month - 1, day);
      return Number.isNaN(date.getTime()) ? null : new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    return null;
  }

  function formatPickupDateDisplay(date, fallbackText = '') {

  }

  }

function normalizeOrderItems(items) {

function dateFromKey(dateKey) {

  if (!match) return null;
  const date = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
  return Number.isNaN(date.getTime()) ? null : date;

function addDaysToDate(date, days) {

function getStartOfWeekDate(date) {

function getHolidayInfo(date) {

  const name = KOREAN_PUBLIC_HOLIDAYS[key] || KOREAN_FIXED_PUBLIC_HOLIDAYS[fixedKey] || '';

function groupItemsByPickupDate(items) {

  normalizeOrderItems(items).forEach(item => {
    if (!item.pickupDateKey) return;
    if (!grouped.has(item.pickupDateKey)) grouped.set(item.pickupDateKey, []);
    grouped.get(item.pickupDateKey).push(item);
  });

  grouped.forEach((group, dateKey) => {
    grouped.set(dateKey, sortItemsByOrderSheetDate(group));
  });

  return grouped;

function getDateTime(date) {
  return new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
}

function clampDateToRange(date, start, end) {
  const time = getDateTime(date);
  const startTime = getDateTime(start);
  const endTime = getDateTime(end);

  if (time < startTime) return new Date(start);
  if (time > endTime) return new Date(end);
  return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function getScheduleDefaultWindow(today = getSeoulTodayInfo().dateObj) {
  const start = addDaysToDate(today, -SCHEDULE_CENTER_OFFSET_DAYS);
  const end = addDaysToDate(start, 6);
  return { start, end };
}

function getScheduleRange(itemsByDate) {
  const today = getSeoulTodayInfo().dateObj;
  const defaultWindow = getScheduleDefaultWindow(today);
  const visibleStart = addDaysToDate(today, -SCHEDULE_VISIBLE_DAYS_AFTER_PICKUP);
  let start = new Date(defaultWindow.start);
  let end = new Date(defaultWindow.end);

  itemsByDate.forEach((items, dateKey) => {
    if (!items.length) return;
    const date = dateFromKey(dateKey);
    if (!date) return;

    if (getDateTime(date) < getDateTime(defaultWindow.start)) {
      const boundedDate = getDateTime(date) < getDateTime(visibleStart) ? visibleStart : date;
      if (getDateTime(boundedDate) < getDateTime(start)) start = new Date(boundedDate);
    }

    if (getDateTime(date) > getDateTime(defaultWindow.end)) {
      if (getDateTime(date) > getDateTime(end)) end = new Date(date);
    }
  });

  return {
    start,
    end,
    defaultStart: defaultWindow.start,
    defaultEnd: defaultWindow.end
  };
}

function getScheduleDateList(start, end) {
  const dates = [];
  for (let date = new Date(start); date <= end; date = addDaysToDate(date, 1)) {
    dates.push(new Date(date));
  }
  return dates;
}

function isScheduleDateAccessible(date) {
  const start = dateFromKey(scheduleState.rangeStartKey);
  const end = dateFromKey(scheduleState.rangeEndKey);
  if (!start || !end) return true;

  const time = getDateTime(date);
  return time >= getDateTime(start) && time <= getDateTime(end);
}

function sortItemsByOrderSheetDate(items) {
  return [...items].sort((a, b) => {
    if (a.orderDateValue !== b.orderDateValue) {
      return b.orderDateValue - a.orderDateValue; // 최신 시트 날짜 먼저
    }

    const aPickup = a.pickupDateObj ? a.pickupDateObj.getTime() : Number.MAX_SAFE_INTEGER;
    const bPickup = b.pickupDateObj ? b.pickupDateObj.getTime() : Number.MAX_SAFE_INTEGER;

    if (aPickup !== bPickup) {
      return aPickup - bPickup;
    }

    return String(a.productName || '').localeCompare(String(b.productName || ''), 'ko');
  });
}

function sortMissedItemsByLatestPickup(items) {
  return [...items].sort((a, b) => {
    const aPickup = a.pickupDateObj ? a.pickupDateObj.getTime() : -Infinity;
    const bPickup = b.pickupDateObj ? b.pickupDateObj.getTime() : -Infinity;

    if (aPickup !== bPickup) {
      return bPickup - aPickup; // 픽업일 최신순
    }

    if (a.orderDateValue !== b.orderDateValue) {
      return b.orderDateValue - a.orderDateValue;
    }

    return String(a.productName || '').localeCompare(String(b.productName || ''), 'ko');
  });
}

function buildSectionsData(items) {

      normalized.filter(item => item.pickupDateKey === target.dateKey)
    );

    if (targetItems.length) {
      sections.push({

        subtitle: target.subtitle
      });
    }
  });

  const targetKeySet = new Set(targets.map(target => target.dateKey));
  const todayStartTime = seoulToday.dateObj.getTime();

  const missedItems = sortMissedItemsByLatestPickup(
    normalized.filter(item => {
      if (!item.pickupDateObj) return false;
      if (targetKeySet.has(item.pickupDateKey)) return false;
      return item.pickupDateObj.getTime() < todayStartTime;
    })
  );

  sectionItemsMap[SECTION_KEYS.MISSED_PICKUP] = missedItems;

  if (missedItems.length) {
    sections.push({
      key: SECTION_KEYS.MISSED_PICKUP,
      title: '🛍️ 픽업 놓치신 물건은 없으신가요?'

    sectionItemsMap
  };
}

  }

  function getOrderItemKey(item, index) {
    return [
      item.customerLabel || '',
      item.orderDate || '',
      item.pickupDate || '',
      item.productName || '',
      item.quantity ?? '',
      item.price ?? '',
      index
    ].map(value => String(value).replaceAll('|', '/')).join('|');
  }

  function getOrderSectionEl(sectionKey) {
    return document.getElementById(`section-${sectionKey}`);
  }

  function collectOrderCardSnapshots(sectionKey) {
    const section = getOrderSectionEl(sectionKey);
    const snapshots = new Map();

    if (!section) return snapshots;

    section.querySelectorAll('.order-card[data-order-key]').forEach(card => {
      const clone = card.cloneNode(true);

      clone.classList.add('order-card-flight');
      clone.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
      clone.querySelectorAll('img').forEach(img => {
        img.loading = 'eager';
      });

      snapshots.set(card.dataset.orderKey, {
        rect: card.getBoundingClientRect(),
        clone
      });
    });

    return snapshots;
  }

  function settleOrderLayoutChange() {
    requestAnimationFrame(() => {
      updateOrderNameMarquees();
      syncResultPanelsHeight();
      if (resultPanelsSwiper) {
        resultPanelsSwiper.update();
        resultPanelsSwiper.updateAutoHeight?.(0);
      }
    });
  }

  function easeOrderFlip(progress) {
    const clampedProgress = clamp(progress, 0, 1);
    return 1 - Math.pow(1 - clampedProgress, 4);
  }

  function cleanupOrderFlightAnimation(section = null) {
    if (orderFlipAnimationFrame) {
      cancelAnimationFrame(orderFlipAnimationFrame);
      orderFlipAnimationFrame = null;
    }

    if (orderFlightLayer) {
      orderFlightLayer.remove();
      orderFlightLayer = null;
    }

    if (section) {
      section.classList.remove('animating');
    } else {
      document.querySelectorAll('.orders-section.animating').forEach(animatingSection => {
        animatingSection.classList.remove('animating');
      });
    }
  }

  function animateOrderCardsFromSnapshots(sectionKey, fromSnapshots) {
    const section = getOrderSectionEl(sectionKey);
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    cleanupOrderFlightAnimation();

    if (!section || !fromSnapshots?.size || prefersReducedMotion) {
      settleOrderLayoutChange();
      return;
    }

    const layer = document.createElement('div');
    layer.className = 'order-card-flight-layer';
    document.body.appendChild(layer);
    orderFlightLayer = layer;

    section.classList.add('animating');

    const cards = Array.from(section.querySelectorAll('.order-card[data-order-key]'));
    const cardStates = cards.map((card, index) => {
      const snapshot = fromSnapshots.get(card.dataset.orderKey);
      const to = card.getBoundingClientRect();
      const from = snapshot?.rect || {
        left: to.left,
        top: to.top + 12,
        width: to.width
      };
      const isSamePosition =
        Math.abs(from.left - to.left) < 0.5 &&
        Math.abs(from.top - to.top) < 0.5 &&
        Math.abs((from.width || 0) - to.width) < 0.5;

      if (isSamePosition) return null;

      const clone = snapshot?.clone || card.cloneNode(true);

      clone.classList.add('order-card-flight');
      clone.style.width = `${Math.max(from.width || to.width, 1)}px`;
      clone.style.transform = `translate3d(${from.left}px, ${from.top}px, 0)`;
      clone.style.opacity = snapshot ? '0.98' : '0';
      layer.appendChild(clone);

      return {
        clone,
        hasFrom: Boolean(snapshot),
        delay: snapshot ? 0 : Math.min(index * 10, 80),
        duration: 420,
        from,
        to
      };
    }).filter(Boolean);

    if (!cardStates.length) {
      cleanupOrderFlightAnimation(section);
      settleOrderLayoutChange();
      return;
    }

    const startedAt = performance.now();
    const totalDuration = Math.max(...cardStates.map(state => state.delay + state.duration));

    const step = now => {
      const elapsed = now - startedAt;

      cardStates.forEach(state => {
        const rawProgress = (elapsed - state.delay) / state.duration;
        const progress = clamp(rawProgress, 0, 1);
        const eased = easeOrderFlip(progress);
        const x = state.from.left + ((state.to.left - state.from.left) * eased);
        const y = state.from.top + ((state.to.top - state.from.top) * eased);
        const width = state.from.width + ((state.to.width - state.from.width) * eased);
        const opacity = state.hasFrom
          ? 0.98 + (0.02 * eased)
          : eased;

        state.clone.style.width = `${Math.max(width, 1)}px`;
        state.clone.style.transform = `translate3d(${x}px, ${y}px, 0)`;
        state.clone.style.opacity = opacity.toFixed(3);
      });

      if (elapsed < totalDuration) {
        orderFlipAnimationFrame = requestAnimationFrame(step);
        return;
      }

      orderFlipAnimationFrame = null;
      cleanupOrderFlightAnimation(section);
      settleOrderLayoutChange();
    };

    orderFlipAnimationFrame = requestAnimationFrame(step);
  }

  function getScheduleCalendarPreviewData(items) {
    const normalized = normalizeOrderItems(items)
      .map((item, index) => ({ ...item, previewImageIndex: index }))
      .filter(item => item.pickupDateObj);

    if (!normalized.length) return null;

    const groups = new Map();
    normalized.forEach(item => {
      if (!groups.has(item.pickupDateKey)) {
        groups.set(item.pickupDateKey, {
          date: item.pickupDateObj,
          items: []
        });
      }

      groups.get(item.pickupDateKey).items.push(item);
    });

    const todayTime = getDateTime(getSeoulTodayInfo().dateObj);
    const groupedDays = Array.from(groups.values());
    const futureDays = groupedDays
      .filter(group => getDateTime(group.date) >= todayTime)
      .sort((a, b) => getDateTime(a.date) - getDateTime(b.date));
    const pastDays = groupedDays
      .filter(group => getDateTime(group.date) < todayTime)
      .sort((a, b) => getDateTime(b.date) - getDateTime(a.date));
    const selectedGroup = futureDays[0] || pastDays[0];

    if (!selectedGroup) return null;

    const sortedItems = sortItemsByOrderSheetDate(selectedGroup.items);
    const imageItems = sortedItems.slice(0, 2);
    const count = sortedItems.length;

    return {
      count,
      dateLabel: formatPickupDateDisplay(selectedGroup.date),
      isFuture: Boolean(futureDays[0]),
      images: imageItems.map((item, index) => {
        const imageIndex = Number.isFinite(item.previewImageIndex) ? item.previewImageIndex : index;
        return {
          src: getImageUrl(item, imageIndex),
          alt: item.productName || '픽업상품 이미지',
          fallbackIndex: imageIndex
        };
      })
    };
  }

  function renderScheduleCalendarEntryCard(items) {
    const preview = getScheduleCalendarPreviewData(items);
    if (!preview) return '';

    const [frontImage, backImage] = preview.images;
    const hasBackImage = Boolean(backImage);
    const meta = `${preview.dateLabel} · ${preview.isFuture ? '찾을 상품' : '최근 픽업'} ${preview.count}종`;

    return `
      <section class="schedule-calendar-entry-wrap" aria-label="픽업 달력 바로가기">
        <button
          class="schedule-calendar-entry"
          type="button"
          data-schedule-modal-open
          aria-label="${escapeHtml(`픽업 달력 확인하기, ${meta}`)}"
          aria-controls="scheduleModal"
          aria-expanded="false"
        >
          <span class="schedule-calendar-entry-copy">
            <span class="schedule-calendar-entry-title">픽업 달력 확인하기</span>
            <span class="schedule-calendar-entry-meta">${escapeHtml(meta)}</span>
          </span>
          <span class="schedule-preview-stack ${hasBackImage ? '' : 'is-single'}" aria-hidden="true">
            ${hasBackImage ? `
              <span class="schedule-preview-thumb schedule-preview-thumb--back">
                <img src="${escapeHtml(backImage.src)}" alt="" loading="lazy" decoding="async" onerror="${getImageErrorHandler(backImage.fallbackIndex)}">
              </span>
            ` : ''}
            <span class="schedule-preview-thumb schedule-preview-thumb--front">
              <img src="${escapeHtml(frontImage.src)}" alt="" loading="lazy" decoding="async" onerror="${getImageErrorHandler(frontImage.fallbackIndex)}">
            </span>
            <span class="schedule-preview-count">${escapeHtml(preview.count)}</span>
          </span>
        </button>
      </section>
    `;
  }

  function updateScheduleOpenControls(isExpanded) {
    document.querySelectorAll('[data-schedule-modal-open]').forEach(control => {
      control.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
    });

  function bindScheduleCalendarEntry() {

  function renderOrdersSection() {
    if (!currentOrderItems.length) return;

    destroyAllSwipers();

    const { sections, sectionItemsMap } = buildSectionsData(currentOrderItems);

    resultsEl.innerHTML = renderScheduleCalendarEntryCard(currentOrderItems) + sections.map(section =>
      renderPickupSection(section, sectionItemsMap[section.key] || [])
    ).join('') + renderSupportHelpCard();

    initAllSwipers(sections, sectionItemsMap);
    bindOrdersToggle();
    bindScheduleCalendarEntry();
    initSupportHelpCard();
    requestAnimationFrame(() => {
      updateOrderNameMarquees();
      syncResultPanelsHeight();
      if (resultPanelsSwiper) resultPanelsSwiper.update();
    });
  }

function renderScheduleTab() {
  if (!scheduleContentEl || !scheduleWeekHostEl) return;

  const itemsByDate = groupItemsByPickupDate(currentOrderItems);
  const todayInfo = getSeoulTodayInfo();
  const { start, end } = getScheduleRange(itemsByDate);
  const selectedDateKey = scheduleState.selectedDateKey || todayInfo.dateKey;
  const selectedDate = clampDateToRange(dateFromKey(selectedDateKey) || todayInfo.dateObj, start, end);
  const dates = getScheduleDateList(start, end);

  scheduleState.selectedDateKey = getDateKey(selectedDate);
  scheduleState.rangeStartKey = getDateKey(start);
  scheduleState.rangeEndKey = getDateKey(end);
  scheduleState.dateKeys = dates.map(date => getDateKey(date));

  // 날짜 셀 하나가 Swiper 슬라이드 하나라, 열린 범위 안에서 하루 단위로 움직인다.
  scheduleWeekHostEl.innerHTML = `
    <div class="schedule-week-card">
      <div class="swiper schedule-week-swiper" id="scheduleWeekSwiper">

          ${dates.map(date => renderScheduleDateSlide(date, itemsByDate.get(getDateKey(date)) || [])).join('')}

      ${dates.map(date => renderScheduleDateSection(date, itemsByDate.get(getDateKey(date)) || [])).join('')}
    </div>
  `;

  initScheduleWeekSwiper();
  bindScheduleDateButtons();
  updateScheduleSelection(scheduleState.selectedDateKey, { slide: true });
  resetScheduleWeekStickyState();

  requestAnimationFrame(() => {
    updateResultTabsHeightVar();
    requestScheduleWeekStickyUpdate();
    if (resultPanelsSwiper) {
      resultPanelsSwiper.update();
      resultPanelsSwiper.updateAutoHeight?.(0);
    }

function clearScheduleTab() {
  destroyScheduleWeekSwiper();
  scheduleState.selectedDateKey = getSeoulTodayInfo().dateKey;
  scheduleState.dateKeys = [];
  scheduleState.rangeStartKey = '';
  scheduleState.rangeEndKey = '';

  scheduleSuppressWeekSlide = false;

function isScheduleModalOpen() {
  return Boolean(scheduleModalEl?.classList.contains('is-open'));
}

function isScheduleModalActive() {
  return Boolean(scheduleModalEl?.classList.contains('is-open') || scheduleModalEl?.classList.contains('is-closing'));
}

function getScheduleScrollContainer() {
  return isScheduleModalOpen() ? scheduleModalBodyEl : null;
}

function resetScheduleOpenControls() {
  updateScheduleOpenControls(false);
}

function lockScheduleModalBackground() {
  if (document.body.classList.contains('schedule-modal-open')) return;

  scheduleModalScrollY = window.scrollY || window.pageYOffset || 0;
  document.body.style.position = 'fixed';
  document.body.style.top = `-${scheduleModalScrollY}px`;
  document.body.style.left = '0';
  document.body.style.right = '0';
  document.body.style.width = '100%';
  document.body.classList.add('schedule-modal-open');
}

function unlockScheduleModalBackground() {
  if (!document.body.classList.contains('schedule-modal-open')) return;

  document.body.classList.remove('schedule-modal-open');
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.left = '';
  document.body.style.right = '';
  document.body.style.width = '';
  window.scrollTo(0, scheduleModalScrollY || 0);
}

function resetScheduleModalInlineMotion() {
  if (scheduleModalSheetEl) {
    scheduleModalSheetEl.style.transition = '';
    scheduleModalSheetEl.style.transform = '';
  }

  if (scheduleModalDimEl) {
    scheduleModalDimEl.style.transition = '';
    scheduleModalDimEl.style.opacity = '';
  }
}

function openScheduleModal() {
  if (!scheduleModalEl || !currentOrderItems.length) return;
  if (scheduleModalCloseTimer) {
    clearTimeout(scheduleModalCloseTimer);
    scheduleModalCloseTimer = null;
  }

  const todayInfo = getSeoulTodayInfo();
  scheduleState.selectedDateKey = todayInfo.dateKey;
  activeResultTab = 'schedule';

  resetScheduleModalInlineMotion();
  scheduleModalEl.classList.remove('is-closing');
  scheduleModalEl.classList.add('is-open');
  scheduleModalEl.setAttribute('aria-hidden', 'false');
  updateScheduleOpenControls(true);
  lockScheduleModalBackground();

  scheduleWeekHostEl?.classList.add('is-visible');
  scheduleWeekHostEl?.setAttribute('aria-hidden', 'false');

  requestAnimationFrame(() => {
    renderScheduleTab();
    requestAnimationFrame(() => {
      selectScheduleDate(todayInfo.dateKey, { scroll: true, slide: true, behavior: 'auto' });
      scheduleModalCloseEl?.focus({ preventScroll: true });
      requestScheduleScrollSync();
    });
  });
}

function closeScheduleModal(options = {}) {
  if (!scheduleModalEl) return;

  const shouldClear = options.clear !== false;
  const shouldAnimate = options.animate !== false;

  if (scheduleModalCloseTimer) {
    clearTimeout(scheduleModalCloseTimer);
    scheduleModalCloseTimer = null;
  }

  const finishClose = () => {
    scheduleModalEl.classList.remove('is-open', 'is-closing');
    scheduleModalEl.setAttribute('aria-hidden', 'true');
    updateScheduleOpenControls(false);
    resetScheduleModalInlineMotion();
    unlockScheduleModalBackground();
    activeResultTab = 'orders';

    if (shouldClear) {
      clearScheduleTab();
    } else {
      scheduleWeekHostEl?.classList.remove('is-visible', 'is-sticky-ready', 'is-fixed');
      scheduleWeekHostEl?.setAttribute('aria-hidden', 'true');
      resetScheduleWeekStickyState();
    }
  };

  if (!isScheduleModalActive() || !shouldAnimate) {
    finishClose();
    return;
  }

  resetScheduleModalInlineMotion();
  scheduleModalEl.classList.remove('is-open');
  scheduleModalEl.classList.add('is-closing');

  scheduleModalCloseTimer = window.setTimeout(() => {
    scheduleModalCloseTimer = null;
    finishClose();
  }, 540);
}

function isScheduleModalDragTarget(target) {
  if (!target) return false;
  if (target.closest?.('#scheduleModalDragZone')) return true;
  if (target.closest?.('#scheduleWeekHost')) return true;
  if (target.closest?.('button, a, input, textarea, select')) return false;
  if (!scheduleModalBodyEl?.contains(target)) return true;
  return false;
}

function beginScheduleModalDrag(event) {
  if (!isScheduleModalOpen() || !scheduleModalSheetEl || event.button !== 0) return;
  if (!isScheduleModalDragTarget(event.target)) return;

  scheduleModalDragState = {
    pointerId: event.pointerId,
    startY: event.clientY,
    lastY: event.clientY,
    lastAt: performance.now(),
    velocity: 0,
    height: scheduleModalSheetEl.getBoundingClientRect().height || window.innerHeight
  };

  scheduleModalSheetEl.setPointerCapture?.(event.pointerId);
  scheduleModalSheetEl.style.transition = 'none';
  if (scheduleModalDimEl) scheduleModalDimEl.style.transition = 'none';
}

function moveScheduleModalDrag(event) {
  if (!scheduleModalDragState || !scheduleModalSheetEl) return;
  if (event.pointerId !== scheduleModalDragState.pointerId) return;

  const now = performance.now();
  const deltaY = Math.max(0, event.clientY - scheduleModalDragState.startY);
  const elapsed = Math.max(now - scheduleModalDragState.lastAt, 1);
  scheduleModalDragState.velocity = (event.clientY - scheduleModalDragState.lastY) / elapsed;
  scheduleModalDragState.lastY = event.clientY;
  scheduleModalDragState.lastAt = now;

  if (deltaY <= 0) return;

  event.preventDefault();

  const easedDelta = Math.min(deltaY, scheduleModalDragState.height);
  const dimOpacity = clamp(1 - (easedDelta / Math.max(scheduleModalDragState.height * 0.75, 1)), 0, 1);

  scheduleModalSheetEl.style.transform = `translate3d(0, ${easedDelta}px, 0)`;
  if (scheduleModalDimEl) scheduleModalDimEl.style.opacity = String(dimOpacity);
}

function endScheduleModalDrag(event) {
  if (!scheduleModalDragState || !scheduleModalSheetEl) return;
  if (event.pointerId !== scheduleModalDragState.pointerId) return;

  const deltaY = Math.max(0, event.clientY - scheduleModalDragState.startY);
  const shouldClose =
    deltaY > scheduleModalDragState.height * 0.32 ||
    scheduleModalDragState.velocity > 0.9;

  scheduleModalSheetEl.releasePointerCapture?.(event.pointerId);
  scheduleModalSheetEl.style.transition = shouldClose
    ? 'transform 520ms cubic-bezier(0.32, 0.72, 0, 1)'
    : 'transform 360ms cubic-bezier(0.22, 1, 0.36, 1)';
  if (scheduleModalDimEl) {
    scheduleModalDimEl.style.transition = shouldClose ? 'opacity 380ms ease' : 'opacity 260ms ease';
  }
  scheduleModalDragState = null;

  if (shouldClose) {
    scheduleModalEl?.classList.remove('is-open');
    scheduleModalEl?.classList.add('is-closing');
    scheduleModalSheetEl.style.transform = 'translate3d(0, 105%, 0)';
    if (scheduleModalDimEl) scheduleModalDimEl.style.opacity = '0';
    closeScheduleModal({ clear: false, animate: true });
    return;
  }

  scheduleModalSheetEl.style.transform = 'translate3d(0, 0, 0)';
  if (scheduleModalDimEl) scheduleModalDimEl.style.opacity = '1';

  window.setTimeout(() => {
    if (!scheduleModalDragState) resetScheduleModalInlineMotion();
  }, shouldClose ? 540 : 380);
}

function renderScheduleWeekdayLabel(date) {
  const labels = ['일', '월', '화', '수', '목', '금', '토'];
  const toneClass = isScheduleRedDate(date) ? ' is-sunday' : isScheduleBlueDate(date) ? ' is-saturday' : '';
  return `<div class="schedule-weekday${toneClass}">${labels[date.getDay()]}</div>`;

function renderScheduleDateSlide(date, items) {

function renderScheduleDayButton(date, items) {
  const dateKey = getDateKey(date);
  const holiday = getHolidayInfo(date);

function renderScheduleDateSection(date, items) {

function initScheduleWeekSwiper() {
  const el = document.getElementById('scheduleWeekSwiper');
  if (!el || typeof Swiper !== 'function') return;

  destroyScheduleWeekSwiper();

  const activeIndex = getScheduleSlideIndexForDate(scheduleState.selectedDateKey);

  scheduleWeekSwiper = new Swiper(el, {
    slidesPerView: 7,
    slidesPerGroup: 1,
    speed: 260,
    resistanceRatio: 0.7,
    threshold: 8,
    nested: true
  });

  if (activeIndex >= 0) {
    scheduleWeekSwiper.slideTo(activeIndex, 0);
  }
}

function destroyScheduleWeekSwiper() {
  if (scheduleWeekSwiper && typeof scheduleWeekSwiper.destroy === 'function') {
    scheduleWeekSwiper.destroy(true, true);
  }
  scheduleWeekSwiper = null;
}

function resetScheduleWeekStickyState() {
  scheduleWeekHostEl?.classList.remove('is-fixed');
  scheduleWeekHostEl?.removeAttribute('data-sticky-anchor-top');
  scheduleWeekPlaceholderEl?.classList.remove('is-active');
  if (scheduleWeekPlaceholderEl) scheduleWeekPlaceholderEl.style.height = '0px';
  document.documentElement.style.setProperty('--schedule-week-current-height', '0px');
}

function requestScheduleWeekStickyUpdate() {
  if (scheduleWeekStickyFrame) return;
  scheduleWeekStickyFrame = requestAnimationFrame(() => {
    scheduleWeekStickyFrame = null;
    updateScheduleWeekStickyState();
  });
}

function updateScheduleWeekStickyState() {
  if (!scheduleWeekHostEl || !scheduleWeekPlaceholderEl) return;

  if (isScheduleModalOpen()) {
    resetScheduleWeekStickyState();
    return;
  }

  const shouldManage =
    ENABLE_SCHEDULE_WEEK_STICKY &&
    activeResultTab === 'schedule' &&
    scheduleWeekHostEl.classList.contains('is-visible');

  if (!shouldManage) {
    resetScheduleWeekStickyState();
    return;
  }

  const height = Math.max(0, Math.round(scheduleWeekHostEl.getBoundingClientRect().height || scheduleWeekHostEl.offsetHeight || 0));
  document.documentElement.style.setProperty('--schedule-week-current-height', `${height}px`);

  const scrollY = window.scrollY || window.pageYOffset || 0;
  const isFixed = scheduleWeekHostEl.classList.contains('is-fixed');

  if (!isFixed) {
    const anchorTop = Math.round(scheduleWeekHostEl.getBoundingClientRect().top + scrollY);
    scheduleWeekHostEl.dataset.stickyAnchorTop = String(anchorTop);
  }

  const stickyAnchorTop = Number(scheduleWeekHostEl.dataset.stickyAnchorTop || 0);
  const shouldFix = scrollY > stickyAnchorTop;

  scheduleWeekHostEl.classList.toggle('is-fixed', shouldFix);
  scheduleWeekPlaceholderEl.classList.toggle('is-active', shouldFix);
  scheduleWeekPlaceholderEl.style.height = shouldFix ? `${height}px` : '0px';
}

function bindScheduleDateButtons() {
  scheduleWeekHostEl?.querySelectorAll('[data-schedule-date]').forEach(button => {
    button.addEventListener('click', () => {
      if (button.disabled || button.classList.contains('is-disabled')) return;
      const dateKey = button.dataset.scheduleDate;
      if (dateKey) selectScheduleDate(dateKey, { scroll: true, slide: true });
    });
  });
}

function getScheduleDateIndex(dateKey) {
  return scheduleState.dateKeys.indexOf(dateKey);
}

function getScheduleSlideIndexForDate(dateKey) {
  const dateIndex = getScheduleDateIndex(dateKey);
  if (dateIndex < 0) return -1;

  const maxStartIndex = Math.max(0, scheduleState.dateKeys.length - 7);
  return clamp(dateIndex - SCHEDULE_CENTER_OFFSET_DAYS, 0, maxStartIndex);
}

function selectScheduleDate(dateKey, options = {}) {
  const shouldScroll = options.scroll !== false;
  const shouldSlide = options.slide !== false;
  const behavior = options.behavior || 'smooth';
  const date = dateFromKey(dateKey);
  const rangeStart = dateFromKey(scheduleState.rangeStartKey);
  const rangeEnd = dateFromKey(scheduleState.rangeEndKey);
  const nextDateKey = date && rangeStart && rangeEnd
    ? getDateKey(clampDateToRange(date, rangeStart, rangeEnd))
    : dateKey;

  scheduleState.selectedDateKey = nextDateKey;
  updateScheduleSelection(nextDateKey, { slide: shouldSlide });

  if (!shouldScroll) return;

  const section = document.querySelector(`[data-schedule-section="${nextDateKey}"]`);
  if (!section) return;

  scheduleSuppressScrollSync = true;
  const scrollContainer = getScheduleScrollContainer();
  const sticky = scheduleWeekHostEl;
  const topOffset = Math.round(sticky?.getBoundingClientRect().height || sticky?.offsetHeight || 0);

  if (scrollContainer) {
    const containerRect = scrollContainer.getBoundingClientRect();
    const targetTop =
      section.getBoundingClientRect().top -
      containerRect.top +
      scrollContainer.scrollTop -
      topOffset;

    scrollContainer.scrollTo({
      top: Math.max(0, targetTop),
      behavior
    });
  } else {
    const pageOffset =
      (ENABLE_RESULT_TABS_STICKY ? (resultTabsWrap?.getBoundingClientRect().height || 0) : 0) +
      (ENABLE_SCHEDULE_WEEK_STICKY ? topOffset : 0);
    const targetTop = section.getBoundingClientRect().top + (window.scrollY || window.pageYOffset || 0) - pageOffset;
    window.scrollTo({
      top: Math.max(0, targetTop),
      behavior
    });
  }

  window.setTimeout(() => {
    scheduleSuppressScrollSync = false;
  }, behavior === 'smooth' ? 520 : 80);
}

function updateScheduleSelection(dateKey, options = {}) {
  scheduleState.selectedDateKey = dateKey;

  scheduleWeekHostEl?.querySelectorAll('[data-schedule-date]').forEach(button => {
    button.classList.toggle('is-selected', button.dataset.scheduleDate === dateKey);
  });

  if (options.slide === false || !scheduleWeekSwiper) return;

  const activeIndex = getScheduleSlideIndexForDate(dateKey);
  if (activeIndex < 0 || activeIndex === scheduleWeekSwiper.activeIndex) return;

  scheduleSuppressWeekSlide = true;
  scheduleWeekSwiper.slideTo(activeIndex, 240);
  window.setTimeout(() => {
    scheduleSuppressWeekSlide = false;
  }, 260);
}

function requestScheduleScrollSync() {
  if (scheduleScrollFrame) return;
  scheduleScrollFrame = requestAnimationFrame(() => {
    scheduleScrollFrame = null;
    syncScheduleFromScroll();
  });
}

function syncScheduleFromScroll() {
  if (activeResultTab !== 'schedule' || scheduleSuppressScrollSync || !scheduleContentEl) return;
  const sections = [...scheduleContentEl.querySelectorAll('[data-schedule-section]')];
  if (!sections.length) return;

  const scrollContainer = getScheduleScrollContainer();
  const sticky = scheduleWeekHostEl;
  const stickyRect = sticky?.getBoundingClientRect();
  const stickyHeight = sticky?.offsetHeight || 0;
  const tabBottom = resultTabsWrap?.getBoundingClientRect().bottom || 0;
  const readLine = scrollContainer
    ? (stickyRect?.bottom || stickyHeight) + 14
    : sticky?.classList.contains('is-fixed')
      ? (stickyRect?.bottom || stickyHeight) + 14
      : tabBottom + stickyHeight + 14;
  const scrollBottom = scrollContainer
    ? scrollContainer.scrollTop + scrollContainer.clientHeight
    : (window.scrollY || window.pageYOffset || 0) + window.innerHeight;
  const documentHeight = scrollContainer
    ? scrollContainer.scrollHeight
    : Math.max(
        document.documentElement.scrollHeight || 0,
        document.body.scrollHeight || 0
      );

  let activeSection = null;

  const scrollTop = scrollContainer ? scrollContainer.scrollTop : (window.scrollY || window.pageYOffset || 0);

  if (scrollTop > 0 && documentHeight - scrollBottom <= 4) {
    activeSection = sections[sections.length - 1];
  } else {
    for (const section of sections) {
      const rect = section.getBoundingClientRect();
      if (rect.top <= readLine) {
        activeSection = section;
      } else {
        break;
      }
    }
  }

  if (!activeSection) return;

  const nextDateKey = activeSection.dataset.scheduleSection;
  if (nextDateKey && nextDateKey !== scheduleState.selectedDateKey) {
    updateScheduleSelection(nextDateKey, { slide: true });
  }
}

  function startSupportRollingText(card) {
    const windowEl = card.querySelector('.support-rolling-window');
    const textEl = card.querySelector('.support-rolling-text');
    if (!windowEl || !textEl) return;

    const items = String(windowEl.dataset.rollingTexts || '')
      .split('|')
      .map(item => item.trim())
      .filter(Boolean);

    if (items.length <= 1) return;

    let index = 0;

    function setNextText() {
      index = (index + 1) % items.length;

      textEl.classList.remove('is-soft-changing');
      void textEl.offsetWidth;

      textEl.textContent = items[index];
      textEl.classList.add('is-soft-changing');

      window.setTimeout(() => {
        textEl.classList.remove('is-soft-changing');
      }, 560);
    }

    window.setInterval(setNextText, 3000);
  }

  function setupSupportCardTilt(card) {
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) return;

    const isMobile = window.matchMedia('(max-width: 640px)').matches;
    const maxTilt = isMobile ? 8.2 : 6.2;

    let frameId = null;
    let targetX = 0;
    let targetY = 0;
    let currentX = 0;
    let currentY = 0;
    let orientationBase = null;
    let orientationPermissionAsked = false;
    let lastOrientationAt = 0;

    function renderTilt() {
      frameId = null;

      currentX += (targetX - currentX) * 0.16;
      currentY += (targetY - currentY) * 0.16;

      card.style.setProperty('--tilt-x', `${currentX.toFixed(3)}deg`);
      card.style.setProperty('--tilt-y', `${currentY.toFixed(3)}deg`);

      const keepMoving =
        Math.abs(targetX - currentX) > 0.015 ||
        Math.abs(targetY - currentY) > 0.015;

      if (keepMoving) {
        frameId = requestAnimationFrame(renderTilt);
      } else if (Math.abs(currentX) < 0.02 && Math.abs(currentY) < 0.02) {
        card.classList.remove('is-tilting');
      }
    }

    function requestRender() {
      card.classList.add('is-tilting');
      if (!frameId) frameId = requestAnimationFrame(renderTilt);
    }

    function setTilt(nextX, nextY) {
      targetX = clamp(nextX, -maxTilt, maxTilt);
      targetY = clamp(nextY, -maxTilt, maxTilt);
      requestRender();
    }

    function setTiltFromPoint(clientX, clientY) {
      const rect = card.getBoundingClientRect();
      const x = ((clientX - rect.left) / rect.width - 0.5) * 2;
      const y = ((clientY - rect.top) / rect.height - 0.5) * 2;

      setTilt(-y * maxTilt, x * maxTilt);
    }

    function resetTilt() {
      targetX = 0;
      targetY = 0;
      orientationBase = null;
      requestRender();
    }

    function handleOrientation(event) {
      if (event.beta == null && event.gamma == null) return;

      const now = Date.now();
      if (now - lastOrientationAt < 34) return;
      lastOrientationAt = now;

      const beta = Number(event.beta || 0);
      const gamma = Number(event.gamma || 0);

      if (!orientationBase) {
        orientationBase = { beta, gamma };
        return;
      }

      const deltaBeta = clamp(beta - orientationBase.beta, -24, 24);
      const deltaGamma = clamp(gamma - orientationBase.gamma, -24, 24);

      const nextX = clamp((-deltaBeta / 24) * maxTilt, -maxTilt, maxTilt);
      const nextY = clamp((deltaGamma / 24) * maxTilt, -maxTilt, maxTilt);

      setTilt(nextX, nextY);
    }

    function bindDeviceOrientation() {
      if (!window.DeviceOrientationEvent) return;

      window.addEventListener('deviceorientation', handleOrientation, { passive: true });
    }

    function requestDeviceOrientationPermission() {
      if (orientationPermissionAsked) return;
      orientationPermissionAsked = true;

      if (
        window.DeviceOrientationEvent &&
        typeof window.DeviceOrientationEvent.requestPermission === 'function'
      ) {
        window.DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') bindDeviceOrientation();
          })
          .catch(() => {});
      } else {
        bindDeviceOrientation();
      }
    }

    card.addEventListener('pointermove', event => {
      const hasRecentOrientation = Date.now() - lastOrientationAt < 800;
      if (hasRecentOrientation) return;
      setTiltFromPoint(event.clientX, event.clientY);
    }, { passive: true });

    card.addEventListener('pointerdown', event => {
      requestDeviceOrientationPermission();
      setTiltFromPoint(event.clientX, event.clientY);
    }, { passive: true });

    card.addEventListener('touchstart', requestDeviceOrientationPermission, { passive: true });
    card.addEventListener('pointerleave', resetTilt);
    card.addEventListener('pointercancel', resetTilt);

    bindDeviceOrientation();
  }

  function initAllSwipers(sections = [], sectionItemsMap = {}) {
    sections.forEach(section => {
      if (sectionViewState[section.key]) return;

      const items = sectionItemsMap[section.key] || [];
      if (!items.length) return;

      const el = document.getElementById(`ordersSwiper-${section.key}`);
      if (!el) return;

      swiperMap[section.key] = new Swiper(el, {
        slidesPerView: 2.3,
        spaceBetween: 16,
        grabCursor: true,
        nested: true,
        simulateTouch: true,
        allowTouchMove: true,
        touchMoveStopPropagation: true,
        preventClicksPropagation: true,
        freeMode: {
          enabled: true,
          sticky: false
        },
        mousewheel: {
          enabled: true,
          forceToAxis: true,
          releaseOnEdges: true
        },
        breakpoints: {
          0: {
            spaceBetween: 12
          },
          641: {
            spaceBetween: 16
          }
        }
      });

      bindDesktopOrderWheel(el, swiperMap[section.key]);
    });
  }

  function isDesktopPointerViewport() {
    return window.matchMedia('(hover: hover) and (pointer: fine)').matches;
  }

  function bindDesktopOrderWheel(el, swiper) {
    if (!el || !swiper || !isDesktopPointerViewport()) return;

    el.addEventListener('wheel', event => {
      if (!swiper || swiper.destroyed) return;
      if (event.ctrlKey) return;
      if (Math.abs(event.deltaY) <= Math.abs(event.deltaX)) return;

      const direction = event.deltaY > 0 ? 1 : -1;
      const canMovePrev = !swiper.isBeginning || swiper.translate < swiper.minTranslate();
      const canMoveNext = !swiper.isEnd || swiper.translate > swiper.maxTranslate();

      if ((direction < 0 && !canMovePrev) || (direction > 0 && !canMoveNext)) return;

      event.preventDefault();

      const wheelDelta =
        event.deltaMode === 1
          ? event.deltaY * 32
          : event.deltaMode === 2
            ? event.deltaY * window.innerHeight
            : event.deltaY;

      const nextTranslate = clamp(
        swiper.translate - wheelDelta,
        swiper.maxTranslate(),
        swiper.minTranslate()
      );

      swiper.setTranslate(nextTranslate);
      swiper.updateProgress(nextTranslate);
      swiper.updateActiveIndex();
      swiper.updateSlidesClasses();
    }, { passive: false });
  }

  function destroyAllSwipers() {
    Object.values(swiperMap).forEach(swiper => {
      if (swiper && typeof swiper.destroy === 'function') {
        swiper.destroy(true, true);
      }
    });
    swiperMap = {};
  }

  function updateOrderNameMarquees() {
    document.querySelectorAll('.order-name').forEach(nameEl => {
      const textEl = nameEl.querySelector('.order-name-text:not([aria-hidden])');
      if (!textEl) return;

      nameEl.classList.remove('is-marquee');
      nameEl.style.removeProperty('--name-marquee-duration');

      const textWidth = textEl.scrollWidth;
      const containerWidth = nameEl.clientWidth;

      if (textWidth <= containerWidth + 2) return;

      const duration = Math.max(16, Math.min(32, textWidth / 9));
      nameEl.style.setProperty('--name-marquee-duration', `${duration.toFixed(1)}s`);
      nameEl.classList.add('is-marquee');
    });
  }

  function isTouchZoomViewport() {
    return window.matchMedia('(pointer: coarse), (max-width: 1024px)').matches;
  }

  function getTouchDistance(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.hypot(dx, dy);
  }

  function getTouchCenter(touches) {
    return {
      x: (touches[0].clientX + touches[1].clientX) / 2,
      y: (touches[0].clientY + touches[1].clientY) / 2
    };
  }

function getViewportRect() {
  const vv = window.visualViewport;

  return {
    left: vv ? vv.offsetLeft : 0,
    top: vv ? vv.offsetTop : 0,
    width: vv ? vv.width : window.innerWidth,
    height: vv ? vv.height : window.innerHeight
  };
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function lerp(start, end, progress) {
  return start + ((end - start) * progress);
}

function getTouchDistance(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.hypot(dx, dy);
}

function getTouchCenter(touches) {
  return {
    x: (touches[0].clientX + touches[1].clientX) / 2,
    y: (touches[0].clientY + touches[1].clientY) / 2
  };
}

function getRectCenter(rect) {
  return {
    x: rect.left + rect.width / 2,
    y: rect.top + rect.height / 2
  };
}

function isTouchZoomViewport() {
  return window.matchMedia('(pointer: coarse), (max-width: 1024px)').matches;
}

function setImageZoomContentRect(content, rect, radius) {
  content.style.left = `${rect.left}px`;
  content.style.top = `${rect.top}px`;
  content.style.width = `${rect.width}px`;
  content.style.height = `${rect.height}px`;
  content.style.borderRadius = radius;
}

function getCoverScaleForViewport(sourceRect) {
  const viewport = getViewportRect();

  // 1:1 이미지를 화면 전체 영역까지 덮도록 만드는 배율
  return Math.max(
    viewport.width / Math.max(sourceRect.width, 1),
    viewport.height / Math.max(sourceRect.height, 1)
  );
}

function openOrderImageZoom(img, sourceWrap, touches = null) {
  if (activeImageZoom || !img || !touches || touches.length < 2) return;

  const sourceRect = sourceWrap.getBoundingClientRect();
  const sourceRadius = getComputedStyle(sourceWrap).borderRadius || '0px';
  const sourceCenter = getRectCenter(sourceRect);
  const startDistance = getTouchDistance(touches);
  const startCenter = getTouchCenter(touches);
  const viewport = getViewportRect();

  const overlay = document.createElement('div');
  const frame = document.createElement('div');
  const content = document.createElement('div');
  const zoomImg = document.createElement('img');

  overlay.className = 'image-pinch-overlay';
  frame.className = 'image-pinch-frame';
  content.className = 'image-pinch-content';
  zoomImg.className = 'image-pinch-img';

  zoomImg.src = img.dataset.zoomSrc || img.currentSrc || img.src;
  zoomImg.alt = img.alt || '';
  zoomImg.decoding = 'async';
  zoomImg.draggable = false;

  content.appendChild(zoomImg);
  frame.appendChild(content);
  overlay.appendChild(frame);
  document.body.appendChild(overlay);

  setImageZoomContentRect(content, sourceRect, sourceRadius);

  activeImageZoom = {
    overlay,
    frame,
    content,
    sourceRect,
    sourceRadius,
    sourceCenter,
    startDistance,
    startCenter,
    viewportCenter: {
      x: viewport.left + viewport.width / 2,
      y: viewport.top + viewport.height / 2
    },
    scale: 1,
    panX: 0,
    panY: 0,
    dimOpacity: 0.08,
    bodyOverflow: document.body.style.overflow
  };

  document.body.style.overflow = 'hidden';

  requestAnimationFrame(() => {
    overlay.classList.add('show');
    overlay.style.setProperty('--pinch-dim-opacity', '0.08');
  });
}

function updateActiveImageZoom(touches) {
  if (!activeImageZoom || touches.length < 2) return;

  const zoom = activeImageZoom;

  const currentDistance = getTouchDistance(touches);
  const currentCenter = getTouchCenter(touches);
  const rawScale = currentDistance / Math.max(zoom.startDistance, 1);

  // 손가락을 벌리면 썸네일에서 화면 전체를 덮는 배율까지 커짐 (1.2 = 감도 낮춤)
  const expandProgress = clamp((rawScale - 1) / 1.2, 0, 1);
  const coverScale = getCoverScaleForViewport(zoom.sourceRect);

  // 기본 확대: 썸네일 → 화면 전체 contain
  const baseScale = lerp(1, coverScale, expandProgress);

  // 화면 전체를 덮은 뒤에는 추가 확대
  const extraScale = rawScale > 2.2
    ? 1 + ((rawScale - 2.2) * 0.6)
    : 1;

  const targetScale = clamp(baseScale * extraScale, 1, coverScale * 2.0);

  // 손가락 이동량 그대로 반영
  const fingerMoveX = currentCenter.x - zoom.startCenter.x;
  const fingerMoveY = currentCenter.y - zoom.startCenter.y;

  // 확대될수록 화면 중앙으로 자연스럽게 커지되,
  // 손가락 이동은 그대로 따라가게 함
  const autoCenterX = lerp(zoom.sourceCenter.x, zoom.viewportCenter.x, expandProgress);
  const autoCenterY = lerp(zoom.sourceCenter.y, zoom.viewportCenter.y, expandProgress);

  const targetCenterX = autoCenterX + fingerMoveX;
  const targetCenterY = autoCenterY + fingerMoveY;

  const targetPanX = targetCenterX - zoom.sourceCenter.x;
  const targetPanY = targetCenterY - zoom.sourceCenter.y;

  // 너무 굼뜨지 않게 보간
  zoom.scale = zoom.scale + ((targetScale - zoom.scale) * 0.32);
  zoom.panX = zoom.panX + ((targetPanX - zoom.panX) * 0.36);
  zoom.panY = zoom.panY + ((targetPanY - zoom.panY) * 0.36);

  zoom.content.style.transform =
    `translate3d(${zoom.panX}px, ${zoom.panY}px, 0) scale(${zoom.scale})`;

  const targetDimOpacity = lerp(0.08, 0.72, expandProgress);
  zoom.dimOpacity = zoom.dimOpacity + ((targetDimOpacity - zoom.dimOpacity) * 0.25);
  zoom.overlay.style.setProperty('--pinch-dim-opacity', zoom.dimOpacity.toFixed(3));
}

function closeOrderImageZoom() {
  if (!activeImageZoom) return;

  const zoom = activeImageZoom;
  activeImageZoom = null;

  zoom.content.classList.add('is-returning');
  zoom.overlay.classList.add('is-closing');
  zoom.overlay.style.setProperty('--pinch-dim-opacity', '0');

  // 손 떼면 원래 썸네일 위치로 복귀
  zoom.content.style.transform = 'translate3d(0, 0, 0) scale(1)';
  zoom.content.style.borderRadius = zoom.sourceRadius;

  window.setTimeout(() => {
    zoom.overlay.remove();
    document.body.style.overflow = zoom.bodyOverflow || '';
  }, 280);
}

  if (!isTouchZoomViewport() || event.touches.length < 2) return;

  const sourceWrap = event.target.closest('.order-thumb-wrap');

function showResultTopbar() {
  if (topbarVisible) {
    rhKeyword.value = keywordInput.value;
    return;
  }
  topbarVisible = true;
  rhKeyword.value = keywordInput.value;

  const D = 280;
  const E = 'cubic-bezier(0.22, 1, 0.36, 1)';
  const origShellEl = document.querySelector('.search-shell');
  const origLogoEl = document.querySelector('.logo-svg');
  const origShellR = origShellEl ? origShellEl.getBoundingClientRect() : null;
  const origLogoR = origLogoEl ? origLogoEl.getBoundingClientRect() : null;
  const manmanRatio = 267 / 513;

  resultTopbar.classList.add('is-visible');
  resultTopbar.style.visibility = 'hidden';
  resultTopbar.style.pointerEvents = 'none';
  resultTopbar.setAttribute('aria-hidden', 'false');
  resultTopbar.offsetHeight;

  const topbarH = resultTopbar.offsetHeight;
  document.documentElement.style.setProperty('--topbar-h', `${topbarH}px`);

  const rhWrap = resultTopbar.querySelector('.rh-search-wrap');
  const rhLogo = resultTopbar.querySelector('.rh-logo');
  const tabs = resultTopbar.querySelector('.rh-tabs');
  const targetShellR = rhWrap ? rhWrap.getBoundingClientRect() : null;
  const targetLogoR = rhLogo ? rhLogo.getBoundingClientRect() : null;

  if (rhWrap) rhWrap.style.opacity = '0';
  if (rhLogo) rhLogo.style.opacity = '0';
  if (tabs) tabs.style.cssText = 'opacity:0; transition:none;';

  const shellGhost = origShellEl && origShellR && targetShellR
    ? createSearchShellGhost(origShellEl, origShellR)
    : null;

  const logoGhost = origLogoR && targetLogoR
    ? createManmanLogoGhost(origLogoR, manmanRatio)
    : null;

  if (origShellEl) origShellEl.style.visibility = 'hidden';
  if (origLogoEl) origLogoEl.style.visibility = 'hidden';

  resultTopbar.style.visibility = '';
  resultTopbar.style.pointerEvents = '';
  document.body.classList.add('has-results');
  window.scrollTo({ top: 0, behavior: 'instant' });

  const topStage = document.querySelector('.top-stage');
  if (topStage) {
    const stH = topStage.scrollHeight;
    topStage.style.cssText = `max-height:${stH}px; overflow:hidden; opacity:1;`;
    requestAnimationFrame(() => {
      topStage.style.transition = `max-height ${D}ms ${E}, opacity 180ms ease`;
      topStage.style.maxHeight = '0';
      topStage.style.opacity = '0';
      topStage.style.pointerEvents = 'none';
    });
  }

  const animations = [];
  if (shellGhost && targetShellR) {
    animations.push(animateGhostRect(shellGhost, origShellR, targetShellR, D, E));
  }
  if (logoGhost && targetLogoR && origLogoR) {
    const fromLogoR = {
      left: origLogoR.left,
      top: origLogoR.top,
      width: origLogoR.width * manmanRatio,
      height: origLogoR.height
    };
    animations.push(animateGhostRect(logoGhost, fromLogoR, targetLogoR, D + 40, E));
  }

  Promise.allSettled(animations).then(() => {
    if (shellGhost) shellGhost.remove();
    if (logoGhost) logoGhost.remove();
    if (rhWrap) rhWrap.style.opacity = '1';
    if (rhLogo) rhLogo.style.opacity = '1';
    if (tabs) {
      tabs.style.transition = 'opacity 160ms ease';
      tabs.style.opacity = '1';
    }
  });
}

function createSearchShellGhost(sourceEl, rect) {

  ghost.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
  const input = ghost.querySelector('input');

    height: `${rect.height}px`
  });

  return ghost;
}

function createManmanLogoGhost(sourceLogoRect, ratio) {
  const ghost = document.createElement('div');
  ghost.className = 'topbar-motion-ghost topbar-motion-ghost--logo';
  ghost.innerHTML = rhLogoBtn.innerHTML;
  Object.assign(ghost.style, {
    left: `${sourceLogoRect.left}px`,
    top: `${sourceLogoRect.top}px`,
    width: `${sourceLogoRect.width * ratio}px`,
    height: `${sourceLogoRect.height}px`
  });
  document.body.appendChild(ghost);
  return ghost;
}

function animateGhostRect(el, fromRect, toRect, duration, easing) {
  const from = {
    left: fromRect.left,
    top: fromRect.top,
    width: fromRect.width,
    height: fromRect.height,
    opacity: 1
  };
  const to = {
    left: toRect.left,
    top: toRect.top,
    width: toRect.width,
    height: toRect.height,
    opacity: 1
  };

  if (el.animate) {
    const animation = el.animate([
      {
        left: `${from.left}px`,
        top: `${from.top}px`,
        width: `${from.width}px`,
        height: `${from.height}px`,
        opacity: from.opacity
      },
      {
        left: `${to.left}px`,
        top: `${to.top}px`,
        width: `${to.width}px`,
        height: `${to.height}px`,
        opacity: to.opacity
      }
    ], {
      duration,
      easing,
      fill: 'forwards'
    });
    return animation.finished.catch(() => {});
  }

  return new Promise(resolve => {
    el.style.transition = `left ${duration}ms ${easing}, top ${duration}ms ${easing}, width ${duration}ms ${easing}, height ${duration}ms ${easing}`;
    requestAnimationFrame(() => {
      Object.assign(el.style, {
        left: `${to.left}px`,
        top: `${to.top}px`,
        width: `${to.width}px`,
        height: `${to.height}px`
      });
      setTimeout(resolve, duration);
    });
  });
}
