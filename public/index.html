    '2026-10-05': '개천절 대체공휴일',
    '2026-10-09': '한글날',
    '2026-12-25': '성탄절'
  };

  const KOREAN_FIXED_PUBLIC_HOLIDAYS = {
    '01-01': '신정',
    '03-01': '삼일절',
    '05-05': '어린이날',
    '06-06': '현충일',
    '08-15': '광복절',
    '10-03': '개천절',
    '10-09': '한글날',
    '12-25': '성탄절'
  };

  function inferYearForMonthDay(month, day) {
    const seoulToday = getSeoulTodayInfo();
    let year = seoulToday.year;

    if (seoulToday.month === 12 && month === 1) year += 1;
    if (seoulToday.month === 1 && month === 12) year -= 1;

    return year;
  }

  function parsePickupDateValue(value) {
    const text = String(value || '').trim();
    if (!text) return null;

    let match = text.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
    if (match) {
      const year = Number(match[1]);
      const month = Number(match[2]);
      const day = Number(match[3]);
      const date = new Date(year, month - 1, day);
      return Number.isNaN(date.getTime()) ? null : new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    match = text.match(/(\d{1,2})\D+(\d{1,2})/);
    if (match) {
      const month = Number(match[1]);
      const day = Number(match[2]);
      const year = inferYearForMonthDay(month, day);
      const date = new Date(year, month - 1, day);
      return Number.isNaN(date.getTime()) ? null : new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    return null;
  }

  function formatPickupDateDisplay(date, fallbackText = '') {
    if (!(date instanceof Date) || Number.isNaN(date.getTime())) {
      return fallbackText || '픽업일 미정';
    }

    const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
    return `${date.getMonth() + 1}/${date.getDate()}(${weekdays[date.getDay()]})`;
  }

  function formatSectionDateDisplay(dateInfo) {
    const weekdays = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
    return `${dateInfo.month}월 ${dateInfo.day}일 ${weekdays[dateInfo.dayOfWeek]}`;
  }

function normalizeOrderItems(items) {
  return (items || []).map(item => {
    const pickupDateObj = parsePickupDateValue(item.pickupDate);
    const orderDateValue = Number(item.orderDateValue || 0);

    return {
      ...item,
      pickupDateObj,
      pickupDateKey: pickupDateObj ? getDateKey(pickupDateObj) : '',
      pickupDateDisplay: formatPickupDateDisplay(pickupDateObj, item.pickupDate || ''),
      orderDateValue
    };
  });
}

function dateFromKey(dateKey) {
  const match = String(dateKey || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!match) return null;
  const date = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
  return Number.isNaN(date.getTime()) ? null : date;
}

function addDaysToDate(date, days) {
  const next = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  next.setDate(next.getDate() + days);
  return next;
}

function getStartOfWeekDate(date) {
  const start = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  start.setDate(start.getDate() - start.getDay());
  return start;
}

function getHolidayInfo(date) {
  const key = getDateKey(date);
  const fixedKey = `${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
  const name = KOREAN_PUBLIC_HOLIDAYS[key] || KOREAN_FIXED_PUBLIC_HOLIDAYS[fixedKey] || '';
  return name ? { key, name } : null;
}

function isKoreanHolidayDate(date) {
  return Boolean(getHolidayInfo(date));
}

function isScheduleRedDate(date) {
  return date.getDay() === 0 || isKoreanHolidayDate(date);
}

function isScheduleBlueDate(date) {
  return date.getDay() === 6 && !isKoreanHolidayDate(date);
}

function formatScheduleSectionTitle(date) {
  const weekdays = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
  return `${date.getMonth() + 1}월 ${date.getDate()}일 ${weekdays[date.getDay()]}`;
}

function getScheduleDateToneClass(date) {
  if (isScheduleRedDate(date)) return 'is-holiday';
  if (isScheduleBlueDate(date)) return 'is-saturday';
  return '';
}

function groupItemsByPickupDate(items) {
  const grouped = new Map();

  normalizeOrderItems(items).forEach(item => {
    if (!item.pickupDateKey) return;
    if (!grouped.has(item.pickupDateKey)) grouped.set(item.pickupDateKey, []);
    grouped.get(item.pickupDateKey).push(item);
  });

  grouped.forEach((group, dateKey) => {
    grouped.set(dateKey, sortItemsByOrderSheetDate(group));
  });

  return grouped;
}

function getDateTime(date) {
  return new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
}

function clampDateToRange(date, start, end) {
  const time = getDateTime(date);
  const startTime = getDateTime(start);
  const endTime = getDateTime(end);

  if (time < startTime) return new Date(start);
  if (time > endTime) return new Date(end);
  return new Date(date.getFullYear(), date.getMonth(), date.getDate());
}

function getScheduleDefaultWindow(today = getSeoulTodayInfo().dateObj) {
  const start = addDaysToDate(today, -SCHEDULE_CENTER_OFFSET_DAYS);
  const end = addDaysToDate(start, 6);
  return { start, end };
}

function getScheduleRange(itemsByDate) {
  const today = getSeoulTodayInfo().dateObj;
  const defaultWindow = getScheduleDefaultWindow(today);
  const visibleStart = addDaysToDate(today, -SCHEDULE_VISIBLE_DAYS_AFTER_PICKUP);
  let start = new Date(defaultWindow.start);
  let end = new Date(defaultWindow.end);

  itemsByDate.forEach((items, dateKey) => {
    if (!items.length) return;
    const date = dateFromKey(dateKey);
    if (!date) return;

    if (getDateTime(date) < getDateTime(defaultWindow.start)) {
      const boundedDate = getDateTime(date) < getDateTime(visibleStart) ? visibleStart : date;
      if (getDateTime(boundedDate) < getDateTime(start)) start = new Date(boundedDate);
    }

    if (getDateTime(date) > getDateTime(defaultWindow.end)) {
      if (getDateTime(date) > getDateTime(end)) end = new Date(date);
    }
  });

  return {
    start,
    end,
    defaultStart: defaultWindow.start,
    defaultEnd: defaultWindow.end
  };
}

function getScheduleDateList(start, end) {
  const dates = [];
  for (let date = new Date(start); date <= end; date = addDaysToDate(date, 1)) {
    dates.push(new Date(date));
  }
  return dates;
}

function isScheduleDateAccessible(date) {
  const start = dateFromKey(scheduleState.rangeStartKey);
  const end = dateFromKey(scheduleState.rangeEndKey);
  if (!start || !end) return true;

  const time = getDateTime(date);
  return time >= getDateTime(start) && time <= getDateTime(end);
}

function sortItemsByOrderSheetDate(items) {
  return [...items].sort((a, b) => {
    if (a.orderDateValue !== b.orderDateValue) {
      return b.orderDateValue - a.orderDateValue; // 최신 시트 날짜 먼저
    }

    const aPickup = a.pickupDateObj ? a.pickupDateObj.getTime() : Number.MAX_SAFE_INTEGER;
    const bPickup = b.pickupDateObj ? b.pickupDateObj.getTime() : Number.MAX_SAFE_INTEGER;

    if (aPickup !== bPickup) {
      return aPickup - bPickup;
    }

    return String(a.productName || '').localeCompare(String(b.productName || ''), 'ko');
  });
}

function sortMissedItemsByLatestPickup(items) {
  return [...items].sort((a, b) => {
    const aPickup = a.pickupDateObj ? a.pickupDateObj.getTime() : -Infinity;
    const bPickup = b.pickupDateObj ? b.pickupDateObj.getTime() : -Infinity;

    if (aPickup !== bPickup) {
      return bPickup - aPickup; // 픽업일 최신순
    }

    if (a.orderDateValue !== b.orderDateValue) {
      return b.orderDateValue - a.orderDateValue;
    }

    return String(a.productName || '').localeCompare(String(b.productName || ''), 'ko');
  });
}

  function getDisplayTargets() {
    const seoulToday = getSeoulTodayInfo();
    const day = seoulToday.dayOfWeek;

    let firstTarget;
    let secondTarget;

    if (day === 6 || day === 0) {
      firstTarget = {
        key: SECTION_KEYS.TODAY_PICKUP,
        title: '🎈 월요일 픽업하기',
        dateInfo: getNextWeekdayInfo(seoulToday, 1)
      };

      secondTarget = {
        key: SECTION_KEYS.TOMORROW_PICKUP,
        title: '✅ 화요일 픽업 체크하기',
        dateInfo: getNextWeekdayInfo(seoulToday, 2)
      };
    } else if (day === 5) {
      firstTarget = {
        key: SECTION_KEYS.TODAY_PICKUP,
        title: '오늘 픽업하기 🎈',
        dateInfo: seoulToday
      };

      secondTarget = {
        key: SECTION_KEYS.TOMORROW_PICKUP,
        title: '✅ 월요일 픽업 체크하기',
        dateInfo: getNextWeekdayInfo(seoulToday, 1)
      };
    } else {
      firstTarget = {
        key: SECTION_KEYS.TODAY_PICKUP,
        title: '🎈 오늘 픽업하기',
        dateInfo: seoulToday
      };

      secondTarget = {
        key: SECTION_KEYS.TOMORROW_PICKUP,
        title: '✅ 내일픽업 체크하기',
        dateInfo: addDaysToInfo(seoulToday, 1)
      };
    }

    return [firstTarget, secondTarget].map(target => ({
      key: target.key,
      title: target.title,
      subtitle: formatSectionDateDisplay(target.dateInfo),
      dateInfo: target.dateInfo,
      dateKey: target.dateInfo.dateKey
    }));
  }

function buildSectionsData(items) {
  const normalized = normalizeOrderItems(items);
  const seoulToday = getSeoulTodayInfo();
  const targets = getDisplayTargets();

  const timeSaleOrders = sortItemsByOrderSheetDate(
    normalized.filter(item => item.isTimeSaleOrder)
  );
  const myOrders = sortItemsByOrderSheetDate(normalized);

  const sections = [];

  const sectionItemsMap = {
    [SECTION_KEYS.TIME_SALE]: timeSaleOrders,
    [SECTION_KEYS.MY_ORDERS]: myOrders
  };

  if (timeSaleOrders.length) {
    sections.push({
      key: SECTION_KEYS.TIME_SALE,
      title: '⚡ 방금 주문한 타임특가',
      subtitle: '주문 후 바로 확인'
    });
  }

  sections.push({
    key: SECTION_KEYS.MY_ORDERS,
    title: '나의 주문',
    subtitle: '최근 7일'
  });

  targets.forEach(target => {
    const targetItems = sortItemsByOrderSheetDate(
      normalized.filter(item => item.pickupDateKey === target.dateKey)
    );

    sectionItemsMap[target.key] = targetItems;

    if (targetItems.length) {
      sections.push({
        key: target.key,
        title: target.title,
        subtitle: target.subtitle
      });
    }
  });

  const targetKeySet = new Set(targets.map(target => target.dateKey));
  const todayStartTime = seoulToday.dateObj.getTime();

  const missedItems = sortMissedItemsByLatestPickup(
    normalized.filter(item => {
      if (!item.pickupDateObj) return false;
      if (targetKeySet.has(item.pickupDateKey)) return false;
      return item.pickupDateObj.getTime() < todayStartTime;
    })
  );

  sectionItemsMap[SECTION_KEYS.MISSED_PICKUP] = missedItems;

  if (missedItems.length) {
    sections.push({
      key: SECTION_KEYS.MISSED_PICKUP,
      title: '🛍️ 픽업 놓치신 물건은 없으신가요?'
    });
  }

  return {
    sections,
    sectionItemsMap
  };
}

  function formatPickupLabel(item) {

  function renderSectionHeading(section) {

  function collectOrderCardSnapshots(sectionKey) {
    const section = getOrderSectionEl(sectionKey);

    if (!section) return snapshots;

    section.querySelectorAll('.order-card[data-order-key]').forEach(card => {

  function settleOrderLayoutChange() {
    requestAnimationFrame(() => {

        resultPanelsSwiper.updateAutoHeight?.(0);

  function easeOrderFlip(progress) {
    const clampedProgress = clamp(progress, 0, 1);
    return 1 - Math.pow(1 - clampedProgress, 4);
  }

  function cleanupOrderFlightAnimation(section = null) {
    if (orderFlipAnimationFrame) {
      cancelAnimationFrame(orderFlipAnimationFrame);
      orderFlipAnimationFrame = null;
    }

    if (orderFlightLayer) {
      orderFlightLayer.remove();
      orderFlightLayer = null;
    }

    if (section) {
      section.classList.remove('animating');
    } else {
      document.querySelectorAll('.orders-section.animating').forEach(animatingSection => {
        animatingSection.classList.remove('animating');
      });
    }
  }

  function animateOrderCardsFromSnapshots(sectionKey, fromSnapshots) {
    const section = getOrderSectionEl(sectionKey);
    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    cleanupOrderFlightAnimation();

    if (!section || !fromSnapshots?.size || prefersReducedMotion) {
      settleOrderLayoutChange();
      return;
    }

    const layer = document.createElement('div');
    layer.className = 'order-card-flight-layer';
    document.body.appendChild(layer);
    orderFlightLayer = layer;

    section.classList.add('animating');

    const cards = Array.from(section.querySelectorAll('.order-card[data-order-key]'));
    const cardStates = cards.map((card, index) => {
      const snapshot = fromSnapshots.get(card.dataset.orderKey);
      const to = card.getBoundingClientRect();
      const from = snapshot?.rect || {
        left: to.left,
        top: to.top + 12,
        width: to.width
      };
      const isSamePosition =
        Math.abs(from.left - to.left) < 0.5 &&
        Math.abs(from.top - to.top) < 0.5 &&
        Math.abs((from.width || 0) - to.width) < 0.5;

      if (isSamePosition) return null;

      const clone = snapshot?.clone || card.cloneNode(true);

      clone.classList.add('order-card-flight');
      clone.style.width = `${Math.max(from.width || to.width, 1)}px`;
      clone.style.transform = `translate3d(${from.left}px, ${from.top}px, 0)`;
      clone.style.opacity = snapshot ? '0.98' : '0';
      layer.appendChild(clone);

      return {
        clone,
        hasFrom: Boolean(snapshot),
        delay: snapshot ? 0 : Math.min(index * 10, 80),
        duration: 420,
        from,
        to
      };
    }).filter(Boolean);

    if (!cardStates.length) {
      cleanupOrderFlightAnimation(section);
      settleOrderLayoutChange();
      return;
    }

    const startedAt = performance.now();
    const totalDuration = Math.max(...cardStates.map(state => state.delay + state.duration));

    const step = now => {
      const elapsed = now - startedAt;

      cardStates.forEach(state => {
        const rawProgress = (elapsed - state.delay) / state.duration;
        const progress = clamp(rawProgress, 0, 1);
        const eased = easeOrderFlip(progress);
        const x = state.from.left + ((state.to.left - state.from.left) * eased);
        const y = state.from.top + ((state.to.top - state.from.top) * eased);
        const width = state.from.width + ((state.to.width - state.from.width) * eased);
        const opacity = state.hasFrom
          ? 0.98 + (0.02 * eased)
          : eased;

        state.clone.style.width = `${Math.max(width, 1)}px`;
        state.clone.style.transform = `translate3d(${x}px, ${y}px, 0)`;
        state.clone.style.opacity = opacity.toFixed(3);
      });

      if (elapsed < totalDuration) {
        orderFlipAnimationFrame = requestAnimationFrame(step);
        return;
      }

      orderFlipAnimationFrame = null;
      cleanupOrderFlightAnimation(section);
      settleOrderLayoutChange();
    };

    orderFlipAnimationFrame = requestAnimationFrame(step);
  }

  function getScheduleCalendarPreviewData(items) {
    const normalized = normalizeOrderItems(items)
      .map((item, index) => ({ ...item, previewImageIndex: index }))
      .filter(item => item.pickupDateObj);

    if (!normalized.length) return null;

    const groups = new Map();
    normalized.forEach(item => {
      if (!groups.has(item.pickupDateKey)) {
        groups.set(item.pickupDateKey, {
          date: item.pickupDateObj,
          items: []
        });
      }

      groups.get(item.pickupDateKey).items.push(item);
    });

    const todayTime = getDateTime(getSeoulTodayInfo().dateObj);
    const groupedDays = Array.from(groups.values());
    const futureDays = groupedDays
      .filter(group => getDateTime(group.date) >= todayTime)
      .sort((a, b) => getDateTime(a.date) - getDateTime(b.date));
    const pastDays = groupedDays
      .filter(group => getDateTime(group.date) < todayTime)
      .sort((a, b) => getDateTime(b.date) - getDateTime(a.date));
    const selectedGroup = futureDays[0] || pastDays[0];

    if (!selectedGroup) return null;

    const sortedItems = sortItemsByOrderSheetDate(selectedGroup.items);
    const imageItems = sortedItems.slice(0, 2);
    const count = sortedItems.length;
    const totalQuantity = sortedItems.reduce((sum, item) => sum + (Number(item.quantity) || 0), 0);

    return {
      count,
      totalQuantity,
      dateKey: getDateKey(selectedGroup.date),
      dateLabel: formatPickupDateDisplay(selectedGroup.date),
      isFuture: Boolean(futureDays[0]),
      images: imageItems.map((item, index) => {
        const imageIndex = Number.isFinite(item.previewImageIndex) ? item.previewImageIndex : index;
        return {
          src: getImageUrl(item, imageIndex),
          alt: item.productName || '픽업상품 이미지',
          fallbackIndex: imageIndex
        };
      })
    };
  }

function isScheduleModalOpen() {
  return Boolean(scheduleModalEl?.classList.contains('is-open'));
}

function isScheduleModalActive() {
  return Boolean(scheduleModalEl?.classList.contains('is-open') || scheduleModalEl?.classList.contains('is-closing'));
}

function getScheduleScrollContainer() {
  return isScheduleModalOpen() ? scheduleModalBodyEl : null;
}

function resetScheduleOpenControls() {
  updateScheduleOpenControls(false);
}

function lockScheduleModalBackground() {
  if (document.body.classList.contains('schedule-modal-open')) return;

  scheduleModalScrollY = window.scrollY || window.pageYOffset || 0;
  document.body.style.position = 'fixed';
  document.body.style.top = `-${scheduleModalScrollY}px`;
  document.body.style.left = '0';
  document.body.style.right = '0';
  document.body.style.width = '100%';
  document.body.classList.add('schedule-modal-open');
}

function unlockScheduleModalBackground() {
  if (!document.body.classList.contains('schedule-modal-open')) return;

  document.body.classList.remove('schedule-modal-open');
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.left = '';
  document.body.style.right = '';
  document.body.style.width = '';
  window.scrollTo(0, scheduleModalScrollY || 0);
}

function resetScheduleModalInlineMotion() {
  if (scheduleModalSheetEl) {
    scheduleModalSheetEl.style.transition = '';
    scheduleModalSheetEl.style.transform = '';
  }

  if (scheduleModalDimEl) {
    scheduleModalDimEl.style.transition = '';
    scheduleModalDimEl.style.opacity = '';
  }
}

function getScheduleModalPullDistance(deltaY) {
  if (deltaY <= 0) return 0;
  const eased = Math.pow(deltaY, 0.82) * 0.9;
  return Math.min(eased, 180);
}

function startScheduleModalPull(clientY) {
  if (!scheduleModalSheetEl || !scheduleModalDimEl) return;
  scheduleModalPullState = {
    startY: clientY,
    lastY: clientY,
    lastAt: performance.now(),
    velocity: 0
  };
  scheduleModalSheetEl.style.transition = 'none';
  scheduleModalDimEl.style.transition = 'none';
}

function updateScheduleModalPull(clientY) {
  if (!scheduleModalPullState || !scheduleModalSheetEl) return;

  const now = performance.now();
  const elapsed = Math.max(now - scheduleModalPullState.lastAt, 1);
  const rawDelta = Math.max(0, clientY - scheduleModalPullState.startY);
  const pullDistance = getScheduleModalPullDistance(rawDelta);
  const dimOpacity = clamp(1 - (pullDistance / 360), 0.5, 1);

  scheduleModalPullState.velocity = (clientY - scheduleModalPullState.lastY) / elapsed;
  scheduleModalPullState.lastY = clientY;
  scheduleModalPullState.lastAt = now;

  scheduleModalSheetEl.style.transform = `translate3d(0, ${pullDistance}px, 0)`;
  if (scheduleModalDimEl) scheduleModalDimEl.style.opacity = String(dimOpacity);
}

function endScheduleModalPull(clientY = 0) {
  if (!scheduleModalPullState || !scheduleModalSheetEl) return;

  const rawDelta = Math.max(0, clientY - scheduleModalPullState.startY);
  const shouldClose =
    rawDelta > 190 ||
    (rawDelta > 130 && scheduleModalPullState.velocity > 1.2);

  scheduleModalSheetEl.style.transition = shouldClose
    ? 'transform 520ms cubic-bezier(0.32, 0.72, 0, 1)'
    : 'transform 360ms cubic-bezier(0.22, 1, 0.36, 1)';
  if (scheduleModalDimEl) {
    scheduleModalDimEl.style.transition = shouldClose ? 'opacity 380ms ease' : 'opacity 260ms ease';
  }
  scheduleModalPullState = null;

  if (shouldClose) {
    closeScheduleModal({ clear: false, animate: true });
    return;
  }

  scheduleModalSheetEl.style.transform = 'translate3d(0, 0, 0)';
  if (scheduleModalDimEl) scheduleModalDimEl.style.opacity = '1';

  window.setTimeout(() => {
    if (!scheduleModalPullState && !scheduleModalDragState) resetScheduleModalInlineMotion();
  }, 380);
}

function openScheduleModal(initialDateKey = '') {
  if (!scheduleModalEl || !currentOrderItems.length) return;
  if (scheduleModalCloseTimer) {
    clearTimeout(scheduleModalCloseTimer);
    scheduleModalCloseTimer = null;
  }

  const todayInfo = getSeoulTodayInfo();
  const nextDateKey = initialDateKey || todayInfo.dateKey;
  scheduleState.selectedDateKey = nextDateKey;
  activeResultTab = 'schedule';

  resetScheduleModalInlineMotion();
  scheduleModalEl.classList.remove('is-closing');
  scheduleModalEl.classList.add('is-open');
  scheduleModalEl.setAttribute('aria-hidden', 'false');
  updateScheduleOpenControls(true);
  lockScheduleModalBackground();

  scheduleWeekHostEl?.classList.add('is-visible');
  scheduleWeekHostEl?.setAttribute('aria-hidden', 'false');

  requestAnimationFrame(() => {
    renderScheduleTab();
    requestAnimationFrame(() => {
      selectScheduleDate(nextDateKey, { scroll: true, slide: true, behavior: 'auto' });
      scheduleModalCloseEl?.focus({ preventScroll: true });
      requestScheduleScrollSync();
    });
  });
}

function closeScheduleModal(options = {}) {
  if (!scheduleModalEl) return;

  const shouldClear = options.clear !== false;
  const shouldAnimate = options.animate !== false;

  if (scheduleModalCloseTimer) {
    clearTimeout(scheduleModalCloseTimer);
    scheduleModalCloseTimer = null;
  }

  const finishClose = () => {
    scheduleModalEl.classList.remove('is-open', 'is-closing');
    scheduleModalEl.setAttribute('aria-hidden', 'true');
    updateScheduleOpenControls(false);
    resetScheduleModalInlineMotion();
    unlockScheduleModalBackground();
    activeResultTab = 'orders';

    if (shouldClear) {
      clearScheduleTab();
    } else {
      scheduleWeekHostEl?.classList.remove('is-visible', 'is-sticky-ready', 'is-fixed');
      scheduleWeekHostEl?.setAttribute('aria-hidden', 'true');
      resetScheduleWeekStickyState();
    }
  };

  if (!isScheduleModalActive() || !shouldAnimate) {
    finishClose();
    return;
  }

  resetScheduleModalInlineMotion();
  scheduleModalEl.classList.remove('is-open');
  scheduleModalEl.classList.add('is-closing');

  scheduleModalCloseTimer = window.setTimeout(() => {
    scheduleModalCloseTimer = null;
    finishClose();
  }, 540);
}

function isScheduleModalDragTarget(target, pointerType = '') {
  if (!target) return false;
  if (target.closest?.('#scheduleModalDragZone')) return true;
  if (pointerType !== 'mouse' && target.closest?.('#scheduleWeekHost')) return true;
  if (target.closest?.('button, a, input, textarea, select')) return false;
  if (!scheduleModalBodyEl?.contains(target)) return true;
  return false;
}

function beginScheduleModalDrag(event) {
  if (!isScheduleModalOpen() || !scheduleModalSheetEl || event.button !== 0) return;
  if (!isScheduleModalDragTarget(event.target, event.pointerType)) return;

  scheduleModalDragState = {
    pointerId: event.pointerId,
    startY: event.clientY,
    lastY: event.clientY,
    lastAt: performance.now(),
    velocity: 0,
    height: scheduleModalSheetEl.getBoundingClientRect().height || window.innerHeight
  };

  scheduleModalSheetEl.setPointerCapture?.(event.pointerId);
  scheduleModalSheetEl.style.transition = 'none';
  if (scheduleModalDimEl) scheduleModalDimEl.style.transition = 'none';
}

function moveScheduleModalDrag(event) {
  if (!scheduleModalDragState || !scheduleModalSheetEl) return;
  if (event.pointerId !== scheduleModalDragState.pointerId) return;

  const now = performance.now();
  const deltaY = Math.max(0, event.clientY - scheduleModalDragState.startY);
  const elapsed = Math.max(now - scheduleModalDragState.lastAt, 1);
  scheduleModalDragState.velocity = (event.clientY - scheduleModalDragState.lastY) / elapsed;
  scheduleModalDragState.lastY = event.clientY;
  scheduleModalDragState.lastAt = now;

  if (deltaY <= 0) return;

  event.preventDefault();

  const easedDelta = Math.min(deltaY, scheduleModalDragState.height);
  const dimOpacity = clamp(1 - (easedDelta / Math.max(scheduleModalDragState.height * 0.75, 1)), 0, 1);

  scheduleModalSheetEl.style.transform = `translate3d(0, ${easedDelta}px, 0)`;
  if (scheduleModalDimEl) scheduleModalDimEl.style.opacity = String(dimOpacity);
}

function endScheduleModalDrag(event) {
  if (!scheduleModalDragState || !scheduleModalSheetEl) return;
  if (event.pointerId !== scheduleModalDragState.pointerId) return;

  const deltaY = Math.max(0, event.clientY - scheduleModalDragState.startY);
  const shouldClose =
    deltaY > scheduleModalDragState.height * 0.32 ||
    scheduleModalDragState.velocity > 0.9;

  scheduleModalSheetEl.releasePointerCapture?.(event.pointerId);
  scheduleModalSheetEl.style.transition = shouldClose
    ? 'transform 520ms cubic-bezier(0.32, 0.72, 0, 1)'
    : 'transform 360ms cubic-bezier(0.22, 1, 0.36, 1)';
  if (scheduleModalDimEl) {
    scheduleModalDimEl.style.transition = shouldClose ? 'opacity 380ms ease' : 'opacity 260ms ease';
  }
  scheduleModalDragState = null;

  if (shouldClose) {
    scheduleModalEl?.classList.remove('is-open');
    scheduleModalEl?.classList.add('is-closing');
    scheduleModalSheetEl.style.transform = 'translate3d(0, 105%, 0)';
    if (scheduleModalDimEl) scheduleModalDimEl.style.opacity = '0';
    closeScheduleModal({ clear: false, animate: true });
    return;
  }

  scheduleModalSheetEl.style.transform = 'translate3d(0, 0, 0)';
  if (scheduleModalDimEl) scheduleModalDimEl.style.opacity = '1';

  window.setTimeout(() => {
    if (!scheduleModalDragState) resetScheduleModalInlineMotion();
  }, shouldClose ? 540 : 380);
}

function initScheduleWeekSwiper() {
  const el = document.getElementById('scheduleWeekSwiper');
  if (!el || typeof Swiper !== 'function') return;

  destroyScheduleWeekSwiper();

  const activeIndex = getScheduleSlideIndexForDate(scheduleState.selectedDateKey);

  scheduleWeekSwiper = new Swiper(el, {
    slidesPerView: 7,
    slidesPerGroup: 1,
    grabCursor: true,
    simulateTouch: true,
    allowTouchMove: true,
    speed: 260,
    resistanceRatio: 0.7,
    threshold: 8,
    nested: true
  });

  if (activeIndex >= 0) {
    scheduleWeekSwiper.slideTo(activeIndex, 0);
  }
}

function destroyScheduleWeekSwiper() {
  if (scheduleWeekSwiper && typeof scheduleWeekSwiper.destroy === 'function') {
    scheduleWeekSwiper.destroy(true, true);
  }
  scheduleWeekSwiper = null;
}

function resetScheduleWeekStickyState() {
  scheduleWeekHostEl?.classList.remove('is-fixed');
  scheduleWeekHostEl?.removeAttribute('data-sticky-anchor-top');

  if (scheduleWeekPlaceholderEl) scheduleWeekPlaceholderEl.style.height = '0px';
  document.documentElement.style.setProperty('--schedule-week-current-height', '0px');
}

function requestScheduleWeekStickyUpdate() {
  if (scheduleWeekStickyFrame) return;
  scheduleWeekStickyFrame = requestAnimationFrame(() => {
    scheduleWeekStickyFrame = null;
    updateScheduleWeekStickyState();
  });
}

function updateScheduleWeekStickyState() {
  if (!scheduleWeekHostEl || !scheduleWeekPlaceholderEl) return;

  if (isScheduleModalOpen()) {
    resetScheduleWeekStickyState();
    return;
  }

  const shouldManage =
    ENABLE_SCHEDULE_WEEK_STICKY &&
    activeResultTab === 'schedule' &&
    scheduleWeekHostEl.classList.contains('is-visible');

  if (!shouldManage) {
    resetScheduleWeekStickyState();
    return;
  }

  const height = Math.max(0, Math.round(scheduleWeekHostEl.getBoundingClientRect().height || scheduleWeekHostEl.offsetHeight || 0));
  document.documentElement.style.setProperty('--schedule-week-current-height', `${height}px`);

  const scrollY = window.scrollY || window.pageYOffset || 0;
  const isFixed = scheduleWeekHostEl.classList.contains('is-fixed');

  if (!isFixed) {
    const anchorTop = Math.round(scheduleWeekHostEl.getBoundingClientRect().top + scrollY);
    scheduleWeekHostEl.dataset.stickyAnchorTop = String(anchorTop);
  }

  const stickyAnchorTop = Number(scheduleWeekHostEl.dataset.stickyAnchorTop || 0);
  const shouldFix = scrollY > stickyAnchorTop;

  scheduleWeekHostEl.classList.toggle('is-fixed', shouldFix);
  scheduleWeekPlaceholderEl.classList.toggle('is-active', shouldFix);
  scheduleWeekPlaceholderEl.style.height = shouldFix ? `${height}px` : '0px';
}

function getScheduleDateIndex(dateKey) {
  return scheduleState.dateKeys.indexOf(dateKey);
}

function getScheduleSlideIndexForDate(dateKey) {
  const dateIndex = getScheduleDateIndex(dateKey);
  if (dateIndex < 0) return -1;

  const maxStartIndex = Math.max(0, scheduleState.dateKeys.length - 7);
  return clamp(dateIndex - SCHEDULE_CENTER_OFFSET_DAYS, 0, maxStartIndex);
}

function getScheduleSectionTopGap(section) {
  if (!section) return 0;
  return Number.parseFloat(window.getComputedStyle(section).marginTop || '0') || 0;
}

function selectScheduleDate(dateKey, options = {}) {
  const shouldScroll = options.scroll !== false;
  const shouldSlide = options.slide !== false;
  const behavior = options.behavior || 'smooth';
  const date = dateFromKey(dateKey);
  const rangeStart = dateFromKey(scheduleState.rangeStartKey);
  const rangeEnd = dateFromKey(scheduleState.rangeEndKey);
  const nextDateKey = date && rangeStart && rangeEnd
    ? getDateKey(clampDateToRange(date, rangeStart, rangeEnd))
    : dateKey;

  scheduleState.selectedDateKey = nextDateKey;
  updateScheduleSelection(nextDateKey, { slide: shouldSlide });

  if (!shouldScroll) return;

  const section = document.querySelector(`[data-schedule-section="${nextDateKey}"]`);
  if (!section) return;

  scheduleSuppressScrollSync = true;
  const scrollContainer = getScheduleScrollContainer();
  const sticky = scheduleWeekHostEl;
  const topOffset = Math.round(sticky?.getBoundingClientRect().height || sticky?.offsetHeight || 0);
  const sectionTopGap = getScheduleSectionTopGap(section);

  if (scrollContainer) {
    const containerRect = scrollContainer.getBoundingClientRect();
    const targetTop =
      section.getBoundingClientRect().top -
      containerRect.top +
      scrollContainer.scrollTop -
      topOffset -
      sectionTopGap;

    scrollContainer.scrollTo({
      top: Math.max(0, targetTop),
      behavior
    });
  } else {
    const pageOffset =
      (ENABLE_RESULT_TABS_STICKY ? (resultTabsWrap?.getBoundingClientRect().height || 0) : 0) +
      (ENABLE_SCHEDULE_WEEK_STICKY ? topOffset : 0) +
      sectionTopGap;
    const targetTop = section.getBoundingClientRect().top + (window.scrollY || window.pageYOffset || 0) - pageOffset;
    window.scrollTo({
      top: Math.max(0, targetTop),
      behavior
    });
  }

  window.setTimeout(() => {
    scheduleSuppressScrollSync = false;
  }, behavior === 'smooth' ? 520 : 80);
}

function updateScheduleSelection(dateKey, options = {}) {
  scheduleState.selectedDateKey = dateKey;

  scheduleWeekHostEl?.querySelectorAll('[data-schedule-date]').forEach(button => {
    button.classList.toggle('is-selected', button.dataset.scheduleDate === dateKey);
  });

  if (options.slide === false || !scheduleWeekSwiper) return;

  const activeIndex = getScheduleSlideIndexForDate(dateKey);
  if (activeIndex < 0 || activeIndex === scheduleWeekSwiper.activeIndex) return;

  scheduleSuppressWeekSlide = true;
  scheduleWeekSwiper.slideTo(activeIndex, 240);
  window.setTimeout(() => {
    scheduleSuppressWeekSlide = false;
  }, 260);
}

function requestScheduleScrollSync() {
  if (scheduleScrollFrame) return;
  scheduleScrollFrame = requestAnimationFrame(() => {
    scheduleScrollFrame = null;
    syncScheduleFromScroll();
  });
}

function syncScheduleFromScroll() {
  if (activeResultTab !== 'schedule' || scheduleSuppressScrollSync || !scheduleContentEl) return;
  const sections = [...scheduleContentEl.querySelectorAll('[data-schedule-section]')];
  if (!sections.length) return;

  const scrollContainer = getScheduleScrollContainer();
  const sticky = scheduleWeekHostEl;
  const stickyRect = sticky?.getBoundingClientRect();
  const stickyHeight = sticky?.offsetHeight || 0;
  const tabBottom = resultTabsWrap?.getBoundingClientRect().bottom || 0;
  const readLine = scrollContainer
    ? (stickyRect?.bottom || stickyHeight) + 14
    : sticky?.classList.contains('is-fixed')
      ? (stickyRect?.bottom || stickyHeight) + 14
      : tabBottom + stickyHeight + 14;
  const scrollBottom = scrollContainer
    ? scrollContainer.scrollTop + scrollContainer.clientHeight
    : (window.scrollY || window.pageYOffset || 0) + window.innerHeight;
  const documentHeight = scrollContainer
    ? scrollContainer.scrollHeight
    : Math.max(
        document.documentElement.scrollHeight || 0,
        document.body.scrollHeight || 0
      );

  let activeSection = null;

  const scrollTop = scrollContainer ? scrollContainer.scrollTop : (window.scrollY || window.pageYOffset || 0);

  if (scrollTop > 0 && documentHeight - scrollBottom <= 4) {
    activeSection = sections[sections.length - 1];
  } else {
    for (const section of sections) {
      const rect = section.getBoundingClientRect();
      const sectionTopGap = getScheduleSectionTopGap(section);
      if (rect.top - sectionTopGap <= readLine) {
        activeSection = section;
      } else {
        break;
      }
    }
  }

  if (!activeSection) return;

  const nextDateKey = activeSection.dataset.scheduleSection;
  if (nextDateKey && nextDateKey !== scheduleState.selectedDateKey) {
    updateScheduleSelection(nextDateKey, { slide: true });
  }
}

  function setupSupportCardTilt(card) {
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) return;

    const isMobile = window.matchMedia('(max-width: 640px)').matches;
    const maxTilt = isMobile ? 8.2 : 6.2;

    let frameId = null;
    let targetX = 0;
    let targetY = 0;
    let currentX = 0;
    let currentY = 0;
    let orientationBase = null;
    let orientationPermissionAsked = false;
    let lastOrientationAt = 0;

    function renderTilt() {
      frameId = null;

      currentX += (targetX - currentX) * 0.16;
      currentY += (targetY - currentY) * 0.16;

      card.style.setProperty('--tilt-x', `${currentX.toFixed(3)}deg`);
      card.style.setProperty('--tilt-y', `${currentY.toFixed(3)}deg`);

      const keepMoving =
        Math.abs(targetX - currentX) > 0.015 ||
        Math.abs(targetY - currentY) > 0.015;

      if (keepMoving) {
        frameId = requestAnimationFrame(renderTilt);
      } else if (Math.abs(currentX) < 0.02 && Math.abs(currentY) < 0.02) {
        card.classList.remove('is-tilting');
      }
    }

    function requestRender() {
      card.classList.add('is-tilting');
      if (!frameId) frameId = requestAnimationFrame(renderTilt);
    }

    function setTilt(nextX, nextY) {
      targetX = clamp(nextX, -maxTilt, maxTilt);
      targetY = clamp(nextY, -maxTilt, maxTilt);
      requestRender();
    }

    function setTiltFromPoint(clientX, clientY) {
      const rect = card.getBoundingClientRect();
      const x = ((clientX - rect.left) / rect.width - 0.5) * 2;
      const y = ((clientY - rect.top) / rect.height - 0.5) * 2;

      setTilt(-y * maxTilt, x * maxTilt);
    }

    function resetTilt() {
      targetX = 0;
      targetY = 0;
      orientationBase = null;
      requestRender();
    }

    function handleOrientation(event) {
      if (event.beta == null && event.gamma == null) return;

      const now = Date.now();
      if (now - lastOrientationAt < 34) return;
      lastOrientationAt = now;

      const beta = Number(event.beta || 0);
      const gamma = Number(event.gamma || 0);

      if (!orientationBase) {
        orientationBase = { beta, gamma };
        return;
      }

      const deltaBeta = clamp(beta - orientationBase.beta, -24, 24);
      const deltaGamma = clamp(gamma - orientationBase.gamma, -24, 24);

      const nextX = clamp((-deltaBeta / 24) * maxTilt, -maxTilt, maxTilt);
      const nextY = clamp((deltaGamma / 24) * maxTilt, -maxTilt, maxTilt);

      setTilt(nextX, nextY);
    }

    function bindDeviceOrientation() {
      if (!window.DeviceOrientationEvent) return;

      window.addEventListener('deviceorientation', handleOrientation, { passive: true });
    }

    function requestDeviceOrientationPermission() {
      if (orientationPermissionAsked) return;
      orientationPermissionAsked = true;

      if (
        window.DeviceOrientationEvent &&
        typeof window.DeviceOrientationEvent.requestPermission === 'function'
      ) {
        window.DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') bindDeviceOrientation();
          })
          .catch(() => {});
      } else {
        bindDeviceOrientation();
      }
    }

    card.addEventListener('pointermove', event => {
      const hasRecentOrientation = Date.now() - lastOrientationAt < 800;
      if (hasRecentOrientation) return;
      setTiltFromPoint(event.clientX, event.clientY);
    }, { passive: true });

    card.addEventListener('pointerdown', event => {
      requestDeviceOrientationPermission();
      setTiltFromPoint(event.clientX, event.clientY);
    }, { passive: true });

    card.addEventListener('touchstart', requestDeviceOrientationPermission, { passive: true });
    card.addEventListener('pointerleave', resetTilt);
    card.addEventListener('pointercancel', resetTilt);

    bindDeviceOrientation();
  }

  function bindDesktopOrderWheel(el, swiper) {
    if (!el || !swiper || !isDesktopPointerViewport()) return;

    el.addEventListener('wheel', event => {
      if (!swiper || swiper.destroyed) return;
      if (event.ctrlKey) return;
      if (Math.abs(event.deltaX) <= Math.abs(event.deltaY)) return;

      const direction = event.deltaX > 0 ? 1 : -1;
      const canMovePrev = !swiper.isBeginning || swiper.translate < swiper.minTranslate();
      const canMoveNext = !swiper.isEnd || swiper.translate > swiper.maxTranslate();

      if ((direction < 0 && !canMovePrev) || (direction > 0 && !canMoveNext)) return;

      event.preventDefault();

      const wheelDelta =
        event.deltaMode === 1
          ? event.deltaX * 32
          : event.deltaMode === 2
            ? event.deltaX * window.innerWidth
            : event.deltaX;

      const nextTranslate = clamp(
        swiper.translate - wheelDelta,
        swiper.maxTranslate(),
        swiper.minTranslate()
      );

      swiper.setTranslate(nextTranslate);
      swiper.updateProgress(nextTranslate);
      swiper.updateActiveIndex();
      swiper.updateSlidesClasses();
    }, { passive: false });
  }

function getRectCenter(rect) {

function setImageZoomContentRect(content, rect, radius) {

function getCoverScaleForViewport(sourceRect) {
  const viewport = getViewportRect();

  // 1:1 이미지를 화면 전체 영역까지 덮도록 만드는 배율
  return Math.max(
    viewport.width / Math.max(sourceRect.width, 1),
    viewport.height / Math.max(sourceRect.height, 1)

function openOrderImageZoom(img, sourceWrap, touches = null) {
  if (activeImageZoom || !img || !touches || touches.length < 2) return;

  const sourceRect = sourceWrap.getBoundingClientRect();
  const sourceRadius = getComputedStyle(sourceWrap).borderRadius || '0px';
  const sourceCenter = getRectCenter(sourceRect);
  const startDistance = getTouchDistance(touches);
  const startCenter = getTouchCenter(touches);
  const viewport = getViewportRect();

  const overlay = document.createElement('div');
  const frame = document.createElement('div');
  const content = document.createElement('div');
  const zoomImg = document.createElement('img');

  overlay.className = 'image-pinch-overlay';
  frame.className = 'image-pinch-frame';
  content.className = 'image-pinch-content';
  zoomImg.className = 'image-pinch-img';

  zoomImg.src = img.dataset.zoomSrc || img.currentSrc || img.src;
  zoomImg.alt = img.alt || '';
  zoomImg.decoding = 'async';
  zoomImg.draggable = false;

  content.appendChild(zoomImg);
  frame.appendChild(content);
  overlay.appendChild(frame);
  document.body.appendChild(overlay);

  setImageZoomContentRect(content, sourceRect, sourceRadius);

  activeImageZoom = {
    overlay,
    frame,
    content,
    sourceRect,
    sourceRadius,
    sourceCenter,
    startDistance,
    startCenter,
    viewportCenter: {
      x: viewport.left + viewport.width / 2,
      y: viewport.top + viewport.height / 2
    },
    scale: 1,
    panX: 0,
    panY: 0,
    dimOpacity: 0.08,
    bodyOverflow: document.body.style.overflow
  };

  document.body.style.overflow = 'hidden';

  requestAnimationFrame(() => {
    overlay.classList.add('show');
    overlay.style.setProperty('--pinch-dim-opacity', '0.08');
  });
}

function updateActiveImageZoom(touches) {
  if (!activeImageZoom || touches.length < 2) return;

  const zoom = activeImageZoom;

  const currentDistance = getTouchDistance(touches);
  const currentCenter = getTouchCenter(touches);
  const rawScale = currentDistance / Math.max(zoom.startDistance, 1);

  // 손가락을 벌리면 썸네일에서 화면 전체를 덮는 배율까지 커짐 (1.2 = 감도 낮춤)
  const expandProgress = clamp((rawScale - 1) / 1.2, 0, 1);
  const coverScale = getCoverScaleForViewport(zoom.sourceRect);

  // 기본 확대: 썸네일 → 화면 전체 contain
  const baseScale = lerp(1, coverScale, expandProgress);

  // 화면 전체를 덮은 뒤에는 추가 확대
  const extraScale = rawScale > 2.2
    ? 1 + ((rawScale - 2.2) * 0.6)
    : 1;

  const targetScale = clamp(baseScale * extraScale, 1, coverScale * 2.0);

  // 손가락 이동량 그대로 반영
  const fingerMoveX = currentCenter.x - zoom.startCenter.x;
  const fingerMoveY = currentCenter.y - zoom.startCenter.y;

  // 확대될수록 화면 중앙으로 자연스럽게 커지되,
  // 손가락 이동은 그대로 따라가게 함
  const autoCenterX = lerp(zoom.sourceCenter.x, zoom.viewportCenter.x, expandProgress);
  const autoCenterY = lerp(zoom.sourceCenter.y, zoom.viewportCenter.y, expandProgress);

  const targetCenterX = autoCenterX + fingerMoveX;
  const targetCenterY = autoCenterY + fingerMoveY;

  const targetPanX = targetCenterX - zoom.sourceCenter.x;
  const targetPanY = targetCenterY - zoom.sourceCenter.y;

  // 너무 굼뜨지 않게 보간
  zoom.scale = zoom.scale + ((targetScale - zoom.scale) * 0.32);
  zoom.panX = zoom.panX + ((targetPanX - zoom.panX) * 0.36);
  zoom.panY = zoom.panY + ((targetPanY - zoom.panY) * 0.36);

  zoom.content.style.transform =
    `translate3d(${zoom.panX}px, ${zoom.panY}px, 0) scale(${zoom.scale})`;

  const targetDimOpacity = lerp(0.08, 0.72, expandProgress);
  zoom.dimOpacity = zoom.dimOpacity + ((targetDimOpacity - zoom.dimOpacity) * 0.25);
  zoom.overlay.style.setProperty('--pinch-dim-opacity', zoom.dimOpacity.toFixed(3));
}

function closeOrderImageZoom() {

  const zoom = activeImageZoom;
  activeImageZoom = null;

  zoom.content.classList.add('is-returning');

  zoom.overlay.style.setProperty('--pinch-dim-opacity', '0');

  // 손 떼면 원래 썸네일 위치로 복귀
  zoom.content.style.transform = 'translate3d(0, 0, 0) scale(1)';
  zoom.content.style.borderRadius = zoom.sourceRadius;

}

function showResultTopbar() {
  if (topbarVisible) {
    rhKeyword.value = keywordInput.value;
    return;
  }
  topbarVisible = true;
  rhKeyword.value = keywordInput.value;

  const D = 280;
  const E = 'cubic-bezier(0.22, 1, 0.36, 1)';
  const origShellEl = document.querySelector('.search-shell');
  const origLogoEl = document.querySelector('.logo-svg');
  const origShellR = origShellEl ? origShellEl.getBoundingClientRect() : null;
  const origLogoR = origLogoEl ? origLogoEl.getBoundingClientRect() : null;
  const manmanRatio = 267 / 513;

  resultTopbar.classList.add('is-visible');
  resultTopbar.style.visibility = 'hidden';
  resultTopbar.style.pointerEvents = 'none';
  resultTopbar.setAttribute('aria-hidden', 'false');
  resultTopbar.offsetHeight;

  const topbarH = resultTopbar.offsetHeight;
  document.documentElement.style.setProperty('--topbar-h', `${topbarH}px`);

  const rhWrap = resultTopbar.querySelector('.rh-search-wrap');
  const rhLogo = resultTopbar.querySelector('.rh-logo');
  const tabs = resultTopbar.querySelector('.rh-tabs');
  const targetShellR = rhWrap ? rhWrap.getBoundingClientRect() : null;
  const targetLogoR = rhLogo ? rhLogo.getBoundingClientRect() : null;

  if (rhWrap) rhWrap.style.opacity = '0';
  if (rhLogo) rhLogo.style.opacity = '0';
  if (tabs) tabs.style.cssText = 'opacity:0; transition:none;';

  const shellGhost = origShellEl && origShellR && targetShellR
    ? createSearchShellGhost(origShellEl, origShellR)
    : null;

  const logoGhost = origLogoR && targetLogoR
    ? createManmanLogoGhost(origLogoR, manmanRatio)
    : null;

  if (origShellEl) origShellEl.style.visibility = 'hidden';
  if (origLogoEl) origLogoEl.style.visibility = 'hidden';

  resultTopbar.style.visibility = '';
  resultTopbar.style.pointerEvents = '';
  document.body.classList.add('has-results');
  window.scrollTo({ top: 0, behavior: 'instant' });

  const topStage = document.querySelector('.top-stage');
  if (topStage) {
    const stH = topStage.scrollHeight;
    topStage.style.cssText = `max-height:${stH}px; overflow:hidden; opacity:1;`;
    requestAnimationFrame(() => {
      topStage.style.transition = `max-height ${D}ms ${E}, opacity 180ms ease`;
      topStage.style.maxHeight = '0';
      topStage.style.opacity = '0';
      topStage.style.pointerEvents = 'none';
    });
  }

  const animations = [];
  if (shellGhost && targetShellR) {
    animations.push(animateGhostRect(shellGhost, origShellR, targetShellR, D, E));
  }
  if (logoGhost && targetLogoR && origLogoR) {
    const fromLogoR = {
      left: origLogoR.left,
      top: origLogoR.top,
      width: origLogoR.width * manmanRatio,
      height: origLogoR.height
    };
    animations.push(animateGhostRect(logoGhost, fromLogoR, targetLogoR, D + 40, E));
  }

  Promise.allSettled(animations).then(() => {
    if (shellGhost) shellGhost.remove();
    if (logoGhost) logoGhost.remove();
    if (rhWrap) rhWrap.style.opacity = '1';
    if (rhLogo) rhLogo.style.opacity = '1';
    if (tabs) {
      tabs.style.transition = 'opacity 160ms ease';
      tabs.style.opacity = '1';
    }
  });
}

function createSearchShellGhost(sourceEl, rect) {
  const ghost = sourceEl.cloneNode(true);
  ghost.querySelectorAll('[id]').forEach(el => el.removeAttribute('id'));
  const input = ghost.querySelector('input');
  if (input) input.value = keywordInput.value;
  ghost.classList.add('topbar-motion-ghost');
  Object.assign(ghost.style, {
    left: `${rect.left}px`,
    top: `${rect.top}px`,
    width: `${rect.width}px`,
    height: `${rect.height}px`
  });
  document.body.appendChild(ghost);
  return ghost;
}

function createManmanLogoGhost(sourceLogoRect, ratio) {
  const ghost = document.createElement('div');
  ghost.className = 'topbar-motion-ghost topbar-motion-ghost--logo';
  ghost.innerHTML = rhLogoBtn.innerHTML;
  Object.assign(ghost.style, {
    left: `${sourceLogoRect.left}px`,
    top: `${sourceLogoRect.top}px`,
    width: `${sourceLogoRect.width * ratio}px`,
    height: `${sourceLogoRect.height}px`
  });
  document.body.appendChild(ghost);
  return ghost;
}

function animateGhostRect(el, fromRect, toRect, duration, easing) {
  const from = {
    left: fromRect.left,
    top: fromRect.top,
    width: fromRect.width,
    height: fromRect.height,
    opacity: 1
  };
  const to = {
    left: toRect.left,
    top: toRect.top,
    width: toRect.width,
    height: toRect.height,
    opacity: 1
  };

  if (el.animate) {
    const animation = el.animate([
      {
        left: `${from.left}px`,
        top: `${from.top}px`,
        width: `${from.width}px`,
        height: `${from.height}px`,
        opacity: from.opacity
      },
      {
        left: `${to.left}px`,
        top: `${to.top}px`,
        width: `${to.width}px`,
        height: `${to.height}px`,
        opacity: to.opacity
      }
    ], {
      duration,
      easing,
      fill: 'forwards'
    });
    return animation.finished.catch(() => {});
  }

  return new Promise(resolve => {
    el.style.transition = `left ${duration}ms ${easing}, top ${duration}ms ${easing}, width ${duration}ms ${easing}, height ${duration}ms ${easing}`;
    requestAnimationFrame(() => {
      Object.assign(el.style, {
        left: `${to.left}px`,
        top: `${to.top}px`,
        width: `${to.width}px`,
        height: `${to.height}px`
      });
      setTimeout(resolve, duration);
    });
  });
}

function hideResultTopbar() {

function showResultTabs() {
  if (!ENABLE_LEGACY_RESULT_TABS) {
    hideResultTabs();
    return;
  }

  if (!resultTabsWrap) return;
  resultTabsWrap.classList.add('is-visible');
  resultTabsWrap.setAttribute('aria-hidden', 'false');
  initResultTabsSwiper();
  initResultTabsObserver();
  updateResultTabsHeightVar();
  syncResultPanelsHeight();
  if (resultPanelsSwiper) resultPanelsSwiper.update();
  setActiveTab('orders', { slide: false });
  requestResultTabsStickyUpdate();
}

function hideResultTabs() {
  if (!resultTabsWrap) return;
  resultTabsWrap.classList.remove('is-visible');
  resultTabsWrap.classList.remove('is-stuck', 'is-sticky-ready', 'is-dragging');
  resultTabsWrap.setAttribute('aria-hidden', 'true');
  resultTabsWrap.style.setProperty('--sticky-progress', '0');
  scheduleWeekHostEl?.classList.remove('is-visible', 'is-sticky-ready', 'is-fixed');
  scheduleWeekHostEl?.setAttribute('aria-hidden', 'true');
  resetScheduleWeekStickyState();
  resultTabsPinned = false;
  activeResultTab = 'orders';
  updateResultTabsVisualState();
  if (resultPanelsSwiper) resultPanelsSwiper.slideTo(0, 0);
}

function requestResultTabsStickyUpdate() {
  if (resultTabsFrame) return;
  resultTabsFrame = requestAnimationFrame(() => {
    resultTabsFrame = null;
    updateResultTabsStickyState();
  });
}

function updateResultTabsStickyState() {
  if (!resultTabsWrap || !resultTabsWrap.classList.contains('is-visible')) return;
  updateResultTabsHeightVar();

  if (!ENABLE_RESULT_TABS_STICKY) {
    resultTabsPinned = false;
    resultTabsWrap.classList.remove('is-stuck', 'is-sticky-ready');
    resultTabsWrap.style.setProperty('--sticky-progress', '0');
    return;
  }

  resultTabsWrap.classList.add('is-sticky-ready');
  const rect = resultTabsWrap.getBoundingClientRect();
  const start = 98;
  const end = 0;
  const progress = clamp((start - rect.top) / Math.max(start - end, 1), 0, 1);
  resultTabsWrap.style.setProperty('--sticky-progress', progress.toFixed(3));
  resultTabsWrap.classList.toggle('is-stuck', resultTabsPinned || progress > 0.72);
}

function updateResultTabsHeightVar() {
  if (!resultTabsWrap) return;
  const height = Math.max(0, Math.round(resultTabsWrap.getBoundingClientRect().height));
  document.documentElement.style.setProperty('--result-tabs-current-height', `${height}px`);
}

function resetResultTabScrollPositions() {
  resultTabScrollPositions.orders = null;
  resultTabScrollPositions.schedule = null;
}

function saveResultTabScroll(tabName) {
  if (isRestoringResultTabScroll) return;
  if (tabName !== 'orders' && tabName !== 'schedule') return;
  resultTabScrollPositions[tabName] = window.scrollY || window.pageYOffset || 0;
}

function getDefaultResultTabScrollTop(tabName) {
  const anchor =
    tabName === 'schedule'
      ? (resultTabsWrap || scheduleWeekHostEl || resultPanels)
      : (resultTabsWrap || resultPanels);

  if (!anchor) return 0;

  const rect = anchor.getBoundingClientRect();
  return Math.max(0, Math.round(rect.top + (window.scrollY || window.pageYOffset || 0) - 8));
}

function restoreResultTabScroll(tabName, delay = 0) {
  const saved = resultTabScrollPositions[tabName];
  if (!Number.isFinite(saved)) return false;

  window.setTimeout(() => {
    isRestoringResultTabScroll = true;
    window.scrollTo(0, Math.max(0, saved));
    window.setTimeout(() => {
      isRestoringResultTabScroll = false;
    }, 80);
  }, delay);

  return true;
}

function setActiveTab(tabName, options = {}) {
  if (!ordersTab || !scheduleTab) return;
  const normalizedTab = tabName === 'schedule' ? 'schedule' : 'orders';
  const nextIndex = normalizedTab === 'orders' ? 0 : 1;
  const shouldSlide = options.slide !== false;
  const shouldRestoreScroll = options.restoreScroll === true;
  const previousTab = activeResultTab === 'schedule' ? 'schedule' : 'orders';
  const tabChanged = normalizedTab !== previousTab;

  if (tabChanged) {
    saveResultTabScroll(previousTab);
  }

  activeResultTab = normalizedTab;
  if (resultTabsWrap) {
    resultTabsWrap.style.setProperty('--tab-index', String(nextIndex));
    resultTabsWrap.style.setProperty('--tab-progress', String(nextIndex));
  }

  if (normalizedTab === 'orders') {
    scheduleWeekHostEl?.classList.remove('is-visible', 'is-sticky-ready', 'is-fixed');
    scheduleWeekHostEl?.setAttribute('aria-hidden', 'true');
    resetScheduleWeekStickyState();
    ordersTab.classList.add('is-active');
    ordersTab.setAttribute('aria-selected', 'true');
    scheduleTab.classList.remove('is-active');
    scheduleTab.setAttribute('aria-selected', 'false');
    if (ordersPanel) ordersPanel.classList.remove('tab-hidden');
    if (schedulePanelEl) schedulePanelEl.classList.remove('is-active');
  } else {
    scheduleState.selectedDateKey = getSeoulTodayInfo().dateKey;
    renderScheduleTab();
    scheduleWeekHostEl?.classList.add('is-visible');
    scheduleWeekHostEl?.setAttribute('aria-hidden', 'false');
    scheduleWeekHostEl?.classList.toggle('is-sticky-ready', ENABLE_SCHEDULE_WEEK_STICKY);
    requestScheduleWeekStickyUpdate();
    scheduleTab.classList.add('is-active');
    scheduleTab.setAttribute('aria-selected', 'true');
    ordersTab.classList.remove('is-active');
    ordersTab.setAttribute('aria-selected', 'false');
    if (ordersPanel) ordersPanel.classList.add('tab-hidden');
    if (schedulePanelEl) schedulePanelEl.classList.add('is-active');
  }

  if (resultPanelsSwiper && shouldSlide && resultPanelsSwiper.activeIndex !== nextIndex) {
    resultPanelsSwiper.slideTo(nextIndex);
  }

  if (resultPanelsSwiper) {
    resultPanelsSwiper.update();
    resultPanelsSwiper.updateAutoHeight?.(240);
  }

  requestResultTabsStickyUpdate();

  if (tabChanged && shouldRestoreScroll) {
    restoreResultTabScroll(normalizedTab, shouldSlide ? 360 : 40);
  }
}

function initResultTabsSwiper() {
  if (!resultPanels || resultPanelsSwiper || typeof Swiper !== 'function') return;

  resultPanelsSwiper = new Swiper(resultPanels, {
    slidesPerView: 1,
    speed: 340,
    effect: 'creative',
    autoHeight: true,
    grabCursor: true,
    watchSlidesProgress: true,
    observer: true,
    observeParents: true,
    preventInteractionOnTransition: false,
    noSwiping: true,
    noSwipingSelector: '.orders-swiper, .orders-swiper *, .schedule-week-swiper, .schedule-week-swiper *',
    creativeEffect: {
      limitProgress: 2,
      perspective: false,
      prev: {
        translate: ['-100%', 0, -80],
        scale: 0.96,
        opacity: 0.92
      },
      next: {
        translate: ['100%', 0, -80],
        scale: 0.96,
        opacity: 0.92
      }
    },
    resistanceRatio: 0.72,
    nested: true,
    threshold: 8,
    on: {
      progress(swiper, progress) {
        updateResultTabProgress(progress);
      },
      sliderFirstMove() {
        resultTabsWrap?.classList.add('is-dragging');
      },
      touchEnd() {
        resultTabsWrap?.classList.remove('is-dragging');
      },
      slideChange(swiper) {
        if (!swiper.width || swiper.isLocked) return;
        setActiveTab(swiper.activeIndex === 1 ? 'schedule' : 'orders', { slide: false, restoreScroll: true });
      },
      transitionEnd(swiper) {
        resultTabsWrap?.classList.remove('is-dragging');
        updateResultTabProgress(swiper.activeIndex);
        swiper.updateAutoHeight?.(0);
      }
    }
  });
}

function initResultTabsObserver() {
  if (!resultTabsSentinel || !resultTabsWrap || resultTabsObserver) return;

  resultTabsObserver = new IntersectionObserver(entries => {
    if (!ENABLE_RESULT_TABS_STICKY) {
      resultTabsPinned = false;
      resultTabsWrap.classList.remove('is-stuck', 'is-sticky-ready');
      return;
    }

    const entry = entries[0];
    resultTabsPinned = Boolean(entry && !entry.isIntersecting);
    resultTabsWrap.classList.add('is-sticky-ready');
    resultTabsWrap.classList.toggle('is-stuck', resultTabsPinned);
    requestResultTabsStickyUpdate();
  }, {
    threshold: 0,
    rootMargin: '-1px 0px 0px 0px'
  });

  resultTabsObserver.observe(resultTabsSentinel);
}

function updateResultTabsVisualState() {
  if (!ordersTab || !scheduleTab) return;

  const activeIndex = activeResultTab === 'schedule' ? '1' : '0';
  resultTabsWrap?.style.setProperty('--tab-index', activeIndex);
  resultTabsWrap?.style.setProperty('--tab-progress', activeIndex);
  ordersTab.classList.toggle('is-active', activeResultTab === 'orders');
  ordersTab.setAttribute('aria-selected', activeResultTab === 'orders' ? 'true' : 'false');
  scheduleTab.classList.toggle('is-active', activeResultTab === 'schedule');
  scheduleTab.setAttribute('aria-selected', activeResultTab === 'schedule' ? 'true' : 'false');
}

function updateResultTabProgress(progress) {
  if (!resultTabsWrap) return;
  resultTabsWrap.style.setProperty('--tab-progress', clamp(progress, 0, 1).toFixed(4));
}

function syncResultPanelsHeight() {
  if (!resultPanels || !ordersPanel) return;
  const minHeight = Math.max(ordersPanel.scrollHeight || 0, Math.round(window.innerHeight * 0.7));
  resultPanels.style.setProperty('--result-panel-min-height', `${minHeight}px`);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

// 탑바 서치 실행
function searchFromTopbar() {
  const val = rhKeyword.value.trim();
  keywordInput.value = val;
  search();
}

// 탑바 버튼 이벤트
rhSearchBtn.addEventListener('click', searchFromTopbar);

rhKeyword.addEventListener('keydown', e => {
  if (e.key === 'Enter') searchFromTopbar();
});

// 탑바 인풋: 값 동기화만
rhKeyword.addEventListener('input', () => {
  rhKeyword.value = sanitizeFourDigitInput(rhKeyword.value);
  keywordInput.value = rhKeyword.value;
});

// iOS 숫자패드 "완료" 버튼 → blur → 4자리면 조회
rhKeyword.addEventListener('blur', () => {
  setTimeout(() => {
    rhKeyword.value = sanitizeFourDigitInput(rhKeyword.value);
    keywordInput.value = rhKeyword.value;

    if (shouldRunKeyboardConfirmSearch(rhKeyword.value, rhSearchBtn)) {
      searchFromTopbar();
    }
  }, 150);
});

// 만만 로고 클릭 → 홈으로
rhLogoBtn.addEventListener('click', resetToHome);
rhLogoBtn.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    resetToHome();
  }
});

function handleResultTabPointer(event) {
  const tab = event.target.closest('.rh-tab[data-tab]');
  if (!tab || !resultTabsWrap || !resultTabsWrap.contains(tab)) return;
  event.preventDefault();
  setActiveTab(tab.dataset.tab || 'orders', { restoreScroll: true });
}

function handleResultTabClick(event) {
  const tab = event.target.closest('.rh-tab[data-tab]');
  if (!tab || !resultTabsWrap || !resultTabsWrap.contains(tab)) return;
  setActiveTab(tab.dataset.tab || 'orders', { restoreScroll: true });
}

if (resultTabsWrap) {
  resultTabsWrap.addEventListener('pointerup', handleResultTabPointer);
  resultTabsWrap.addEventListener('click', handleResultTabClick);
}

function renderLoadingState() {
  return `
    <div class="search-loading">
      <div class="search-loading-inner">
        <div class="search-loading-stage">
          <div class="search-loading-glow"></div>

          <div class="search-loading-orbit search-loading-orbit--outer">
            <span class="search-loading-dot search-loading-dot--1"></span>
            <span class="search-loading-dot search-loading-dot--2"></span>
          </div>

          <div class="search-loading-orbit search-loading-orbit--inner">
            <span class="search-loading-dot search-loading-dot--3"></span>
            <span class="search-loading-dot search-loading-dot--4"></span>
          </div>

          <div class="search-loading-grandpa">
            ${getGrandpaLoaderSvgMarkup()}
          </div>

          <div class="search-loading-pedestal"></div>
        </div>

        <div class="search-loading-title">주문을 불러오고 있습니다.</div>
        <div class="search-loading-subtitle">🎈 잠시만 기다려 주세요. 🎈</div>
      </div>
    </div>
  `;
}
</script>
  </body>
</html>
