<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" role="img" aria-labelledby="manman-frozen-v2-title manman-frozen-v2-desc" data-version="2026-07-19-v2" shape-rendering="geometricPrecision">
