<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>만만마켓 운영</title>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    @font-face {
      font-family: 'TheJamsilOps';
      src: url('https://cdn.jsdelivr.net/gh/fontbee/font@main/LOTTE/TheJamsil4Medium.woff2') format('woff2');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; background: #eceef2; color: #151517; font-family: Pretendard, -apple-system, BlinkMacSystemFont, sans-serif; }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .app { min-height: 100vh; padding: 18px 14px 120px; }
    .shell { width: min(760px, 100%); margin: 0 auto; }
    .top { position: sticky; top: 0; z-index: 20; margin: -18px -14px 18px; padding: 16px 14px 16px; background: rgba(236, 238, 242, 0.92); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(255,255,255,.68); }
    .top-inner { width: min(760px, 100%); margin: 0 auto; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 14px; }
    .brand { min-width: 0; }
    .brand-title { font-size: 27px; line-height: 1; font-weight: 600; letter-spacing: 0; }
    .brand-sub { margin-top: 7px; color: #8a8e98; font-size: 13px; font-weight: 500; }
    .refresh-btn { width: 44px; height: 44px; border: 0; border-radius: 17px; background: #151517; color: #fff; font-size: 22px; font-weight: 600; box-shadow: 0 12px 28px rgba(21,21,23,.16); }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 18px; padding: 7px; border-radius: 23px; background: #e1e4ea; box-shadow: inset 0 1px 0 rgba(255,255,255,.7); }
    .tab { height: 48px; border: 0; border-radius: 18px; background: transparent; color: #8c919b; font-size: 17px; font-weight: 600; }
    .tab.active { background: #fff; color: #151517; box-shadow: 0 10px 24px rgba(36, 42, 54, 0.09); }
    .panel { display: none; }
    .panel.active { display: block; }
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .metric { min-height: 76px; padding: 14px; border-radius: 24px; background: rgba(255,255,255,.92); box-shadow: 0 14px 34px rgba(38, 44, 56, 0.07); }
    .metric-label { color: #969aa4; font-size: 12px; font-weight: 600; }
    .metric-value { margin-top: 8px; font-size: 25px; line-height: 1; font-weight: 600; letter-spacing: 0; }
    .date-strip { display: flex; gap: 9px; overflow-x: auto; padding: 0 0 16px; scrollbar-width: none; }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-btn { flex: 0 0 auto; min-width: 94px; height: 43px; border: 1px solid rgba(255,255,255,.75); border-radius: 17px; background: #fff; color: #7b808b; font-size: 14px; font-weight: 600; box-shadow: 0 10px 22px rgba(36,42,54,.06); }
    .date-btn.active { background: #151517; color: #fff; border-color: #151517; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .product-card { position: relative; min-width: 0; display: grid; grid-template-columns: 112px minmax(0, 1fr) auto; gap: 18px; align-items: center; min-height: 146px; padding: 16px; border-radius: 30px; background: #fff; box-shadow: 0 18px 42px rgba(36, 42, 54, 0.09); }
    .sales-card { grid-template-columns: 86px minmax(0, 1fr); align-items: start; }
    .product-card.done { box-shadow: 0 18px 42px rgba(8,160,92,.13); }
    .product-card.done::after { content: '입고완료'; position: absolute; inset: 0; z-index: 6; display: grid; place-items: center; border-radius: inherit; background: rgba(255,255,255,.86); color: #08a05c; font-size: clamp(34px, 8vw, 78px); font-weight: 600; letter-spacing: 0; backdrop-filter: blur(3px); pointer-events: none; }
    .thumb-wrap { position: relative; width: 112px; height: 112px; border-radius: 24px; background: #f4f5f7; overflow: hidden; align-self: start; }
    .sales-card .thumb-wrap { width: 86px; height: 86px; border-radius: 20px; }
    .thumb { width: 100%; height: 100%; display: block; object-fit: cover; }
    .storage { display: inline-flex; align-items: center; justify-content: center; gap: 5px; height: 24px; padding: 0 9px; border-radius: 999px; color: #fff; font-size: 11px; font-weight: 600; }
    .storage.cold { background: linear-gradient(135deg, #20c6d7, #0ea5b7); }
    .storage.frozen { background: linear-gradient(135deg, #38bdf8, #2563eb); }
    .storage.room { background: linear-gradient(135deg, #ffb44d, #f97345); }
    .storage svg { width: 13px; height: 13px; stroke: currentColor; stroke-width: 2.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .pack-badge { display: inline-flex; align-items: center; height: 24px; padding: 0 9px; border-radius: 999px; background: #fff3b5; color: #b77900; font-size: 11px; font-weight: 600; }
    .card-main { min-width: 0; align-self: stretch; display: flex; flex-direction: column; justify-content: center; gap: 9px; }
    .card-head { min-width: 0; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: start; }
    .card-name { min-width: 0; margin: 0; color: #171719; font-size: 21px; line-height: 1.16; font-weight: 600; letter-spacing: 0; word-break: keep-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .sales-card .card-name { font-size: 15px; line-height: 1.22; font-weight: 600; }
    .stock-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 78px; height: 31px; padding: 0 12px; border-radius: 999px; background: #ecf8ef; color: #42a65a; font-size: 14px; font-weight: 600; white-space: nowrap; }
    .stock-pill.low { background: #fff5d9; color: #d99b16; }
    .stock-pill.empty { background: #f3f3f5; color: #8d929c; }
    .card-desc { color: #9498a2; font-size: 14px; line-height: 1.42; font-weight: 500; word-break: keep-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .soft-tag { display: inline-flex; align-items: center; height: 24px; padding: 0 9px; border-radius: 999px; background: #f3f5f8; color: #777d89; font-size: 11px; font-weight: 600; }
    .price-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 0; }
    .price { color: #747985; font-size: 12px; line-height: 1.2; font-weight: 400; letter-spacing: 0; }
    .sub-price { color: #9a9ea7; font-size: 12px; font-weight: 400; }
    .sales-metrics { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .sales-metric { min-width: 0; padding: 10px; border-radius: 18px; background: #f6f7f9; }
    .sales-metric.primary { background: #eef4ff; }
    .sales-metric-label { color: #8e949f; font-size: 11px; line-height: 1; font-weight: 600; }
    .sales-metric-value { margin-top: 7px; color: #151517; font-size: 27px; line-height: .9; font-weight: 600; letter-spacing: 0; }
    .sales-metric.primary .sales-metric-value { color: #2f5dca; }
    .sales-metric-sub { margin-top: 4px; color: #969ba5; font-size: 10px; line-height: 1.15; font-weight: 500; }
    .buffer-form { grid-column: 1 / -1; display: grid; grid-template-columns: minmax(0, 1fr) 64px 92px 34px; gap: 7px; align-items: center; padding-top: 10px; border-top: 1px solid #eef0f3; }
    .buffer-help { grid-column: 1 / -1; margin-top: -2px; color: #9a9ea7; font-size: 11px; line-height: 1.2; font-weight: 500; }
    .buffer-customer,
    .buffer-qty { width: 100%; height: 38px; border: 1px solid #e3e7ee; border-radius: 15px; background: #fafbfc; padding: 0 12px; color: #151517; font-size: 13px; font-weight: 500; outline: none; }
    .buffer-qty { padding: 0 8px; text-align: center; }
    .buffer-use-btn { position: relative; height: 38px; border: 0; border-radius: 15px; background: #2f5dca; color: #fff; font-size: 13px; font-weight: 600; box-shadow: 0 10px 20px rgba(47,93,202,.2); }
    .buffer-use-btn:disabled { background: #dfe3ea; color: #a9aeb8; box-shadow: none; }
    .minus-btn { width: 54px; height: 54px; border: 0; border-radius: 999px; background: #2f5dca; color: #fff; font-size: 30px; line-height: 1; font-weight: 600; box-shadow: 0 14px 28px rgba(47,93,202,.24); }
    .minus-btn:disabled { background: #dfe3ea; color: #a9aeb8; box-shadow: none; cursor: default; }
    .plus-btn { position: relative; width: 38px; height: 38px; border: 1px solid #e3e6eb; border-radius: 999px; background: #fff; color: #2f5dca; font-size: 20px; line-height: 1; font-weight: 600; }
    .memo-line { grid-column: 1 / -1; display: none; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: center; padding-top: 12px; border-top: 1px solid #eef0f3; }
    .memo { width: 100%; height: 42px; border: 1px solid #e3e7ee; border-radius: 17px; background: #fafbfc; padding: 0 14px; color: #151517; font-size: 14px; font-weight: 500; outline: none; }
    .history { min-width: 0; display: flex; gap: 6px; overflow: hidden; }
    .buffer-form .history { grid-column: 1 / -1; }
    .history span { display: inline-flex; align-items: center; flex: 0 0 auto; height: 28px; padding: 0 10px; border-radius: 999px; background: #fff4e8; color: #bf6b13; font-size: 12px; font-weight: 600; }
    .inbound-card { grid-template-columns: 112px minmax(0, 1fr); align-items: start; padding-bottom: 14px; }
    .inbound-main { min-width: 0; display: flex; flex-direction: column; gap: 10px; }
    .inbound-status { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .status-box { min-width: 0; padding: 9px 10px; border-radius: 16px; background: #f6f7f9; }
    .status-label { color: #9a9ea8; font-size: 11px; line-height: 1; font-weight: 600; }
    .status-value { margin-top: 5px; color: #151517; font-size: 18px; line-height: 1; font-weight: 600; }
    .status-value.green { color: #08a05c; }
    .count-actions { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding-top: 13px; border-top: 1px solid #eef0f3; }
    .count-btn { position: relative; height: 42px; border: 0; border-radius: 16px; background: #f2f4f8; color: #151517; font-size: 14px; font-weight: 600; }
    .complete-btn { grid-column: span 4; height: 48px; border: 0; border-radius: 18px; background: #111; color: #fff; font-size: 15px; font-weight: 600; box-shadow: 0 14px 24px rgba(17,17,17,.14); }
    .complete-btn.done { background: #08a05c; }
    .section-title { margin: 30px 2px 12px; font-size: 21px; line-height: 1.2; font-weight: 600; }
    .inbound-sections { display: grid; gap: 24px; }
    .storage-heading { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 0 2px 12px; }
    .storage-heading strong { display: inline-flex; align-items: center; gap: 9px; font-size: 20px; font-weight: 600; }
    .storage-heading span { color: #8f939e; font-size: 13px; font-weight: 600; }
    .storage-dot { width: 14px; height: 14px; border-radius: 999px; background: #d38a18; }
    .storage-dot.cold { background: #0ea5b7; }
    .storage-dot.frozen { background: #2563eb; }
    .storage-dot.room { background: #f97345; }
    .management-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 0 0 8px; padding: 4px; border-radius: 15px; background: #e6e9ef; }
    .management-tab { height: 34px; border: 0; border-radius: 11px; background: transparent; color: #8a909b; font-size: 13px; font-weight: 600; }
    .management-tab.active { background: #fff; color: #151517; box-shadow: 0 8px 18px rgba(36,42,54,.08); }
    .management-view { display: none; }
    .management-view.active { display: block; }
    .stale-list { display: grid; gap: 12px; }
    .stale-item { display: grid; grid-template-columns: 72px minmax(0, 1fr) auto; gap: 14px; align-items: center; min-height: 100px; padding: 14px; border-radius: 26px; background: #fff; box-shadow: 0 14px 34px rgba(36, 42, 54, 0.07); }
    .stale-item img { width: 72px; height: 72px; object-fit: cover; border-radius: 18px; background: #f4f5f7; }
    .stale-name { font-size: 16px; line-height: 1.25; font-weight: 600; word-break: keep-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .stale-meta { margin-top: 6px; color: #969aa4; font-size: 12px; font-weight: 500; }
    .stale-qty { display: inline-flex; align-items: center; justify-content: center; min-width: 56px; height: 36px; padding: 0 10px; border-radius: 999px; background: #f3f5f8; text-align: center; font-size: 18px; font-weight: 600; }
    .empty { padding: 36px 16px; border-radius: 28px; background: #fff; color: #8d929c; text-align: center; font-size: 15px; font-weight: 500; box-shadow: 0 14px 34px rgba(36,42,54,.07); }
    .tap-hit { animation: localTap 220ms cubic-bezier(.18,.86,.28,1) both; }
    .tap-hit::after { content: attr(data-flash); position: absolute; left: 50%; top: -26px; z-index: 5; transform: translateX(-50%); display: grid; place-items: center; min-width: 38px; height: 24px; padding: 0 8px; border-radius: 999px; background: #08a05c; color: #fff; font-size: 12px; font-weight: 600; pointer-events: none; animation: localPop 520ms cubic-bezier(.18,.86,.28,1) both; box-shadow: 0 10px 20px rgba(8,160,92,.22); }
    .tap-hit.minus::after { background: #e74039; box-shadow: 0 10px 20px rgba(231,64,57,.22); }
    @keyframes localPop { 0% { opacity: 0; transform: translate(-50%, 8px) scale(.88); } 24% { opacity: 1; transform: translate(-50%, 0) scale(1); } 100% { opacity: 0; transform: translate(-50%, -12px) scale(.94); } }
    @keyframes localTap { 0% { transform: scale(1); } 50% { transform: scale(.94); box-shadow: 0 0 0 9px rgba(8,160,92,.22); } 100% { transform: scale(1); } }
    @media (max-width: 560px) {
      .app { padding-left: 10px; padding-right: 10px; }
      .shell, .top-inner { width: 100%; }
      .summary { gap: 8px; }
      .metric { min-height: 66px; padding: 11px; border-radius: 18px; }
      .metric-value { font-size: 20px; }
      .product-card { grid-template-columns: 94px minmax(0, 1fr) 42px; gap: 12px; min-height: 128px; padding: 12px; border-radius: 24px; }
      .sales-card { grid-template-columns: 72px minmax(0, 1fr); }
      .thumb-wrap { width: 94px; height: 94px; border-radius: 19px; }
      .sales-card .thumb-wrap { width: 72px; height: 72px; border-radius: 16px; }
      .card-name { font-size: 17px; }
      .sales-card .card-name { font-size: 13px; }
      .stock-pill { min-width: 64px; height: 27px; padding: 0 9px; font-size: 12px; }
      .card-desc { font-size: 12px; -webkit-line-clamp: 1; }
      .tag-row { gap: 4px; }
      .storage, .pack-badge, .soft-tag { height: 21px; padding: 0 7px; font-size: 10px; }
      .price { font-size: 11px; }
      .sales-metrics { gap: 6px; }
      .sales-metric { padding: 9px 7px; border-radius: 15px; }
      .sales-metric-value { font-size: 23px; }
      .buffer-form { grid-template-columns: minmax(0, 1fr) 52px 78px 32px; gap: 6px; }
      .buffer-customer, .buffer-qty, .buffer-use-btn { height: 34px; border-radius: 13px; font-size: 12px; }
      .minus-btn { width: 42px; height: 42px; font-size: 26px; }
      .plus-btn { width: 32px; height: 32px; font-size: 18px; }
      .memo-line { grid-template-columns: 1fr; gap: 7px; padding-top: 10px; }
      .memo { height: 36px; border-radius: 14px; font-size: 12px; }
      .history { display: none; }
      .inbound-card { grid-template-columns: 94px minmax(0, 1fr); }
      .inbound-status { gap: 5px; }
      .status-box { padding: 8px 7px; border-radius: 13px; }
      .status-label { font-size: 10px; }
      .status-value { font-size: 15px; }
      .count-actions { gap: 6px; }
      .count-btn { height: 36px; border-radius: 13px; font-size: 12px; }
      .complete-btn { height: 42px; border-radius: 15px; font-size: 14px; }
      .stale-item { grid-template-columns: 60px minmax(0, 1fr) auto; min-height: 86px; padding: 12px; border-radius: 22px; }
      .stale-item img { width: 60px; height: 60px; border-radius: 15px; }
    }

    /* Compact 2026 ops surface: dense scan, soft depth, immediate controls. */
    html, body { background: #f3f4f7; }
    .app { padding: 8px 8px 80px; }
    .top { margin: -8px -8px 6px; padding: 4px 8px; background: rgba(243,244,247,.9); border-bottom: 1px solid rgba(255,255,255,.78); }
    .top-inner { position: absolute; top: 4px; right: 8px; width: auto; gap: 0; }
    .brand { display: none; }
    .brand-title { font-size: 19px; }
    .brand-sub { display: none; }
    .refresh-btn { width: 28px; height: 28px; border-radius: 10px; font-size: 15px; box-shadow: 0 8px 18px rgba(21,21,23,.13); }
    .tabs { width: min(190px, calc(100% - 54px)); margin: 0 auto; padding: 3px; gap: 3px; border-radius: 14px; background: #e4e7ed; }
    .tab { height: 26px; border-radius: 10px; font-size: 12px; }
    .tab.active { box-shadow: 0 6px 14px rgba(36,42,54,.08); }
    .summary { gap: 6px; margin-bottom: 7px; }
    .metric { min-height: 34px; padding: 5px 8px; border-radius: 13px; box-shadow: 0 8px 20px rgba(36,42,54,.06); }
    .metric-label { font-size: 10px; line-height: 1; }
    .metric-value { margin-top: 3px; font-size: 16px; }
    .metric .sub-price { display: block; margin-top: 2px; font-size: 9px; line-height: 1.05; }
    .date-strip { gap: 6px; padding-bottom: 6px; }
    .date-btn { min-width: 76px; height: 29px; border-radius: 11px; font-size: 11.5px; box-shadow: 0 6px 14px rgba(36,42,54,.05); }

  </div>

  <div class="sheet-modal" id="listModal" hidden>
    <section class="sheet-panel" id="listModalPanel" role="dialog" aria-modal="true" aria-labelledby="listModalTitle">
      <div class="sheet-grabber" id="listModalGrabber" aria-hidden="true"></div>
      <div class="sheet-head" id="listModalHead">
        <div>
          <div class="sheet-title" id="listModalTitle">목록</div>
          <div class="sheet-sub" id="listModalSub"></div>
        </div>
        <button class="sheet-close" id="listModalClose" type="button" aria-label="닫기">×</button>
      </div>
      <div class="sheet-body" id="listModalBody"></div>
    </section>
  </div>

  <script>
    const DASHBOARD_CACHE_KEY = 'opsDashboardCache:v3';

    const state = {
      tab: 'sales',
      salesMode: 'buffer',
      managementTab: 'receiving',
      dashboard: null,
      salesDateKey: '',
      token: new URLSearchParams(location.search).get('token') || localStorage.getItem('opsToken') || '03064',
      doubleTap: { id: '', at: 0 },
      bufferQuantities: {},
      storageQuantities: {},
      storage: {
        digits: '',
        selectedCustomerLabel: '',
        candidates: [],
        items: [],
        selected: {},
        locationMemo: '',
        visitDateText: '',
        visitTimeText: '',
        showVisitTime: false,
        requestMemo: '',
        editingGroup: null,
        loading: false,
        complete: null,
        message: ''
      },
      modalScrollY: 0,
      busy: false
    };

    if (state.token) localStorage.setItem('opsToken', state.token);

    const els = {
      subtitle: document.getElementById('subtitle'),
      refreshBtn: document.getElementById('refreshBtn'),
      salesTab: document.getElementById('salesTab'),
      inboundTab: document.getElementById('inboundTab'),
      bufferModeTab: document.getElementById('bufferModeTab'),
      storageModeTab: document.getElementById('storageModeTab'),
      receivingSubTab: document.getElementById('receivingSubTab'),
      staleSubTab: document.getElementById('staleSubTab'),
      salesPanel: document.getElementById('salesPanel'),
      inboundPanel: document.getElementById('inboundPanel'),
      bufferView: document.getElementById('bufferView'),
      storageView: document.getElementById('storageView'),
      receivingView: document.getElementById('receivingView'),
      staleView: document.getElementById('staleView'),
      salesSummary: document.getElementById('salesSummary'),
      salesDateStrip: document.getElementById('salesDateStrip'),
      inboundSummary: document.getElementById('inboundSummary'),
      salesGrid: document.getElementById('salesGrid'),
      storageRequestRoot: document.getElementById('storageRequestRoot'),
      inboundGrid: document.getElementById('inboundGrid'),
      staleList: document.getElementById('staleList'),
      listModal: document.getElementById('listModal'),
      listModalPanel: document.getElementById('listModalPanel'),
      listModalGrabber: document.getElementById('listModalGrabber'),
      listModalHead: document.getElementById('listModalHead'),
      listModalTitle: document.getElementById('listModalTitle'),
      listModalSub: document.getElementById('listModalSub'),
      listModalBody: document.getElementById('listModalBody'),
      listModalClose: document.getElementById('listModalClose')
    };

    function money(value) {
      const n = Number(value || 0);
      return n > 0 ? `${n.toLocaleString('ko-KR')}원` : '-';
    }

    function number(value) {
      return Number(value || 0).toLocaleString('ko-KR');
    }

    function compactDateLabel(value) {
      const text = String(value || '').trim();
      const match = text.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      return match ? `${Number(match[2])}/${Number(match[3])}` : text;
    }

    function esc(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function storageClass(value) {
      if (value === '냉장') return 'cold';
      if (value === '냉동') return 'frozen';
      return 'room';
    }

    function storageBadge(value) {
      const storage = value || '상온';
      return `<span class="storage ${storageClass(storage)}">${storageIconSvg(storage)}${esc(storage)}</span>`;
    }

    function storageIconSvg(value) {
      if (value === '냉장') {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3h8M9 21h6M10 3l-1 18M14 3l1 18M8 8h8M8 16h8"/></svg>';
      }
      if (value === '냉동') {
        return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v18M5 7l14 10M19 7 5 17M7 5l5 3 5-3M7 19l5-3 5 3"/></svg>';
      }
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v3M12 17v3M4 12h3M17 12h3M6.6 6.6l2.1 2.1M15.3 15.3l2.1 2.1M17.4 6.6l-2.1 2.1M8.7 15.3l-2.1 2.1"/><circle cx="12" cy="12" r="4"/></svg>';
    }

    function imageUrl(item) {
      return item.imageUrl || 'https://picsum.photos/seed/manman-ops/800/800';
    }

    function packageUnitLabel(item) {
      const unit = String(item.packageUnit || '').trim();
      const normalizedUnit = unit.replace(/,/g, '');
      if (!unit || /^1(?:\.0+)?$/.test(normalizedUnit)) return '';
      return unit;
    }

    function salesTypeBadge(value) {
      const label = String(value || '').trim() || '구분없음';
      const normalized = label.replace(/\s+/g, '');
      if (!normalized.includes('상시')) return '';
      return `<span class="sales-type-badge always">상시</span>`;
    }

    function isAlwaysSaleValue(value) {
      return String(value || '').replace(/\s+/g, '').includes('상시');
    }

    function stockClass(value) {
      const quantity = Number(value || 0);
      if (quantity <= 0) return 'empty';
      if (quantity <= 2) return 'low';
      return '';
    }

    async function loadDashboard(options = {}) {
      const url = new URL('/api/buffer-dashboard', location.origin);
      url.searchParams.set('token', state.token);
      if (options.refresh) url.searchParams.set('refresh', '1');

      const response = await fetch(url);
      const data = await response.json();
      if (!response.ok || !data.ok) throw new Error(data.message || '데이터를 불러오지 못했습니다.');

      state.dashboard = data;
      saveDashboardCache(data);
      render();
    }

    function saveDashboardCache(data) {
      try {
        localStorage.setItem(DASHBOARD_CACHE_KEY, JSON.stringify(data));
      } catch {
      }
    }

    function restoreDashboardCache() {
      try {
        const cached = JSON.parse(localStorage.getItem(DASHBOARD_CACHE_KEY) || 'null');
        if (!cached?.ok) return;

        state.dashboard = cached;
        render();
      } catch {
      }
    }

    function flashButton(button, text, kind = '') {
      if (!button) return;

      button.dataset.flash = text;
      button.classList.remove('tap-hit', 'minus');
      void button.offsetWidth;
      button.classList.add('tap-hit');
      if (kind === 'minus') button.classList.add('minus');

      setTimeout(() => {
        button.classList.remove('tap-hit', 'minus');
        delete button.dataset.flash;
      }, 560);
    }

    function flashActionButton(id, action, text, kind = '') {
      requestAnimationFrame(() => {
        const card = document.querySelector(`[data-id="${CSS.escape(id)}"]`);
        flashButton(card?.querySelector(`[data-action="${CSS.escape(action)}"]`), text, kind);
      });
    }

    function setTab(tab) {
      state.tab = tab;
      els.salesTab.classList.toggle('active', tab === 'sales');
      els.inboundTab.classList.toggle('active', tab === 'inbound');
      els.salesPanel.classList.toggle('active', tab === 'sales');
      els.inboundPanel.classList.toggle('active', tab === 'inbound');
    }

    function setSalesMode(mode) {
      state.salesMode = mode;
      els.bufferModeTab.classList.toggle('active', mode === 'buffer');
      els.storageModeTab.classList.toggle('active', mode === 'storage');
      els.bufferView.classList.toggle('active', mode === 'buffer');
      els.storageView.classList.toggle('active', mode === 'storage');
    }

    function setManagementTab(tab) {
      state.managementTab = tab;
      els.receivingSubTab.classList.toggle('active', tab === 'receiving');
      els.staleSubTab.classList.toggle('active', tab === 'stale');
      els.receivingView.classList.toggle('active', tab === 'receiving');
      els.staleView.classList.toggle('active', tab === 'stale');
    }

    function render() {
      const data = state.dashboard;
      if (!data) return;

      els.subtitle.textContent = `${data.storeName || '만만마켓'} · ${data.todayKey || ''}`;
      syncSalesDateSelection(data);
      renderSales(data);
      renderStorageRequest(data);
      renderInbound(data);
      setSalesMode(state.salesMode);
      setManagementTab(state.managementTab);
      bindControls();
    }

    function renderMetric(label, value, sub = '') {
      return `<div class="metric"><div class="metric-label">${esc(label)}</div><div class="metric-value">${esc(value)}</div>${sub ? `<div class="sub-price">${esc(sub)}</div>` : ''}</div>`;
    }

    function renderReceivingMetric(label, value, kind = '') {
      return `
        <div class="receiving-metric ${esc(kind)}">
          <span>${esc(label)}</span>
          <strong>${esc(value)}</strong>
        </div>
      `;
    }

    function syncSalesDateSelection(data) {
      const options = data.salesDateOptions || [];
      const keys = new Set(options.map(option => option.dateKey));

      if (!state.salesDateKey || !keys.has(state.salesDateKey)) {
        state.salesDateKey = data.defaultSalesDateKey || options[0]?.dateKey || '';
      }
    }

    function getSelectedSalesItems(data) {
      const allItems = data.salesAllItems || data.salesItems || [];
      if (!state.salesDateKey) return data.salesItems || [];
      return allItems.filter(item => item.inboundDateKey === state.salesDateKey);
    }

    function renderSalesDateStrip(data) {
      const options = data.salesDateOptions || [];

      els.salesDateStrip.innerHTML = options.length
        ? options.map(option => `
          <button
            class="date-btn ${option.dateKey === state.salesDateKey ? 'active' : ''}"
            type="button"
            data-sales-date="${esc(option.dateKey)}"
          >${esc(option.label)} · ${number(option.count)}</button>
        `).join('')
        : '';
    }

    function renderSales(data) {
      const items = getSelectedSalesItems(data);
      els.salesSummary.innerHTML = '';
      renderSalesDateStrip(data);

      els.salesGrid.innerHTML = items.length
        ? items.map(renderSalesCard).join('')
        : '<div class="empty">해당 날짜의 공구 상품이 없습니다.</div>';
    }

    function renderSalesCard(item) {
      const bufferQuantity = Number(item.bufferRemainingQuantity || 0);

      return `
        <article class="product-card sales-card" data-id="${esc(item.id)}">
          <div class="thumb-wrap">
            <img class="thumb" src="${esc(imageUrl(item))}" alt="${esc(item.productName)}" loading="lazy">
          </div>
          <div class="card-main">
            <div class="card-head">
              <h3 class="card-name">${esc(item.productName)}</h3>
              ${storageBadge(item.storageMethod)}
            </div>
            <div class="sales-line">
              <span class="sales-price">판매가 ${money(item.salePrice)}</span>
              ${renderListButtons(item)}
            </div>
            <div class="sales-sub-line">
              <span>입고수량 <strong>${number(item.inboundQuantity)}</strong></span>
              <button class="order-count-link" data-action="show-order-list" type="button">공구주문건수 <strong>${number(item.customerOrderQuantity)}</strong></button>
            </div>
          </div>
          ${renderBufferSummary(item)}
          <div class="buffer-form">
            <input class="buffer-customer" data-buffer-customer="${esc(item.id)}" placeholder="핸드폰 뒷 4자리" aria-label="핸드폰 뒷 4자리" inputmode="numeric" autocomplete="off">
            <button class="buffer-qty qty-stepper" data-buffer-qty="${esc(item.id)}" data-qty-key="buffer:${esc(item.id)}" data-qty-picker="1" type="button" aria-label="버퍼수량 선택">${number(getBufferQtyValue(item.id))}</button>
            <button class="buffer-use-btn" data-action="buffer-use" ${bufferQuantity <= 0 ? 'disabled' : ''}>차감</button>
            <button class="plus-btn" data-action="buffer-plus" aria-label="버퍼 추가">+</button>
          </div>
        </article>
      `;
    }

    function renderStorageRequest(data) {
      const storage = state.storage;
      const queues = getStorageRequestQueues(data);
      const isEditing = Boolean(storage.editingGroup);
      const selectedCount = isEditing
        ? (storage.items || []).length
        : Object.values(storage.selected || {}).filter(Boolean).length;
      const selectedQuantity = getActiveStorageItems()
        .reduce((sum, item) => sum + getStorageQtyValue(storageItemKey(item), item.quantity), 0);
      const formTitle = isEditing ? '보관요청 수정' : '빠른 대기 등록';
      const formDesc = isEditing
        ? '목록에서 누른 보관요청의 수량, 방문일, 보관장소 메모를 수정합니다.'
        : '핸드폰 뒷4자리 조회 후 상품과 수량만 고르면 대기 목록에 올라갑니다.';

      els.storageRequestRoot.innerHTML = `
        <section class="storage-board">
          <div class="storage-board-head">
            <div>
              <h2>보관처리대기</h2>
              <p>빼둘 물건부터 처리하고, 완료되면 바로 아래 기록으로 내려갑니다.</p>
            </div>
            <div class="storage-request-total">
              <span>대기</span>
              <strong>${number(queues.pending.length)}</strong>
            </div>
          </div>
          ${renderStorageQueue(queues.pending, 'pending')}

          <section class="storage-request-panel quick-register">
            <div class="storage-request-head">
              <div>
                <h2>${esc(formTitle)}</h2>
                <p>${esc(formDesc)}</p>
              </div>
              <div class="storage-request-total">
                <span>${isEditing ? '수량' : '선택'}</span>
                <strong>${number(selectedCount)}</strong>
              </div>
            </div>

            ${isEditing ? renderStorageEditBanner(storage.editingGroup) : `
              <div class="storage-search-row">
                <input
                  class="storage-input digits"
                  data-storage-field="digits"
                  value="${esc(storage.digits)}"
                  placeholder="핸드폰 뒷4자리"
                  aria-label="핸드폰 뒷4자리"
                  inputmode="numeric"
                  maxlength="4"
                  autocomplete="off"
                >
                <button class="storage-primary-btn" data-action="storage-lookup" type="button" ${storage.loading ? 'disabled' : ''}>${storage.loading ? '조회중' : '조회'}</button>
              </div>
            `}

            ${storage.message ? `<div class="storage-message">${esc(storage.message)}</div>` : ''}
            ${isEditing ? '' : renderStorageCandidates(storage)}
            ${renderStorageItems(storage)}

            <div class="storage-memo-grid">
              <div class="storage-schedule-row ${storage.showVisitTime ? 'with-time' : ''}">
                <label class="storage-date-field">
                  <span>방문예정일</span>
                  <input class="storage-input date" type="date" data-storage-field="visitDateText" value="${esc(storage.visitDateText)}" aria-label="방문예정일">
                </label>
                <button class="storage-time-toggle ${storage.showVisitTime ? 'active' : ''}" data-action="storage-toggle-time" type="button">${storage.showVisitTime ? '시간 사용' : '시간 옵션'}</button>
                ${storage.showVisitTime ? `
                  <label class="storage-date-field time">
                    <span>예정시간</span>
                    <input class="storage-input date" type="time" data-storage-field="visitTimeText" value="${esc(storage.visitTimeText)}" aria-label="방문예정시간">
                  </label>
                ` : ''}
              </div>
              <input class="storage-input full storage-location-memo" data-storage-field="locationMemo" value="${esc(storage.locationMemo)}" placeholder="보관장소등 메모" aria-label="보관장소등 메모">
            </div>

            <div class="storage-form-actions">
              ${isEditing ? `<button class="storage-secondary-btn" data-action="storage-cancel-edit" type="button">수정 취소</button>` : ''}
              <button class="storage-complete-btn" data-action="${isEditing ? 'storage-save-edit' : 'storage-register-pending'}" type="button" ${!selectedCount || storage.loading ? 'disabled' : ''}>
                ${isEditing ? '수정 저장' : '보관대기 등록'}
                <span>${number(selectedQuantity)}개</span>
              </button>
              ${isEditing && storage.editingGroup?.status === 'pending' ? `
                <button class="storage-complete-btn storage-complete-now" data-action="storage-save-complete" type="button" ${storage.loading ? 'disabled' : ''}>
                  수정 후 완료
                </button>
              ` : ''}
            </div>

            ${storage.complete ? `
              <div class="storage-success">
                <strong>${esc(storage.complete.title || '보관대기 등록')}</strong>
                <span>${esc(storage.complete.customerLabel || storage.digits)} · ${number(storage.complete.quantity)}개 · ${esc(storage.complete.time)}</span>
              </div>
            ` : ''}
          </section>

          <section class="storage-completed-section">
            <div class="storage-section-title">
              <strong>보관처리완료</strong>
              <span>${number(queues.completed.length)}건</span>
            </div>
            ${renderStorageQueue(queues.completed, 'completed')}
          </section>
        </section>
      `;
    }

    function getStorageRequestQueues(data) {
      const seen = new Set();
      const groups = new Map();
      const sourceItems = [
        ...(data?.salesAllItems || []),
        ...(data?.salesItems || []),
        ...(data?.inboundItems || []),
        ...(data?.latestInboundItems || []),
        ...(data?.staleItems || [])
      ];
      sourceItems.forEach(item => {
        (item.storageRequests || []).forEach(request => {
          const eventId = request.eventId || `${item.id}-${request.createdAt}-${request.customerLabel}`;
          if (seen.has(eventId)) return;
          seen.add(eventId);

          const enriched = {
            ...request,
            eventId,
            itemId: item.id,
            productName: item.productName,
            storageMethod: item.storageMethod,
            imageUrl: item.imageUrl,
            salePrice: item.salePrice,
            status: request.status === 'pending' ? 'pending' : 'completed'
          };

          const groupId = request.storageGroupId || storageFallbackGroupKey(enriched);
          const group = groups.get(groupId) || {
            groupId,
            status: enriched.status,
            customerLabel: enriched.customerLabel || '',
            customerDigits4: enriched.customerDigits4 || '',
            locationMemo: enriched.locationMemo || '',
            visitDateText: enriched.visitDateText || '',
            requestMemo: enriched.requestMemo || '',
            createdAt: enriched.createdAt || '',
            completedAt: enriched.completedAt || '',
            items: [],
            eventIds: [],
            quantity: 0,
            productName: '',
            storageMethod: '',
            imageUrl: ''
          };

          group.items.push(enriched);
          group.eventIds.push(eventId);
          group.quantity += Number(enriched.quantity || 0);
          group.status = group.status === 'pending' || enriched.status === 'pending' ? 'pending' : 'completed';
          group.createdAt = latestDateText(group.createdAt, enriched.createdAt);
          group.completedAt = latestDateText(group.completedAt, enriched.completedAt);
          group.customerLabel = group.customerLabel || enriched.customerLabel || '';
          group.customerDigits4 = group.customerDigits4 || enriched.customerDigits4 || '';
          group.locationMemo = group.locationMemo || enriched.locationMemo || '';
          group.visitDateText = group.visitDateText || enriched.visitDateText || '';
          group.requestMemo = group.requestMemo || enriched.requestMemo || '';
          group.productName = group.items.length > 1
            ? `${group.items[0].productName} 외 ${number(group.items.length - 1)}건`
            : enriched.productName;
          group.storageMethod = group.storageMethod || enriched.storageMethod || '';
          group.imageUrl = group.imageUrl || enriched.imageUrl || '';
          groups.set(groupId, group);
        });
      });

      const groupedRequests = Array.from(groups.values())
        .sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));

      return {
        all: groupedRequests,
        pending: groupedRequests.filter(request => request.status === 'pending'),
        completed: groupedRequests.filter(request => request.status !== 'pending')
      };
    }

    function storageFallbackGroupKey(request) {
      const createdMinute = String(request.createdAt || '').slice(0, 16);
      return [
        request.status || '',
        request.customerLabel || request.customerDigits4 || '',
        request.visitDateText || '',
        request.locationMemo || '',
        request.requestMemo || '',
        createdMinute
      ].join('::');
    }

    function latestDateText(a, b) {
      if (!a) return b || '';
      if (!b) return a || '';
      return String(a) > String(b) ? a : b;
    }

    function renderStorageQueue(items, status) {
      if (!items.length) {
        return `<div class="storage-queue-empty">${status === 'pending' ? '현재 보관처리 대기 상품이 없습니다.' : '아직 완료 기록이 없습니다.'}</div>`;
      }

      return `
        <div class="storage-queue-list ${status}">
          ${items.map(item => renderStorageQueueItem(item, status)).join('')}
        </div>
      `;
    }

    function renderStorageQueueItem(item, status) {
      const visitText = item.visitDateText || '';
      const locationText = item.locationMemo || '';
      const customerText = item.customerLabel || (item.customerDigits4 ? `뒷4자리 ${item.customerDigits4}` : '고객 미입력');
      const timeText = status === 'pending'
        ? formatDateTime(item.createdAt)
        : formatDateTime(item.completedAt || item.createdAt);

      return `
        <article class="storage-queue-card ${status}" data-action="storage-edit-group" data-group-id="${esc(item.groupId)}">
          <img src="${esc(imageUrl(item))}" alt="${esc(item.productName)}" loading="lazy">
          <div class="storage-queue-main">
            <div class="storage-queue-top">
              <strong>${esc(customerText)}</strong>
              ${storageBadge(item.storageMethod)}
            </div>
            <div class="storage-queue-name">${esc(item.productName)}</div>
            ${renderStorageQueueProducts(item)}
            <div class="storage-queue-meta">
              ${visitText ? `<span>방문 ${esc(visitText)}</span>` : ''}
              ${timeText ? `<span class="storage-queue-time ${status === 'pending' ? 'pending' : 'done'}">${status === 'pending' ? '등록' : '완료'} ${esc(timeText)}</span>` : ''}
            </div>
            ${locationText ? `<div class="storage-queue-note important">${esc(locationText)}</div>` : ''}
            ${item.requestMemo ? `<div class="storage-queue-note">${esc(item.requestMemo)}</div>` : ''}
          </div>
          <div class="storage-queue-side">
            <strong>${number(item.quantity)}</strong>
            <span>개</span>
            ${status === 'pending' ? `<button class="storage-done-btn" data-action="storage-mark-complete" data-event-ids="${esc(item.eventIds.join(','))}" data-customer-label="${esc(customerText)}" data-quantity="${esc(item.quantity)}" type="button">완료</button>` : ''}
          </div>
        </article>
      `;
    }

    function renderStorageQueueProducts(group) {
      const products = Array.isArray(group?.items) ? group.items : [];
      if (products.length <= 1) return '';

      return `
        <div class="storage-queue-products" aria-label="포함 상품 목록">
          ${products.map(product => `
            <div class="storage-queue-product">
              <div>
                <div class="storage-queue-product-name">${esc(product.productName || '상품명 없음')}</div>

      const customerText = group?.customerLabel || (group?.customerDigits4 ? `뒷4자리 ${group.customerDigits4}` : '고객 미입력');

      return `
        <div class="storage-edit-banner">
          <div>
            <strong>${esc(customerText)}</strong>
            <span>${esc(statusText)} · ${number(group?.items?.length || 0)}건</span>
          </div>
          <button class="storage-secondary-btn compact" data-action="storage-cancel-edit" type="button">닫기</button>
        </div>
      `;

    function renderStorageCandidates(storage) {
      if (!storage.candidates?.length) return '';

      return `
        <div class="storage-candidates" aria-label="고객 선택">
          ${storage.candidates.map(candidate => `
            <button
              class="storage-candidate ${candidate.customerLabel === storage.selectedCustomerLabel ? 'active' : ''}"
              data-action="storage-select-customer"
              data-customer-label="${esc(candidate.customerLabel)}"
              type="button"
            >
              <span>${esc(candidate.customerLabel)}</span>
              <strong>${number(candidate.orderCount || 0)}</strong>
            </button>
          `).join('')}
        </div>

    function renderStorageItems(storage) {
      if (storage.loading) {
        return '<div class="empty">최근 픽업 상품을 찾는 중입니다.</div>';
      }

      if (!storage.items?.length) {
        return state.storage.editingGroup
          ? '<div class="empty">수정할 보관 상품이 없습니다.</div>'
          : '<div class="empty">핸드폰 뒷4자리를 조회하면 보관할 상품이 여기에 뜹니다.</div>';

      return `
        <div class="storage-list">
          ${storage.items.map(renderStorageItem).join('')}
        </div>
      `;

    function renderStorageItem(item) {
      const key = storageItemKey(item);
      const selected = state.storage.editingGroup ? true : Boolean(state.storage.selected[key]);
      const quantity = getStorageQtyValue(key, item.quantity);
      const canStore = item.canStore !== false && item.inventoryStableId;
      const isEditing = Boolean(state.storage.editingGroup);

      return `
        <article class="storage-item ${selected ? 'selected' : ''} ${!canStore ? 'disabled' : ''}" data-storage-key="${esc(key)}">
          <button class="storage-item-pick" data-action="storage-toggle-item" data-storage-key="${esc(key)}" type="button" ${!canStore || isEditing ? 'disabled' : ''} aria-label="보관 상품 선택">
            <img src="${esc(imageUrl(item))}" alt="${esc(item.productName)}" loading="lazy">
            <span class="storage-check">${selected ? '✓' : ''}</span>
          </button>
          <div class="storage-item-main">
            <div class="storage-item-title">
              <h3>${esc(item.productName)}</h3>
              ${storageBadge(item.storageMethod)}
            </div>
            <div class="storage-item-meta">
              <span>${isEditing ? '보관' : '픽업'} ${esc(item.pickupDateText || item.pickupDateKey || '')}</span>
              <span>주문 ${number(item.quantity)}개</span>
              ${item.salePrice ? `<span>판매가 ${money(item.salePrice)}</span>` : ''}
            </div>
            ${canStore ? '' : '<div class="storage-warning">입고상품 매칭이 필요합니다.</div>'}
          </div>
          <button class="storage-qty qty-stepper" data-storage-qty="${esc(key)}" data-qty-key="storage:${esc(key)}" data-qty-picker="1" type="button" aria-label="보관수량 선택">${number(quantity)}</button>

    function storageItemKey(item) {
      return item.inventoryStableId || item.id || item.key || `${item.productKey || item.productName}::${item.pickupDateKey || ''}`;

    function getSelectedStorageItems() {
      return (state.storage.items || []).filter(item => state.storage.selected[storageItemKey(item)]);
    }

    function getActiveStorageItems() {
      return state.storage.editingGroup ? (state.storage.items || []) : getSelectedStorageItems();
    }

    function renderBufferSummary(item) {

      const hqBuffer = Number(item.hqBufferQuantity || 0);
      const ourBuffer = Number(item.ourBufferQuantity || 0);
      const totalBuffer = Number(item.initialBufferQuantity || hqBuffer + ourBuffer || 0);

      return `
        <div class="buffer-summary">
          <div class="buffer-box hq">
            <span class="buffer-label">본사버퍼</span>
            <strong class="buffer-value">${number(hqBuffer)}</strong>
          </div>
          <button class="buffer-box our interactive" data-action="show-our-buffer-list" type="button">
            <span class="buffer-label">우리버퍼</span>
            <strong class="buffer-value">${number(ourBuffer)}</strong>
          </button>
          <div class="buffer-box remaining">
            <span class="buffer-label">잔여버퍼</span>
            <div class="buffer-ratio">

    function renderListButtons(item) {
      return `
        <button class="buffer-inline-link" data-action="show-buffer-list" type="button">버퍼구매 고객<strong>${number(getBufferUseEvents(item).length)}</strong></button>

    function getBufferUseEvents(item) {
      return (item.bufferHistory || [])
        .filter(event => Number(event.deltaQuantity || 0) < 0);
    }

    function formatDateTime(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '';
      return new Intl.DateTimeFormat('ko-KR', {
        month: 'numeric',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      }).format(date);
    }

    function openModal(title, subtitle, bodyHtml) {
      els.listModalTitle.textContent = title || '목록';
      els.listModalSub.textContent = subtitle || '';
      els.listModalBody.innerHTML = bodyHtml || '';
      lockPageScroll();
      els.listModalPanel.style.transform = '';
      els.listModalPanel.classList.remove('swiping');
      els.listModal.hidden = false;
    }

    function openBufferListModal(id) {

      const rows = getBufferUseEvents(item).map(event => ({
        name: event.actorMemo || '메모없음',
        quantity: Math.abs(Number(event.deltaQuantity || 0)),

      }));

      const rows = (item.ourBufferNotes || [])
        .filter(row => Number(row.quantity || 0) > 0)
        .map(row => ({
          customerLabel: row.customerLabel || '닉네임 비어있음',
          noteText: row.noteText || '',
          quantity: Number(row.quantity || 0),
          time: row.syncedAt,
          source: row.sourceRowNumber ? `${row.sourceSheetName || 'Raw'} ${row.sourceRowNumber}행` : ''
        }));

      openModal('우리버퍼 목록', item.productName || '', rows.length
        ? rows.map(row => `
            <div class="sheet-row">
              <div>
                <div class="sheet-row-name">${esc(row.customerLabel)}</div>
                <div class="sheet-row-time">${esc(row.source || formatDateTime(row.time) || '시간 없음')}</div>

              <div class="sheet-row-qty">${number(row.quantity)}</div>
            </div>
          `).join('')
        : '<div class="empty">우리버퍼 메모가 없습니다.</div>');

    async function openOrderCustomersModal(id) {
      const item = findItem(id);
      if (!item) return;

      openModal('공구주문 고객', item.productName || '', '<div class="empty">공구주문 목록을 불러오는 중입니다.</div>');

      try {
        const url = new URL('/api/ops-order-customers', location.origin);
        url.searchParams.set('token', state.token);
        url.searchParams.set('productKey', item.productKey || '');
        url.searchParams.set('productName', item.productName || '');
        url.searchParams.set('dateKey', item.inboundDateKey || '');

        const response = await fetch(url);
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.message || '공구주문 목록을 불러오지 못했습니다.');

        const rows = data.customers || [];
        openModal('공구주문 고객', item.productName || '', rows.length
          ? rows.map(row => `
              <div class="sheet-row">
                <div>
                  <div class="sheet-row-name">${esc(row.customerLabel || '닉네임 비어있음')}</div>
                  <div class="sheet-row-time">${esc(row.orderDateText || '')}${row.pickupDateText ? ` · 픽업 ${esc(row.pickupDateText)}` : ''}</div>
                  ${row.noteText ? `<div class="sheet-row-note important">${esc(row.noteText)}</div>` : ''}
                </div>
                <div class="sheet-row-qty">${number(row.quantity)}</div>
              </div>
            `).join('')
          : '<div class="empty">공구주문 고객이 없습니다.</div>');
      } catch (error) {
        openModal('공구주문 고객', item.productName || '', `<div class="empty">${esc(error.message || String(error))}</div>`);
      }
