<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>만만마켓 운영</title>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; background: #eceef2; color: #151517; font-family: Pretendard, -apple-system, BlinkMacSystemFont, sans-serif; }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .app { min-height: 100vh; padding: 18px 14px 120px; }
    .shell { width: min(760px, 100%); margin: 0 auto; }
    .top { position: sticky; top: 0; z-index: 20; margin: -18px -14px 18px; padding: 16px 14px 16px; background: rgba(236, 238, 242, 0.92); backdrop-filter: blur(18px); border-bottom: 1px solid rgba(255,255,255,.68); }
    .top-inner { width: min(760px, 100%); margin: 0 auto; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 14px; }
    .brand { min-width: 0; }
    .brand-title { font-size: 27px; line-height: 1; font-weight: 900; letter-spacing: 0; }
    .brand-sub { margin-top: 7px; color: #8a8e98; font-size: 13px; font-weight: 800; }
    .refresh-btn { width: 44px; height: 44px; border: 0; border-radius: 17px; background: #151517; color: #fff; font-size: 22px; font-weight: 900; box-shadow: 0 12px 28px rgba(21,21,23,.16); }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 18px; padding: 7px; border-radius: 23px; background: #e1e4ea; box-shadow: inset 0 1px 0 rgba(255,255,255,.7); }
    .tab { height: 48px; border: 0; border-radius: 18px; background: transparent; color: #8c919b; font-size: 17px; font-weight: 900; }
    .tab.active { background: #fff; color: #151517; box-shadow: 0 10px 24px rgba(36, 42, 54, 0.09); }
    .panel { display: none; }
    .panel.active { display: block; }
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 14px; }
    .metric { min-height: 76px; padding: 14px; border-radius: 24px; background: rgba(255,255,255,.92); box-shadow: 0 14px 34px rgba(38, 44, 56, 0.07); }
    .metric-label { color: #969aa4; font-size: 12px; font-weight: 900; }
    .metric-value { margin-top: 8px; font-size: 25px; line-height: 1; font-weight: 900; letter-spacing: 0; }
    .date-strip { display: flex; gap: 9px; overflow-x: auto; padding: 0 0 16px; scrollbar-width: none; }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-btn { flex: 0 0 auto; min-width: 94px; height: 43px; border: 1px solid rgba(255,255,255,.75); border-radius: 17px; background: #fff; color: #7b808b; font-size: 14px; font-weight: 900; box-shadow: 0 10px 22px rgba(36,42,54,.06); }
    .date-btn.active { background: #151517; color: #fff; border-color: #151517; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    .product-card { position: relative; min-width: 0; display: grid; grid-template-columns: 112px minmax(0, 1fr) auto; gap: 18px; align-items: center; min-height: 146px; padding: 16px; border-radius: 30px; background: #fff; box-shadow: 0 18px 42px rgba(36, 42, 54, 0.09); }
    .product-card.done { box-shadow: 0 18px 42px rgba(8,160,92,.13); }
    .product-card.done::after { content: '입고완료'; position: absolute; inset: 0; z-index: 6; display: grid; place-items: center; border-radius: inherit; background: rgba(255,255,255,.86); color: #08a05c; font-size: clamp(34px, 8vw, 78px); font-weight: 900; letter-spacing: 0; backdrop-filter: blur(3px); pointer-events: none; }
    .thumb-wrap { position: relative; width: 112px; height: 112px; border-radius: 24px; background: #f4f5f7; overflow: hidden; align-self: start; }
    .thumb { width: 100%; height: 100%; display: block; object-fit: cover; }
    .storage { display: inline-flex; align-items: center; justify-content: center; height: 24px; padding: 0 9px; border-radius: 999px; color: #fff; font-size: 11px; font-weight: 900; }
    .storage.cold { background: #2f80d8; }
    .storage.frozen { background: #5551d6; }
    .storage.room { background: #d38a18; }
    .pack-badge { display: inline-flex; align-items: center; height: 24px; padding: 0 9px; border-radius: 999px; background: #fff3b5; color: #b77900; font-size: 11px; font-weight: 900; }
    .card-main { min-width: 0; align-self: stretch; display: flex; flex-direction: column; justify-content: center; gap: 9px; }
    .card-head { min-width: 0; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: start; }
    .card-name { min-width: 0; margin: 0; color: #171719; font-size: 21px; line-height: 1.16; font-weight: 900; letter-spacing: 0; word-break: keep-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .stock-pill { display: inline-flex; align-items: center; justify-content: center; min-width: 78px; height: 31px; padding: 0 12px; border-radius: 999px; background: #ecf8ef; color: #42a65a; font-size: 14px; font-weight: 900; white-space: nowrap; }
    .stock-pill.low { background: #fff5d9; color: #d99b16; }
    .stock-pill.empty { background: #f3f3f5; color: #8d929c; }
    .card-desc { color: #9498a2; font-size: 14px; line-height: 1.42; font-weight: 800; word-break: keep-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .soft-tag { display: inline-flex; align-items: center; height: 24px; padding: 0 9px; border-radius: 999px; background: #f3f5f8; color: #777d89; font-size: 11px; font-weight: 900; }
    .price-row { display: flex; align-items: end; justify-content: space-between; gap: 10px; margin-top: auto; }
    .price { color: #2f5dca; font-size: 27px; line-height: 1; font-weight: 900; letter-spacing: 0; }
    .sub-price { color: #9a9ea7; font-size: 12px; font-weight: 900; }
    .sales-actions { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; align-self: stretch; }
    .minus-btn { width: 54px; height: 54px; border: 0; border-radius: 999px; background: #2f5dca; color: #fff; font-size: 30px; line-height: 1; font-weight: 900; box-shadow: 0 14px 28px rgba(47,93,202,.24); }
    .minus-btn:disabled { background: #dfe3ea; color: #a9aeb8; box-shadow: none; cursor: default; }
    .plus-btn { width: 38px; height: 38px; border: 1px solid #e3e6eb; border-radius: 999px; background: #fff; color: #2f5dca; font-size: 20px; line-height: 1; font-weight: 900; }
    .memo-line { grid-column: 1 / -1; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: center; padding-top: 12px; border-top: 1px solid #eef0f3; }
    .memo { width: 100%; height: 42px; border: 1px solid #e3e7ee; border-radius: 17px; background: #fafbfc; padding: 0 14px; color: #151517; font-size: 14px; font-weight: 800; outline: none; }
    .history { min-width: 0; display: flex; gap: 6px; overflow: hidden; }
    .history span { display: inline-flex; align-items: center; flex: 0 0 auto; height: 28px; padding: 0 10px; border-radius: 999px; background: #fff4e8; color: #bf6b13; font-size: 12px; font-weight: 900; }
    .inbound-card { grid-template-columns: 112px minmax(0, 1fr); align-items: start; padding-bottom: 14px; }
    .inbound-main { min-width: 0; display: flex; flex-direction: column; gap: 10px; }
    .inbound-status { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
    .status-box { min-width: 0; padding: 9px 10px; border-radius: 16px; background: #f6f7f9; }
    .status-label { color: #9a9ea8; font-size: 11px; line-height: 1; font-weight: 900; }
    .status-value { margin-top: 5px; color: #151517; font-size: 18px; line-height: 1; font-weight: 900; }
    .status-value.green { color: #08a05c; }
    .count-actions { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding-top: 13px; border-top: 1px solid #eef0f3; }
    .count-btn { height: 42px; border: 0; border-radius: 16px; background: #f2f4f8; color: #151517; font-size: 14px; font-weight: 900; }
    .complete-btn { grid-column: span 4; height: 48px; border: 0; border-radius: 18px; background: #111; color: #fff; font-size: 15px; font-weight: 900; box-shadow: 0 14px 24px rgba(17,17,17,.14); }
    .complete-btn.done { background: #08a05c; }
    .section-title { margin: 30px 2px 12px; font-size: 21px; line-height: 1.2; font-weight: 900; }
    .inbound-sections { display: grid; gap: 24px; }
    .storage-heading { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 0 2px 12px; }
    .storage-heading strong { display: inline-flex; align-items: center; gap: 9px; font-size: 20px; font-weight: 900; }
    .storage-heading span { color: #8f939e; font-size: 13px; font-weight: 900; }
    .storage-dot { width: 14px; height: 14px; border-radius: 999px; background: #d38a18; }
    .storage-dot.cold { background: #2f80d8; }
    .storage-dot.frozen { background: #5551d6; }
    .storage-dot.room { background: #d38a18; }
    .stale-list { display: grid; gap: 12px; }
    .stale-item { display: grid; grid-template-columns: 72px minmax(0, 1fr) auto; gap: 14px; align-items: center; min-height: 100px; padding: 14px; border-radius: 26px; background: #fff; box-shadow: 0 14px 34px rgba(36, 42, 54, 0.07); }
    .stale-item img { width: 72px; height: 72px; object-fit: cover; border-radius: 18px; background: #f4f5f7; }
    .stale-name { font-size: 16px; line-height: 1.25; font-weight: 900; word-break: keep-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .stale-meta { margin-top: 6px; color: #969aa4; font-size: 12px; font-weight: 800; }
    .stale-qty { display: inline-flex; align-items: center; justify-content: center; min-width: 56px; height: 36px; padding: 0 10px; border-radius: 999px; background: #f3f5f8; text-align: center; font-size: 18px; font-weight: 900; }
    .empty { padding: 36px 16px; border-radius: 28px; background: #fff; color: #8d929c; text-align: center; font-size: 15px; font-weight: 800; box-shadow: 0 14px 34px rgba(36,42,54,.07); }
    .burst { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; pointer-events: none; opacity: 0; background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.98) 0 18%, rgba(8,160,92,.95) 19% 42%, rgba(0,81,160,.98) 43% 100%); }
    .burst.show { animation: burst 620ms cubic-bezier(.2,.85,.18,1) both; }
    .burst.minus { background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.98) 0 18%, rgba(231,64,57,.95) 19% 42%, rgba(17,17,17,.98) 43% 100%); }
    .burst.plus { background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.98) 0 18%, rgba(22,128,219,.95) 19% 42%, rgba(17,17,17,.98) 43% 100%); }
    .burst-text { color: #fff; font-size: clamp(46px, 13vw, 132px); font-weight: 900; letter-spacing: 0; text-shadow: 0 10px 24px rgba(0,0,0,.25); }
    .tap-pop { position: fixed; z-index: 120; display: grid; place-items: center; width: 52px; height: 52px; margin: -26px 0 0 -26px; border-radius: 999px; background: rgba(8,160,92,.95); color: #fff; font-size: 18px; font-weight: 900; pointer-events: none; box-shadow: 0 14px 34px rgba(0,0,0,.22); animation: tapPop 520ms cubic-bezier(.18,.86,.28,1) both; }
    .tap-pop.minus { background: rgba(231,64,57,.95); }
    .count-btn.tap-hit { animation: localTap 220ms cubic-bezier(.18,.86,.28,1) both; }
    @keyframes burst { 0% { opacity: 0; clip-path: circle(0% at 50% 50%); transform: scale(1.1); } 18% { opacity: 1; clip-path: circle(70% at 50% 50%); transform: scale(1); } 72% { opacity: 1; clip-path: circle(120% at 50% 50%); } 100% { opacity: 0; clip-path: circle(120% at 50% 50%); transform: scale(.98); } }
    @keyframes tapPop { 0% { opacity: 0; transform: scale(.55); } 22% { opacity: 1; transform: scale(1.06); } 100% { opacity: 0; transform: translateY(-28px) scale(.86); } }
    @keyframes localTap { 0% { transform: scale(1); } 50% { transform: scale(.92); box-shadow: 0 0 0 8px rgba(8,160,92,.22); } 100% { transform: scale(1); } }
    @media (max-width: 560px) {
      .app { padding-left: 10px; padding-right: 10px; }
      .shell, .top-inner { width: 100%; }
      .summary { gap: 8px; }
      .metric { min-height: 66px; padding: 11px; border-radius: 18px; }
      .metric-value { font-size: 20px; }
      .product-card { grid-template-columns: 94px minmax(0, 1fr) 42px; gap: 12px; min-height: 128px; padding: 12px; border-radius: 24px; }
      .thumb-wrap { width: 94px; height: 94px; border-radius: 19px; }
      .card-name { font-size: 17px; }
      .stock-pill { min-width: 64px; height: 27px; padding: 0 9px; font-size: 12px; }
      .card-desc { font-size: 12px; -webkit-line-clamp: 1; }
      .tag-row { gap: 4px; }
      .storage, .pack-badge, .soft-tag { height: 21px; padding: 0 7px; font-size: 10px; }
      .price { font-size: 22px; }
      .sales-actions { gap: 8px; }
      .minus-btn { width: 42px; height: 42px; font-size: 26px; }
      .plus-btn { width: 32px; height: 32px; font-size: 18px; }
      .memo-line { grid-template-columns: 1fr; gap: 7px; padding-top: 10px; }
      .memo { height: 36px; border-radius: 14px; font-size: 12px; }
      .history { display: none; }
      .inbound-card { grid-template-columns: 94px minmax(0, 1fr); }
      .inbound-status { gap: 5px; }
      .status-box { padding: 8px 7px; border-radius: 13px; }
      .status-label { font-size: 10px; }
      .status-value { font-size: 15px; }
      .count-actions { gap: 6px; }
      .count-btn { height: 36px; border-radius: 13px; font-size: 12px; }
      .complete-btn { height: 42px; border-radius: 15px; font-size: 14px; }
      .stale-item { grid-template-columns: 60px minmax(0, 1fr) auto; min-height: 86px; padding: 12px; border-radius: 22px; }
      .stale-item img { width: 60px; height: 60px; border-radius: 15px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="top-inner">
        <div class="brand">
          <div class="brand-title">판매·입고</div>
          <div class="brand-sub" id="subtitle">만만마켓 운영</div>
        </div>
        <button class="refresh-btn" id="refreshBtn" type="button" aria-label="새로고침">↻</button>
      </div>
      <div class="shell">
        <div class="tabs">
          <button class="tab active" id="salesTab" type="button">판매</button>
          <button class="tab" id="inboundTab" type="button">입고</button>
        </div>
      </div>
    </div>

    <main class="shell">
      <section class="panel active" id="salesPanel">
        <div class="summary" id="salesSummary"></div>
        <div class="date-strip" id="salesDateStrip" aria-label="판매 날짜 선택"></div>
        <div class="grid" id="salesGrid"></div>
      </section>

      <section class="panel" id="inboundPanel">
        <div class="summary" id="inboundSummary"></div>
        <div class="inbound-sections" id="inboundGrid"></div>
        <h2 class="section-title">상시전환 D-2</h2>
        <div class="stale-list" id="staleList"></div>
      </section>
    </main>
  </div>

  <div class="burst" id="burst" aria-hidden="true">
    <div class="burst-text" id="burstText">완료</div>
  </div>

  <script>
    const state = {
      tab: 'sales',
      dashboard: null,
      salesDateKey: '',
      token: new URLSearchParams(location.search).get('token') || localStorage.getItem('opsToken') || '03064',
      doubleTap: { id: '', at: 0 },
      busy: false
    };

    if (state.token) localStorage.setItem('opsToken', state.token);

    const els = {
      subtitle: document.getElementById('subtitle'),
      refreshBtn: document.getElementById('refreshBtn'),
      salesTab: document.getElementById('salesTab'),
      inboundTab: document.getElementById('inboundTab'),
      salesPanel: document.getElementById('salesPanel'),
      inboundPanel: document.getElementById('inboundPanel'),
      salesSummary: document.getElementById('salesSummary'),
      salesDateStrip: document.getElementById('salesDateStrip'),
      inboundSummary: document.getElementById('inboundSummary'),
      salesGrid: document.getElementById('salesGrid'),
      inboundGrid: document.getElementById('inboundGrid'),
      staleList: document.getElementById('staleList'),
      burst: document.getElementById('burst'),
      burstText: document.getElementById('burstText')
    };

    function money(value) {
      const n = Number(value || 0);
      return n > 0 ? `${n.toLocaleString('ko-KR')}원` : '-';
    }

    function number(value) {
      return Number(value || 0).toLocaleString('ko-KR');
    }

    function esc(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function storageClass(value) {
      if (value === '냉장') return 'cold';
      if (value === '냉동') return 'frozen';
      return 'room';
    }

    function imageUrl(item) {
      return item.imageUrl || 'https://picsum.photos/seed/manman-ops/800/800';
    }

    function packageUnitLabel(item) {
      const unit = String(item.packageUnit || '').trim();
      if (!unit) return '';

      const normalized = unit.replace(/\s+/g, '').toLowerCase();
      if (/^1(?:\.0+)?(?:개|ea)?$/.test(normalized)) return '';
      return unit;
    }

    function stockClass(value) {
      const quantity = Number(value || 0);
      if (quantity <= 0) return 'empty';
      if (quantity <= 2) return 'low';
      return '';
    }

    async function loadDashboard(options = {}) {
      const url = new URL('/api/buffer-dashboard', location.origin);
      url.searchParams.set('token', state.token);
      if (options.refresh) url.searchParams.set('refresh', '1');

      const response = await fetch(url);
      const data = await response.json();
      if (!response.ok || !data.ok) throw new Error(data.message || '데이터를 불러오지 못했습니다.');

      state.dashboard = data;
      render();
    }

    async function runAction(body, burstText, burstKind) {
      if (state.busy) return;
      state.busy = true;

      try {
        const url = new URL('/api/buffer-action', location.origin);
        url.searchParams.set('token', state.token);
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.message || '저장하지 못했습니다.');

        state.dashboard = data.dashboard;
        showBurst(burstText, burstKind);
        render();
      } catch (error) {
        alert(error.message || String(error));
      } finally {
        state.busy = false;
      }
    }

    function showBurst(text, kind = '') {
      els.burstText.textContent = text;
      els.burst.className = `burst ${kind}`;
      void els.burst.offsetWidth;
      els.burst.classList.add('show');
      setTimeout(() => els.burst.classList.remove('show'), 680);
    }

    function flashButton(button, text, kind = '') {
      if (!button) return;

      const rect = button.getBoundingClientRect();
      const pop = document.createElement('span');
      pop.className = `tap-pop ${kind}`;
      pop.textContent = text;
      pop.style.left = `${rect.left + rect.width / 2}px`;
      pop.style.top = `${rect.top + rect.height / 2}px`;
      document.body.appendChild(pop);

      button.classList.remove('tap-hit');
      void button.offsetWidth;
      button.classList.add('tap-hit');

      setTimeout(() => pop.remove(), 560);
      setTimeout(() => button.classList.remove('tap-hit'), 240);
    }

    function setTab(tab) {
      state.tab = tab;
      els.salesTab.classList.toggle('active', tab === 'sales');
      els.inboundTab.classList.toggle('active', tab === 'inbound');
      els.salesPanel.classList.toggle('active', tab === 'sales');
      els.inboundPanel.classList.toggle('active', tab === 'inbound');
    }

    function render() {
      const data = state.dashboard;
      if (!data) return;

      els.subtitle.textContent = `${data.storeName || '만만마켓'} · ${data.todayKey || ''}`;
      syncSalesDateSelection(data);
      renderSales(data);
      renderInbound(data);
      bindControls();
    }

    function renderMetric(label, value) {
      return `<div class="metric"><div class="metric-label">${esc(label)}</div><div class="metric-value">${esc(value)}</div></div>`;
    }

    function syncSalesDateSelection(data) {
      const options = data.salesDateOptions || [];
      const keys = new Set(options.map(option => option.dateKey));

      if (!state.salesDateKey || !keys.has(state.salesDateKey)) {
        state.salesDateKey = data.defaultSalesDateKey || options[0]?.dateKey || '';
      }
    }

    function getSelectedSalesItems(data) {
      const allItems = data.salesAllItems || data.salesItems || [];
      if (!state.salesDateKey) return data.salesItems || [];
      return allItems.filter(item => item.inboundDateKey === state.salesDateKey);
    }

    function renderSalesDateStrip(data) {
      const options = data.salesDateOptions || [];

      els.salesDateStrip.innerHTML = options.length
        ? options.map(option => `
          <button
            class="date-btn ${option.dateKey === state.salesDateKey ? 'active' : ''}"
            type="button"
            data-sales-date="${esc(option.dateKey)}"
          >${esc(option.label)} · ${number(option.count)}</button>
        `).join('')
        : '';
    }

    function renderSales(data) {
      const items = getSelectedSalesItems(data);
      const totalBuffer = items.reduce((sum, item) => sum + Number(item.bufferRemainingQuantity || 0), 0);
      const used = items.reduce((sum, item) => sum + Number(item.bufferUsedQuantity || 0), 0);
      const selectedOption = (data.salesDateOptions || []).find(option => option.dateKey === state.salesDateKey);

      els.salesSummary.innerHTML = [
        renderMetric('판매일', selectedOption?.label || state.salesDateKey || '-'),
        renderMetric('버퍼잔여', `${number(totalBuffer)}개`),
        renderMetric('상품', `${number(items.length)}종`)
      ].join('');
      renderSalesDateStrip(data);

      els.salesGrid.innerHTML = items.length
        ? items.map(renderSalesCard).join('')
        : '<div class="empty">해당 날짜의 입고 상품이 없습니다.</div>';
    }

    function renderSalesCard(item) {
      const history = (item.bufferHistory || [])
        .filter(event => Number(event.deltaQuantity || 0) < 0)
        .map(event => `<span>${esc(event.actorMemo || '메모없음')}</span>`)
        .join('');
      const bufferQuantity = Number(item.bufferRemainingQuantity || 0);
      const primaryPrice = Number(item.salePrice || item.supplyPrice || 0);

      return `
        <article class="product-card" data-id="${esc(item.id)}">
          <div class="thumb-wrap">
            <img class="thumb" src="${esc(imageUrl(item))}" alt="${esc(item.productName)}" loading="lazy">
          </div>
          <div class="card-main">
            <div class="card-head">
              <h3 class="card-name">${esc(item.productName)}</h3>
              <span class="stock-pill ${stockClass(bufferQuantity)}">버퍼 ${number(bufferQuantity)}</span>
            </div>
            <div class="card-desc">총 잔여 ${number(item.remainingQuantity)}개 · 입고 ${number(item.inboundQuantity)}개</div>
            <div class="tag-row">
              <span class="storage ${storageClass(item.storageMethod)}">${esc(item.storageMethod)}</span>
              <span class="soft-tag">본사 ${number(item.hqBufferQuantity)}</span>
              <span class="soft-tag">우리 ${number(item.ourBufferQuantity)}</span>
            </div>
            <div class="price-row">
              <div>
                <div class="price">${money(primaryPrice)}</div>
                <div class="sub-price">공급 ${money(item.supplyPrice)}</div>
              </div>
            </div>
          </div>
          <div class="sales-actions">
            <button class="minus-btn" data-action="buffer-minus" ${bufferQuantity <= 0 ? 'disabled' : ''}>−</button>
            <button class="plus-btn" data-action="buffer-plus">+</button>
          </div>
          <div class="memo-line">
            <input class="memo" data-memo="${esc(item.id)}" placeholder="끝4자리 / 닉네임" autocomplete="off">
            <div class="history">${history}</div>
          </div>
        </article>
      `;
    }

    function renderInbound(data) {
      const todayItems = data.inboundItems || [];
      const fallbackItems = !todayItems.length ? (data.latestInboundItems || []) : [];
      const items = todayItems.length ? todayItems : fallbackItems;
      const targetDate = todayItems.length ? data.todayKey : data.latestInboundDate;
      const totalInbound = items.reduce((sum, item) => sum + Number(item.inboundQuantity || 0), 0);
      const totalCounted = items.reduce((sum, item) => sum + Number(item.countedQuantity || 0), 0);
      const completeCount = items.filter(item => item.isReceivingComplete).length;

      els.inboundSummary.innerHTML = [
        renderMetric('입고일', targetDate || '-'),
        renderMetric('입고수량', `${number(totalInbound)}개`),
        renderMetric('완료', `${number(completeCount)}/${number(items.length)}`)
      ].join('');

      els.inboundGrid.innerHTML = items.length
        ? renderInboundStorageSections(items)
        : '<div class="empty">입고 상품이 없습니다.</div>';

      els.staleList.innerHTML = (data.staleItems || []).length
        ? data.staleItems.map(renderStaleItem).join('')
        : '<div class="empty">상시전환 대상이 없습니다.</div>';
    }

    function renderInboundStorageSections(items) {
      return groupByStorage(items).map(group => `
        <section class="inbound-section">
          <div class="storage-heading">
            <strong><i class="storage-dot ${storageClass(group.storage)}"></i>${esc(group.storage)}</strong>
            <span>${number(group.items.length)}종 · ${number(group.totalQuantity)}개</span>
          </div>
          <div class="grid">
            ${group.items.map(renderInboundCard).join('')}
          </div>
        </section>
      `).join('');
    }

    function groupByStorage(items) {
      const order = ['냉장', '상온', '냉동'];
      const grouped = new Map();

      items.forEach(item => {
        const storage = item.storageMethod || '상온';
        if (!grouped.has(storage)) grouped.set(storage, []);
        grouped.get(storage).push(item);
      });

      return [...order, ...Array.from(grouped.keys()).filter(key => !order.includes(key))]
        .filter(storage => grouped.has(storage))
        .map(storage => {
          const groupItems = grouped.get(storage) || [];
          return {
            storage,
            items: groupItems,
            totalQuantity: groupItems.reduce((sum, item) => sum + Number(item.inboundQuantity || 0), 0)
          };
        });
    }

    function renderInboundCard(item) {
      const packageUnit = packageUnitLabel(item);
      const counted = Number(item.countedQuantity || 0);
      const inbound = Number(item.inboundQuantity || 0);
      const remainingToCount = Math.max(0, inbound - counted);

      return `
        <article class="product-card inbound-card ${item.isReceivingComplete ? 'done' : ''}" data-id="${esc(item.id)}" data-receive-card="1">
          <div class="thumb-wrap">
            <img class="thumb" src="${esc(imageUrl(item))}" alt="${esc(item.productName)}" loading="lazy">
          </div>
          <div class="inbound-main">
            <div class="card-head">
              <h3 class="card-name">${esc(item.productName)}</h3>
              <span class="stock-pill ${stockClass(remainingToCount)}">입고 ${number(inbound)}</span>
            </div>
            <div class="card-desc">공급 ${money(item.supplyPrice)} · 판매 ${money(item.salePrice)}</div>
            <div class="tag-row">
              <span class="storage ${storageClass(item.storageMethod)}">${esc(item.storageMethod)}</span>
              ${packageUnit ? `<span class="pack-badge">포장 ${esc(packageUnit)}</span>` : ''}
              <span class="soft-tag">본사 ${number(item.hqBufferQuantity)}</span>
              <span class="soft-tag">우리 ${number(item.ourBufferQuantity)}</span>
            </div>
            <div class="inbound-status">
              <div class="status-box">
                <div class="status-label">입고</div>
                <div class="status-value">${number(inbound)}</div>
              </div>
              <div class="status-box">
                <div class="status-label">카운팅</div>
                <div class="status-value green">${number(counted)}</div>
              </div>
              <div class="status-box">
                <div class="status-label">남음</div>
                <div class="status-value">${number(remainingToCount)}</div>
              </div>
            </div>
          </div>
          <div class="count-actions">
            <button class="count-btn" data-action="count-10">+10</button>
            <button class="count-btn" data-action="count-5">+5</button>
            <button class="count-btn" data-action="count-1">+1</button>
            <button class="count-btn" data-action="count-minus">−1</button>
            <button class="complete-btn ${item.isReceivingComplete ? 'done' : ''}" data-action="receive-complete">${item.isReceivingComplete ? '입고완료' : '수량체크완료'}</button>
          </div>
        </article>
      `;
    }

    function renderStaleItem(item) {
      return `
        <div class="stale-item">
          <img src="${esc(imageUrl(item))}" alt="${esc(item.productName)}" loading="lazy">
          <div>
            <div class="stale-name">${esc(item.productName)}</div>
            <div class="stale-meta">${esc(item.storageMethod)} · ${esc(item.inboundDateText)} · ${esc(item.salesType)}</div>
          </div>
          <div class="stale-qty">${number(item.inboundQuantity)}</div>
        </div>
      `;
    }

    function findItem(id) {
      const data = state.dashboard || {};
      return [
        ...(data.salesItems || []),
        ...(data.salesAllItems || []),
        ...(data.inboundItems || []),
        ...(data.latestInboundItems || []),
        ...(data.staleItems || [])
      ].find(item => item.id === id);
    }

    function updateItem(id, update) {
      const data = state.dashboard || {};
      const groups = [
        data.salesItems,
        data.salesAllItems,
        data.inboundItems,
        data.latestInboundItems,
        data.staleItems
      ];

      groups.forEach(items => {
        (items || []).forEach(item => {
          if (item.id === id) update(item);
        });
      });
    }

    function runReceivingCount(button, id, requestedQuantity) {
      const item = findItem(id);
      if (!item) return;

      const current = Number(item.countedQuantity || 0);
      let quantity = Number(requestedQuantity || 0);
      if (current + quantity < 0) quantity = -current;
      if (!quantity) return;

      flashButton(button, quantity > 0 ? `+${quantity}` : `${quantity}`, quantity > 0 ? '' : 'minus');
      updateItem(id, target => {
        target.countedQuantity = Math.max(0, Number(target.countedQuantity || 0) + quantity);
      });
      render();

      const url = new URL('/api/buffer-action', location.origin);
      url.searchParams.set('token', state.token);
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'receive_count',
          inventoryStableId: id,
          countedQuantity: quantity
        })
      })
        .then(async response => {
          const data = await response.json();
          if (!response.ok || !data.ok) throw new Error(data.message || '저장하지 못했습니다.');
        })
        .catch(error => {
          updateItem(id, target => {
            target.countedQuantity = Math.max(0, Number(target.countedQuantity || 0) - quantity);
          });
          render();
          alert(error.message || String(error));
        });
    }

    function bindControls() {
      document.querySelectorAll('[data-action]').forEach(button => {
        button.onclick = event => {
          event.stopPropagation();
          const card = button.closest('[data-id]');
          const id = card?.dataset.id || '';
          const item = findItem(id);
          const action = button.dataset.action;
          if (!item) return;

          if (action === 'buffer-minus' || action === 'buffer-plus') {
            const memo = document.querySelector(`[data-memo="${CSS.escape(id)}"]`)?.value || '';
            const delta = action === 'buffer-minus' ? -1 : 1;
            runAction({
              action: 'buffer_delta',
              inventoryStableId: id,
              deltaQuantity: delta,
              actorMemo: memo
            }, delta < 0 ? '버퍼 -1' : '버퍼 +1', delta < 0 ? 'minus' : 'plus');
          }

          if (action === 'count-10' || action === 'count-5' || action === 'count-1' || action === 'count-minus') {
            const qty = action === 'count-10' ? 10 : action === 'count-5' ? 5 : action === 'count-1' ? 1 : -1;
            runReceivingCount(button, id, qty);
          }

          if (action === 'receive-complete') {
            runAction({
              action: 'receive_complete',
              inventoryStableId: id,
              isComplete: !item.isReceivingComplete
            }, item.isReceivingComplete ? '완료취소' : '입고완료', item.isReceivingComplete ? 'minus' : '');
          }
        };
      });

      document.querySelectorAll('[data-sales-date]').forEach(button => {
        button.onclick = () => {
          state.salesDateKey = button.dataset.salesDate || '';
          render();
        };
      });
    }

    document.addEventListener('click', event => {
      const card = event.target.closest?.('[data-receive-card="1"]');
      if (!card || event.target.closest('button, input')) return;

      const now = Date.now();
      const id = card.dataset.id || '';
      const isDoubleTap = state.doubleTap.id === id && now - state.doubleTap.at <= 520;
      state.doubleTap = { id, at: now };
      if (!isDoubleTap) return;

      const item = findItem(id);
      if (!item) return;
      runAction({
        action: 'receive_complete',
        inventoryStableId: id,
        isComplete: !item.isReceivingComplete
      }, item.isReceivingComplete ? '완료취소' : '입고완료', item.isReceivingComplete ? 'minus' : '');
    });

    els.salesTab.addEventListener('click', () => setTab('sales'));
    els.inboundTab.addEventListener('click', () => setTab('inbound'));
    els.refreshBtn.addEventListener('click', () => loadDashboard({ refresh: true }).catch(error => alert(error.message)));

    loadDashboard().catch(error => {
      els.salesGrid.innerHTML = `<div class="empty">${esc(error.message)}</div>`;
    });
  </script>
</body>
</html>
