<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>만만마켓 운영</title>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; min-height: 100%; background: #f4f6f8; color: #111; font-family: Pretendard, -apple-system, BlinkMacSystemFont, sans-serif; }
    button, input { font: inherit; }
    button { cursor: pointer; }
    .app { min-height: 100vh; padding: 18px 14px 120px; }
    .shell { width: min(1080px, 100%); margin: 0 auto; }
    .top { position: sticky; top: 0; z-index: 20; margin: -18px -14px 16px; padding: 16px 14px 14px; background: rgba(244, 246, 248, 0.94); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(15, 23, 42, 0.08); }
    .top-inner { width: min(1080px, 100%); margin: 0 auto; display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; }
    .brand { min-width: 0; }
    .brand-title { font-size: 26px; line-height: 1; font-weight: 900; letter-spacing: 0; }
    .brand-sub { margin-top: 6px; color: #667085; font-size: 13px; font-weight: 700; }
    .refresh-btn { width: 44px; height: 44px; border: 0; border-radius: 8px; background: #111; color: #fff; font-size: 22px; font-weight: 900; }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; padding: 5px; border-radius: 8px; background: #e7ebf0; }
    .tab { height: 48px; border: 0; border-radius: 6px; background: transparent; color: #5b6472; font-size: 18px; font-weight: 900; }
    .tab.active { background: #fff; color: #111; box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08); }
    .panel { display: none; }
    .panel.active { display: block; }
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .date-strip { display: flex; gap: 8px; overflow-x: auto; padding: 0 0 12px; margin-top: -4px; scrollbar-width: none; }
    .date-strip::-webkit-scrollbar { display: none; }
    .date-btn { flex: 0 0 auto; min-width: 92px; height: 44px; border: 1px solid rgba(15, 23, 42, 0.08); border-radius: 8px; background: #fff; color: #344054; font-size: 14px; font-weight: 900; }
    .date-btn.active { background: #111; color: #fff; border-color: #111; }
    .metric { min-height: 72px; padding: 12px; border-radius: 8px; background: #fff; border: 1px solid rgba(15, 23, 42, 0.06); }
    .metric-label { color: #667085; font-size: 12px; font-weight: 800; }
    .metric-value { margin-top: 7px; font-size: 27px; line-height: 1; font-weight: 900; letter-spacing: 0; }
    .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .product-card { position: relative; min-width: 0; aspect-ratio: 1 / 1; overflow: hidden; border-radius: 8px; background: #111; border: 1px solid rgba(15, 23, 42, 0.07); box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06); }
    .product-card.done { filter: saturate(0.72); }
    .product-card.done::after { content: '입고완료'; position: absolute; inset: 0; display: grid; place-items: center; background: rgba(8, 160, 92, 0.86); color: #fff; font-size: clamp(26px, 6vw, 70px); font-weight: 900; letter-spacing: 0; }
    .thumb-wrap { position: absolute; inset: 0; width: 100%; height: 100%; background: #edf0f3; overflow: hidden; }
    .thumb { width: 100%; height: 100%; display: block; object-fit: cover; }
    .thumb-wrap::after { content: ''; position: absolute; inset: 0; z-index: 1; background: linear-gradient(180deg, rgba(0,0,0,.46) 0%, rgba(0,0,0,.12) 42%, rgba(0,0,0,.86) 100%); pointer-events: none; }
    .storage { position: absolute; left: 8px; top: 8px; z-index: 2; display: inline-flex; align-items: center; gap: 4px; height: 25px; padding: 0 8px; border-radius: 999px; color: #fff; font-size: 11px; font-weight: 900; box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18); }
    .storage.cold { background: #1680db; }
    .storage.frozen { background: #5452d8; }
    .storage.room { background: #c77800; }
    .pack-badge { position: absolute; right: 8px; top: 8px; z-index: 2; display: inline-flex; align-items: center; height: 25px; padding: 0 8px; border-radius: 999px; background: #fff200; color: #111; font-size: 11px; font-weight: 900; box-shadow: 0 8px 18px rgba(0,0,0,.18); }
    .card-overlay { position: absolute; left: 0; right: 0; top: 38px; z-index: 2; padding: 0 9px; color: #fff; }
    .card-name { font-size: 13px; line-height: 1.18; font-weight: 900; word-break: keep-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-shadow: 0 2px 9px rgba(0,0,0,.52); }
    .overlay-row { display: flex; align-items: end; justify-content: space-between; gap: 6px; margin-top: 6px; }
    .overlay-stat { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .overlay-label { font-size: 9px; line-height: 1; font-weight: 800; color: rgba(255,255,255,.78); }
    .overlay-num { font-size: 31px; line-height: .88; font-weight: 900; letter-spacing: 0; color: #fff; text-shadow: 0 4px 12px rgba(0,0,0,.38); }
    .overlay-mini { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 3px; max-width: 64%; }
    .overlay-chip { display: inline-flex; align-items: center; height: 19px; padding: 0 6px; border-radius: 999px; background: rgba(255,255,255,.9); color: #111; font-size: 9px; font-weight: 900; }
    .counted-badge { display: inline-flex; align-items: center; align-self: flex-start; height: 22px; margin-top: 5px; padding: 0 7px; border-radius: 999px; background: rgba(8,160,92,.95); color: #fff; font-size: 10px; font-weight: 900; box-shadow: 0 8px 18px rgba(0,0,0,.18); }
    .body { position: absolute; left: 8px; right: 8px; bottom: 8px; z-index: 3; padding: 0; }
    .name { display: none; }
    .mini { display: none; flex-wrap: wrap; gap: 5px; margin-top: 0; }
    .chip { display: inline-flex; align-items: center; height: 27px; padding: 0 8px; border-radius: 999px; background: #f1f3f6; color: #344054; font-size: 12px; font-weight: 800; }
    .buffer-hero { display: none; }
    .buffer-label { color: #667085; font-size: 13px; font-weight: 800; }
    .buffer-num { margin-top: 3px; font-size: 58px; line-height: 0.9; font-weight: 900; letter-spacing: 0; }
    .remain-num { color: #0051a0; }
    .action-row { display: grid; grid-template-columns: 1fr 34px; gap: 5px; margin-top: 0; }
    .minus-btn { height: 36px; border: 0; border-radius: 8px; background: #111; color: #fff; font-size: 24px; font-weight: 900; box-shadow: 0 8px 18px rgba(0,0,0,.22); }
    .minus-btn:disabled { opacity: 0.34; cursor: default; }
    .plus-btn { height: 36px; border: 0; border-radius: 8px; background: rgba(232,237,243,.92); color: #111; font-size: 17px; font-weight: 900; }
    .memo { width: 100%; height: 30px; margin-top: 5px; border: 1px solid rgba(255,255,255,.58); border-radius: 8px; background: rgba(255,255,255,.93); padding: 0 9px; font-size: 12px; font-weight: 800; outline: none; }
    .history { display: flex; flex-wrap: nowrap; gap: 4px; margin-top: 5px; min-height: 0; overflow: hidden; }
    .history span { display: inline-flex; align-items: center; flex: 0 0 auto; height: 21px; padding: 0 7px; border-radius: 999px; background: rgba(255,247,237,.92); color: #9a4a00; font-size: 10px; font-weight: 800; }
    .inbound-top { display: none; }
    .inbound-qty { font-size: 58px; line-height: 0.9; font-weight: 900; letter-spacing: 0; }
    .counted { text-align: right; }
    .counted-num { color: #08a05c; font-size: 42px; line-height: 1; font-weight: 900; }
    .count-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-top: 0; }
    .count-btn { height: 30px; border: 0; border-radius: 8px; background: rgba(232,237,243,.93); color: #111; font-size: 12px; font-weight: 900; }
    .complete-btn { grid-column: span 4; height: 34px; border: 0; border-radius: 8px; background: #08a05c; color: #fff; font-size: 13px; font-weight: 900; }
    .complete-btn.done { background: #344054; }
    .section-title { margin: 24px 2px 10px; font-size: 20px; line-height: 1.2; font-weight: 900; }
    .inbound-sections { display: grid; gap: 18px; }
    .storage-heading { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 2px 0 9px; }
    .storage-heading strong { display: inline-flex; align-items: center; gap: 8px; font-size: 18px; font-weight: 900; }
    .storage-heading span { color: #667085; font-size: 13px; font-weight: 900; }
    .storage-dot { width: 13px; height: 13px; border-radius: 999px; background: #c77800; }
    .storage-dot.cold { background: #1680db; }
    .storage-dot.frozen { background: #5452d8; }
    .storage-dot.room { background: #c77800; }
    .stale-list { display: grid; gap: 8px; }
    .stale-item { display: grid; grid-template-columns: 54px 1fr auto; gap: 10px; align-items: center; min-height: 70px; padding: 8px; border-radius: 8px; background: #fff; border: 1px solid rgba(15, 23, 42, 0.07); }
    .stale-item img { width: 54px; height: 54px; object-fit: cover; border-radius: 6px; background: #edf0f3; }
    .stale-name { font-size: 14px; line-height: 1.25; font-weight: 900; }
    .stale-meta { margin-top: 4px; color: #667085; font-size: 12px; font-weight: 800; }
    .stale-qty { min-width: 45px; text-align: right; font-size: 22px; font-weight: 900; }
    .empty { padding: 34px 16px; border-radius: 8px; background: #fff; color: #667085; text-align: center; font-size: 15px; font-weight: 800; }
    .burst { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; pointer-events: none; opacity: 0; background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.98) 0 18%, rgba(8,160,92,.95) 19% 42%, rgba(0,81,160,.98) 43% 100%); }
    .burst.show { animation: burst 620ms cubic-bezier(.2,.85,.18,1) both; }
    .burst.minus { background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.98) 0 18%, rgba(231,64,57,.95) 19% 42%, rgba(17,17,17,.98) 43% 100%); }
    .burst.plus { background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.98) 0 18%, rgba(22,128,219,.95) 19% 42%, rgba(17,17,17,.98) 43% 100%); }
    .burst-text { color: #fff; font-size: clamp(46px, 13vw, 132px); font-weight: 900; letter-spacing: 0; text-shadow: 0 10px 24px rgba(0,0,0,.25); }
    .tap-pop { position: fixed; z-index: 120; display: grid; place-items: center; width: 52px; height: 52px; margin: -26px 0 0 -26px; border-radius: 999px; background: rgba(8,160,92,.95); color: #fff; font-size: 18px; font-weight: 900; pointer-events: none; box-shadow: 0 14px 34px rgba(0,0,0,.22); animation: tapPop 520ms cubic-bezier(.18,.86,.28,1) both; }
    .tap-pop.minus { background: rgba(231,64,57,.95); }
    .count-btn.tap-hit { animation: localTap 220ms cubic-bezier(.18,.86,.28,1) both; }
    @keyframes burst { 0% { opacity: 0; clip-path: circle(0% at 50% 50%); transform: scale(1.1); } 18% { opacity: 1; clip-path: circle(70% at 50% 50%); transform: scale(1); } 72% { opacity: 1; clip-path: circle(120% at 50% 50%); } 100% { opacity: 0; clip-path: circle(120% at 50% 50%); transform: scale(.98); } }
    @keyframes tapPop { 0% { opacity: 0; transform: scale(.55); } 22% { opacity: 1; transform: scale(1.06); } 100% { opacity: 0; transform: translateY(-28px) scale(.86); } }
    @keyframes localTap { 0% { transform: scale(1); } 50% { transform: scale(.92); box-shadow: 0 0 0 8px rgba(8,160,92,.22); } 100% { transform: scale(1); } }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
    @media (max-width: 640px) { .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 520px) { .app { padding-left: 10px; padding-right: 10px; } .grid { gap: 8px; } .summary { grid-template-columns: repeat(3, minmax(0, 1fr)); } .metric { min-height: 62px; padding: 9px; } .metric-value { font-size: 21px; } .storage, .pack-badge { top: 7px; height: 22px; padding: 0 7px; font-size: 10px; } .storage { left: 7px; } .pack-badge { right: 7px; } .card-overlay { top: 34px; padding: 0 8px; } .card-name { font-size: 12px; } .overlay-row { margin-top: 4px; } .overlay-num { font-size: 27px; } .overlay-mini { display: none; } .inbound-card .overlay-mini { display: flex; max-width: 70%; } .inbound-card .overlay-chip { height: 17px; padding: 0 5px; font-size: 8px; } .counted-badge { height: 20px; font-size: 9px; } .body { left: 7px; right: 7px; bottom: 7px; } .minus-btn, .plus-btn { height: 34px; } .memo { height: 28px; font-size: 11px; } .history { display: none; } .count-btn { height: 28px; font-size: 11px; } .complete-btn { height: 31px; font-size: 12px; } }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="top-inner">
        <div class="brand">
          <div class="brand-title">판매·입고</div>
          <div class="brand-sub" id="subtitle">만만마켓 운영</div>
        </div>
        <button class="refresh-btn" id="refreshBtn" type="button" aria-label="새로고침">↻</button>
      </div>
      <div class="shell">
        <div class="tabs">
          <button class="tab active" id="salesTab" type="button">판매</button>
          <button class="tab" id="inboundTab" type="button">입고</button>
        </div>
      </div>
    </div>

    <main class="shell">
      <section class="panel active" id="salesPanel">
        <div class="summary" id="salesSummary"></div>
        <div class="date-strip" id="salesDateStrip" aria-label="판매 날짜 선택"></div>
        <div class="grid" id="salesGrid"></div>
      </section>

      <section class="panel" id="inboundPanel">
        <div class="summary" id="inboundSummary"></div>
        <div class="inbound-sections" id="inboundGrid"></div>
        <h2 class="section-title">상시전환 D-2</h2>
        <div class="stale-list" id="staleList"></div>
      </section>
    </main>
  </div>

  <div class="burst" id="burst" aria-hidden="true">
    <div class="burst-text" id="burstText">완료</div>
  </div>

  <script>
    const state = {
      tab: 'sales',
      dashboard: null,
      salesDateKey: '',
      token: new URLSearchParams(location.search).get('token') || localStorage.getItem('opsToken') || '03064',
      doubleTap: { id: '', at: 0 },
      busy: false
    };

    if (state.token) localStorage.setItem('opsToken', state.token);

    const els = {
      subtitle: document.getElementById('subtitle'),
      refreshBtn: document.getElementById('refreshBtn'),
      salesTab: document.getElementById('salesTab'),
      inboundTab: document.getElementById('inboundTab'),
      salesPanel: document.getElementById('salesPanel'),
      inboundPanel: document.getElementById('inboundPanel'),
      salesSummary: document.getElementById('salesSummary'),
      salesDateStrip: document.getElementById('salesDateStrip'),
      inboundSummary: document.getElementById('inboundSummary'),
      salesGrid: document.getElementById('salesGrid'),
      inboundGrid: document.getElementById('inboundGrid'),
      staleList: document.getElementById('staleList'),
      burst: document.getElementById('burst'),
      burstText: document.getElementById('burstText')
    };

    function money(value) {
      const n = Number(value || 0);
      return n > 0 ? `${n.toLocaleString('ko-KR')}원` : '-';
    }

    function compactMoney(value) {
      const n = Number(value || 0);
      return n > 0 ? n.toLocaleString('ko-KR') : '-';
    }

    function number(value) {
      return Number(value || 0).toLocaleString('ko-KR');
    }

    function esc(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function storageClass(value) {
      if (value === '냉장') return 'cold';
      if (value === '냉동') return 'frozen';
      return 'room';
    }

    function storageIcon(value) {
      if (value === '냉장') return 'C';
      if (value === '냉동') return 'F';
      return 'R';
    }

    function imageUrl(item) {
      return item.imageUrl || 'https://picsum.photos/seed/manman-ops/800/800';
    }

    function packageUnitLabel(item) {
      const unit = String(item.packageUnit || '').trim();
      if (!unit) return '';

      const normalized = unit.replace(/\s+/g, '').toLowerCase();
      if (/^1(?:\.0+)?(?:개|ea)?$/.test(normalized)) return '';
      return unit;
    }

    async function loadDashboard(options = {}) {
      const url = new URL('/api/buffer-dashboard', location.origin);
      url.searchParams.set('token', state.token);
      if (options.refresh) url.searchParams.set('refresh', '1');

      const response = await fetch(url);
      const data = await response.json();
      if (!response.ok || !data.ok) throw new Error(data.message || '데이터를 불러오지 못했습니다.');

      state.dashboard = data;
      render();
    }

    async function runAction(body, burstText, burstKind) {
      if (state.busy) return;
      state.busy = true;

      try {
        const url = new URL('/api/buffer-action', location.origin);
        url.searchParams.set('token', state.token);
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await response.json();
        if (!response.ok || !data.ok) throw new Error(data.message || '저장하지 못했습니다.');

        state.dashboard = data.dashboard;
        showBurst(burstText, burstKind);
        render();
      } catch (error) {
        alert(error.message || String(error));
      } finally {
        state.busy = false;
      }
    }

    function showBurst(text, kind = '') {
      els.burstText.textContent = text;
      els.burst.className = `burst ${kind}`;
      void els.burst.offsetWidth;
      els.burst.classList.add('show');
      setTimeout(() => els.burst.classList.remove('show'), 680);
    }

    function flashButton(button, text, kind = '') {
      if (!button) return;

      const rect = button.getBoundingClientRect();
      const pop = document.createElement('span');
      pop.className = `tap-pop ${kind}`;
      pop.textContent = text;
      pop.style.left = `${rect.left + rect.width / 2}px`;
      pop.style.top = `${rect.top + rect.height / 2}px`;
      document.body.appendChild(pop);

      button.classList.remove('tap-hit');
      void button.offsetWidth;
      button.classList.add('tap-hit');

      setTimeout(() => pop.remove(), 560);
      setTimeout(() => button.classList.remove('tap-hit'), 240);
    }

    function setTab(tab) {
      state.tab = tab;
      els.salesTab.classList.toggle('active', tab === 'sales');
      els.inboundTab.classList.toggle('active', tab === 'inbound');
      els.salesPanel.classList.toggle('active', tab === 'sales');
      els.inboundPanel.classList.toggle('active', tab === 'inbound');
    }

    function render() {
      const data = state.dashboard;
      if (!data) return;

      els.subtitle.textContent = `${data.storeName || '만만마켓'} · ${data.todayKey || ''}`;
      syncSalesDateSelection(data);
      renderSales(data);
      renderInbound(data);
      bindControls();
    }

    function renderMetric(label, value) {
      return `<div class="metric"><div class="metric-label">${esc(label)}</div><div class="metric-value">${esc(value)}</div></div>`;
    }

    function syncSalesDateSelection(data) {
      const options = data.salesDateOptions || [];
      const keys = new Set(options.map(option => option.dateKey));

      if (!state.salesDateKey || !keys.has(state.salesDateKey)) {
        state.salesDateKey = data.defaultSalesDateKey || options[0]?.dateKey || '';
      }
    }

    function getSelectedSalesItems(data) {
      const allItems = data.salesAllItems || data.salesItems || [];
      if (!state.salesDateKey) return data.salesItems || [];
      return allItems.filter(item => item.inboundDateKey === state.salesDateKey);
    }

    function renderSalesDateStrip(data) {
      const options = data.salesDateOptions || [];

      els.salesDateStrip.innerHTML = options.length
        ? options.map(option => `
          <button
            class="date-btn ${option.dateKey === state.salesDateKey ? 'active' : ''}"
            type="button"
            data-sales-date="${esc(option.dateKey)}"
          >${esc(option.label)} · ${number(option.count)}</button>
        `).join('')
        : '';
    }

    function renderSales(data) {
      const items = getSelectedSalesItems(data);
      const totalBuffer = items.reduce((sum, item) => sum + Number(item.bufferRemainingQuantity || 0), 0);
      const used = items.reduce((sum, item) => sum + Number(item.bufferUsedQuantity || 0), 0);
      const selectedOption = (data.salesDateOptions || []).find(option => option.dateKey === state.salesDateKey);

      els.salesSummary.innerHTML = [
        renderMetric('판매일', selectedOption?.label || state.salesDateKey || '-'),
        renderMetric('버퍼잔여', `${number(totalBuffer)}개`),
        renderMetric('상품', `${number(items.length)}종`)
      ].join('');
      renderSalesDateStrip(data);

      els.salesGrid.innerHTML = items.length
        ? items.map(renderSalesCard).join('')
        : '<div class="empty">해당 날짜의 입고 상품이 없습니다.</div>';
    }

    function renderSalesCard(item) {
      const history = (item.bufferHistory || [])
        .filter(event => Number(event.deltaQuantity || 0) < 0)
        .map(event => `<span>${esc(event.actorMemo || '메모없음')}</span>`)
        .join('');

      return `
        <article class="product-card" data-id="${esc(item.id)}">
          <div class="thumb-wrap">
            <img class="thumb" src="${esc(imageUrl(item))}" alt="${esc(item.productName)}" loading="lazy">
            <span class="storage ${storageClass(item.storageMethod)}">${storageIcon(item.storageMethod)} · ${esc(item.storageMethod)}</span>
            <div class="card-overlay">
              <div class="card-name">${esc(item.productName)}</div>
              <div class="overlay-row">
                <div class="overlay-stat">
                  <span class="overlay-label">버퍼잔여</span>
                  <span class="overlay-num">${number(item.bufferRemainingQuantity)}</span>
                </div>
                <div class="overlay-mini">
                  <span class="overlay-chip">입고 ${number(item.inboundQuantity)}</span>
                  <span class="overlay-chip">본사 ${number(item.hqBufferQuantity)}</span>
                  <span class="overlay-chip">우리 ${number(item.ourBufferQuantity)}</span>
                </div>
              </div>
            </div>
          </div>
          <div class="body">
            <div class="mini">
              <span class="chip">총잔여 ${number(item.remainingQuantity)}</span>
              <span class="chip">본사 ${number(item.hqBufferQuantity)}</span>
              <span class="chip">우리 ${number(item.ourBufferQuantity)}</span>
            </div>
            <div class="buffer-hero">
              <div>
                <div class="buffer-label">현재 버퍼잔여</div>
                <div class="buffer-num remain-num">${number(item.bufferRemainingQuantity)}</div>
              </div>
              <div class="buffer-label">시작 ${number(item.initialBufferQuantity)}</div>
            </div>
            <div class="action-row">
              <button class="minus-btn" data-action="buffer-minus" ${Number(item.bufferRemainingQuantity || 0) <= 0 ? 'disabled' : ''}>−</button>
              <button class="plus-btn" data-action="buffer-plus">+</button>
            </div>
            <input class="memo" data-memo="${esc(item.id)}" placeholder="끝4자리 / 닉네임" autocomplete="off">
            <div class="history">${history}</div>
          </div>
        </article>
      `;
    }

    function renderInbound(data) {
      const todayItems = data.inboundItems || [];
      const fallbackItems = !todayItems.length ? (data.latestInboundItems || []) : [];
      const items = todayItems.length ? todayItems : fallbackItems;
      const targetDate = todayItems.length ? data.todayKey : data.latestInboundDate;
      const totalInbound = items.reduce((sum, item) => sum + Number(item.inboundQuantity || 0), 0);
      const totalCounted = items.reduce((sum, item) => sum + Number(item.countedQuantity || 0), 0);
      const completeCount = items.filter(item => item.isReceivingComplete).length;

      els.inboundSummary.innerHTML = [
        renderMetric('입고일', targetDate || '-'),
        renderMetric('입고수량', `${number(totalInbound)}개`),
        renderMetric('완료', `${number(completeCount)}/${number(items.length)}`)
      ].join('');

      els.inboundGrid.innerHTML = items.length
        ? renderInboundStorageSections(items)
        : '<div class="empty">입고 상품이 없습니다.</div>';

      els.staleList.innerHTML = (data.staleItems || []).length
        ? data.staleItems.map(renderStaleItem).join('')
        : '<div class="empty">상시전환 대상이 없습니다.</div>';
    }

    function renderInboundStorageSections(items) {
      return groupByStorage(items).map(group => `
        <section class="inbound-section">
          <div class="storage-heading">
            <strong><i class="storage-dot ${storageClass(group.storage)}"></i>${esc(group.storage)}</strong>
            <span>${number(group.items.length)}종 · ${number(group.totalQuantity)}개</span>
          </div>
          <div class="grid">
            ${group.items.map(renderInboundCard).join('')}
          </div>
        </section>
      `).join('');
    }

    function groupByStorage(items) {
      const order = ['냉장', '상온', '냉동'];
      const grouped = new Map();

      items.forEach(item => {
        const storage = item.storageMethod || '상온';
        if (!grouped.has(storage)) grouped.set(storage, []);
        grouped.get(storage).push(item);
      });

      return [...order, ...Array.from(grouped.keys()).filter(key => !order.includes(key))]
        .filter(storage => grouped.has(storage))
        .map(storage => {
          const groupItems = grouped.get(storage) || [];
          return {
            storage,
            items: groupItems,
            totalQuantity: groupItems.reduce((sum, item) => sum + Number(item.inboundQuantity || 0), 0)
          };
        });
    }

    function renderInboundCard(item) {
      const packageUnit = packageUnitLabel(item);

      return `
        <article class="product-card inbound-card ${item.isReceivingComplete ? 'done' : ''}" data-id="${esc(item.id)}" data-receive-card="1">
          <div class="thumb-wrap">
            <img class="thumb" src="${esc(imageUrl(item))}" alt="${esc(item.productName)}" loading="lazy">
            <span class="storage ${storageClass(item.storageMethod)}">${storageIcon(item.storageMethod)} · ${esc(item.storageMethod)}</span>
            ${packageUnit ? `<span class="pack-badge">포장 ${esc(packageUnit)}</span>` : ''}
            <div class="card-overlay">
              <div class="card-name">${esc(item.productName)}</div>
              <div class="overlay-row">
                <div class="overlay-stat">
                  <span class="overlay-label">입고수량</span>
                  <span class="overlay-num">${number(item.inboundQuantity)}</span>
                  <span class="counted-badge" data-counted-id="${esc(item.id)}">카운팅 ${number(item.countedQuantity)}</span>
                </div>
                <div class="overlay-mini">
                  <span class="overlay-chip">공급 ${compactMoney(item.supplyPrice)}</span>
                  <span class="overlay-chip">본사 ${number(item.hqBufferQuantity)}</span>
                  <span class="overlay-chip">우리 ${number(item.ourBufferQuantity)}</span>
                </div>
              </div>
            </div>
          </div>
          <div class="body">
            <div class="mini">
              <span class="chip">공급 ${money(item.supplyPrice)}</span>
              <span class="chip">판매 ${money(item.salePrice)}</span>
              <span class="chip">우리 ${number(item.ourBufferQuantity)}</span>
              <span class="chip">본사 ${number(item.hqBufferQuantity)}</span>
            </div>
            <div class="inbound-top">
              <div>
                <div class="buffer-label">입고수량</div>
                <div class="inbound-qty">${number(item.inboundQuantity)}</div>
              </div>
              <div class="counted">
                <div class="buffer-label">카운팅</div>
                <div class="counted-num">${number(item.countedQuantity)}</div>
              </div>
            </div>
            <div class="count-actions">
              <button class="count-btn" data-action="count-10">+10</button>
              <button class="count-btn" data-action="count-5">+5</button>
              <button class="count-btn" data-action="count-1">+1</button>
              <button class="count-btn" data-action="count-minus">−1</button>
              <button class="complete-btn ${item.isReceivingComplete ? 'done' : ''}" data-action="receive-complete">${item.isReceivingComplete ? '입고완료' : '수량체크완료'}</button>
            </div>
          </div>
        </article>
      `;
    }

    function renderStaleItem(item) {
      return `
        <div class="stale-item">
          <img src="${esc(imageUrl(item))}" alt="${esc(item.productName)}" loading="lazy">
          <div>
            <div class="stale-name">${esc(item.productName)}</div>
            <div class="stale-meta">${esc(item.storageMethod)} · ${esc(item.inboundDateText)} · ${esc(item.salesType)}</div>
          </div>
          <div class="stale-qty">${number(item.inboundQuantity)}</div>
        </div>
      `;
    }

    function findItem(id) {
      const data = state.dashboard || {};
      return [
        ...(data.salesItems || []),
        ...(data.salesAllItems || []),
        ...(data.inboundItems || []),
        ...(data.latestInboundItems || []),
        ...(data.staleItems || [])
      ].find(item => item.id === id);
    }

    function updateItem(id, update) {
      const data = state.dashboard || {};
      const groups = [
        data.salesItems,
        data.salesAllItems,
        data.inboundItems,
        data.latestInboundItems,
        data.staleItems
      ];

      groups.forEach(items => {
        (items || []).forEach(item => {
          if (item.id === id) update(item);
        });
      });
    }

    function runReceivingCount(button, id, requestedQuantity) {
      const item = findItem(id);
      if (!item) return;

      const current = Number(item.countedQuantity || 0);
      let quantity = Number(requestedQuantity || 0);
      if (current + quantity < 0) quantity = -current;
      if (!quantity) return;

      flashButton(button, quantity > 0 ? `+${quantity}` : `${quantity}`, quantity > 0 ? '' : 'minus');
      updateItem(id, target => {
        target.countedQuantity = Math.max(0, Number(target.countedQuantity || 0) + quantity);
      });
      render();

      const url = new URL('/api/buffer-action', location.origin);
      url.searchParams.set('token', state.token);
      fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'receive_count',
          inventoryStableId: id,
          countedQuantity: quantity
        })
      })
        .then(async response => {
          const data = await response.json();
          if (!response.ok || !data.ok) throw new Error(data.message || '저장하지 못했습니다.');
        })
        .catch(error => {
          updateItem(id, target => {
            target.countedQuantity = Math.max(0, Number(target.countedQuantity || 0) - quantity);
          });
          render();
          alert(error.message || String(error));
        });
    }

    function bindControls() {
      document.querySelectorAll('[data-action]').forEach(button => {
        button.onclick = event => {
          event.stopPropagation();
          const card = button.closest('[data-id]');
          const id = card?.dataset.id || '';
          const item = findItem(id);
          const action = button.dataset.action;
          if (!item) return;

          if (action === 'buffer-minus' || action === 'buffer-plus') {
            const memo = document.querySelector(`[data-memo="${CSS.escape(id)}"]`)?.value || '';
            const delta = action === 'buffer-minus' ? -1 : 1;
            runAction({
              action: 'buffer_delta',
              inventoryStableId: id,
              deltaQuantity: delta,
              actorMemo: memo
            }, delta < 0 ? '버퍼 -1' : '버퍼 +1', delta < 0 ? 'minus' : 'plus');
          }

          if (action === 'count-10' || action === 'count-5' || action === 'count-1' || action === 'count-minus') {
            const qty = action === 'count-10' ? 10 : action === 'count-5' ? 5 : action === 'count-1' ? 1 : -1;
            runReceivingCount(button, id, qty);
          }

          if (action === 'receive-complete') {
            runAction({
              action: 'receive_complete',
              inventoryStableId: id,
              isComplete: !item.isReceivingComplete
            }, item.isReceivingComplete ? '완료취소' : '입고완료', item.isReceivingComplete ? 'minus' : '');
          }
        };
      });

      document.querySelectorAll('[data-sales-date]').forEach(button => {
        button.onclick = () => {
          state.salesDateKey = button.dataset.salesDate || '';
          render();
        };
      });
    }

    document.addEventListener('click', event => {
      const card = event.target.closest?.('[data-receive-card="1"]');
      if (!card || event.target.closest('button, input')) return;

      const now = Date.now();
      const id = card.dataset.id || '';
      const isDoubleTap = state.doubleTap.id === id && now - state.doubleTap.at <= 520;
      state.doubleTap = { id, at: now };
      if (!isDoubleTap) return;

      const item = findItem(id);
      if (!item) return;
      runAction({
        action: 'receive_complete',
        inventoryStableId: id,
        isComplete: !item.isReceivingComplete
      }, item.isReceivingComplete ? '완료취소' : '입고완료', item.isReceivingComplete ? 'minus' : '');
    });

    els.salesTab.addEventListener('click', () => setTab('sales'));
    els.inboundTab.addEventListener('click', () => setTab('inbound'));
    els.refreshBtn.addEventListener('click', () => loadDashboard({ refresh: true }).catch(error => alert(error.message)));

    loadDashboard().catch(error => {
      els.salesGrid.innerHTML = `<div class="empty">${esc(error.message)}</div>`;
    });
  </script>
</body>
</html>
