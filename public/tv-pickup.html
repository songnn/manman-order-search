<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#f3f6f9">
  <title>만만마켓 오늘의 픽업 안내</title>
  <link rel="preconnect" href="https://ecimg.cafe24img.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preload" href="/fonts/TheJamsil-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="/tv-pickup.css">
</head>
<body>
  <main class="tv-canvas" id="tvCanvas" aria-live="polite">
    <section class="board-column" aria-label="오늘의 픽업 상품판">
      <header class="board-header">
        <div class="date-block">
          <strong id="pickupDate">픽업일 확인 중</strong>
          <span class="date-meta">
            <small>TODAY'S PICK UP</small>
            <span id="updateTime">입고 데이터 연결 중</span>
          </span>
        </div>
        <div class="summary-cards" id="summaryCards" aria-label="픽업 상품 요약"></div>
        <em class="page-indicator" id="pageIndicator" aria-label="현재 상품 페이지" hidden></em>
      </header>

      <div class="zones-layout" id="zonesLayout">
        <section class="zone zone--ambient" id="ambientZone" aria-labelledby="ambientTitle">
          <header class="zone-header">
            <span class="zone-title">
              <img src="/storage-ambient.webp" alt="">
              <strong id="ambientTitle">상온</strong>
              <em id="ambientCount">0종</em>
            </span>
            <span class="zone-direction">
              <span class="zone-direction__lead">→ TV 우측</span>
              <strong class="zone-direction__spot">선반대 픽업존</strong>
            </span>
          </header>
          <div class="product-grid product-grid--ambient" id="ambientProducts"></div>
        </section>

        <section class="zone zone--chilled" id="chilledZone" aria-labelledby="chilledTitle">
          <header class="zone-header">
            <span class="zone-title">
              <img src="/storage-refrigerated-a2ca1185.webp" alt="">
              <strong id="chilledTitle">냉장</strong>
              <em id="chilledCount">0종</em>
            </span>
            <span class="zone-direction">
              <span class="zone-direction__lead">→ TV 오른쪽 끝</span>
              <strong class="zone-direction__spot">냉장 <b class="zone-direction__number">1</b> 픽업존</strong>
            </span>
          </header>
          <div class="product-grid product-grid--chilled" id="chilledProducts"></div>
        </section>

        <section class="zone zone--frozen" id="frozenZone" aria-labelledby="frozenTitle">
          <header class="zone-header">
            <span class="zone-title">
              <img src="/storage-frozen.webp" alt="">
              <strong id="frozenTitle">냉동</strong>
              <em id="frozenCount">0종</em>
            </span>
            <span class="zone-direction">
              <span class="zone-direction__lead">↘ TV 뒤쪽 4시 방향</span>
              <strong class="zone-direction__spot">
                냉동 <b class="zone-direction__number">1</b> 픽업존
                <span class="zone-direction__divider" aria-hidden="true">//</span>
                냉동 <b class="zone-direction__number">2</b> 상단 3칸
              </strong>
            </span>
          </header>
          <div class="product-grid product-grid--frozen" id="frozenProducts"></div>
        </section>
      </div>
    </section>
  </main>

  <script type="module" src="/tv-pickup.js"></script>
</body>
</html>
