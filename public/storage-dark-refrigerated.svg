<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" role="img" aria-labelledby="chilled-title chilled-desc" shape-rendering="geometricPrecision">
  <title id="chilled-title">냉장 보관</title>
  <desc id="chilled-desc">다크 태그 위에 사용하는 민트·시안 그라데이션 냉장고 아이콘</desc>
  <defs>
    <linearGradient id="chilled-stroke" x1="4.75" y1="3" x2="19.25" y2="21" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#72F7E8"/>
      <stop offset="0.52" stop-color="#21D4E8"/>
      <stop offset="1" stop-color="#00B4E8"/>
    </linearGradient>
    <linearGradient id="chilled-fill" x1="6" y1="4" x2="18" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C9FFF9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00B4E8" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Refrigerator body and doors -->
  <rect x="5.25" y="2.75" width="13.5" height="18.25" rx="2.35" fill="url(#chilled-fill)" stroke="url(#chilled-stroke)" stroke-width="1.75"/>
  <path d="M5.45 10.15h13.1" stroke="url(#chilled-stroke)" stroke-width="1.75" stroke-linecap="round"/>

  <!-- Door handles -->
  <rect x="7.45" y="5.35" width="1.55" height="2.9" rx="0.775" fill="url(#chilled-stroke)"/>
  <rect x="7.45" y="12.75" width="1.55" height="3.3" rx="0.775" fill="url(#chilled-stroke)"/>

  <!-- Feet -->
  <path d="M7.65 21v.65M16.35 21v.65" stroke="url(#chilled-stroke)" stroke-width="1.55" stroke-linecap="round"/>

  <!-- Precision highlights for dark backgrounds -->
  <path d="M7.55 3.55h7.85c1.45 0 2.55 1.05 2.55 2.5" stroke="#FFFFFF" stroke-opacity="0.32" stroke-width="0.5" stroke-linecap="round"/>
  <path d="M6.15 10.75h11.7" stroke="#E8FFFD" stroke-opacity="0.28" stroke-width="0.45" stroke-linecap="round"/>
</svg>
